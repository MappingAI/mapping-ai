<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Mapping AI</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon/favicon.svg">
  <link rel="icon" type="image/png" sizes="96x96" href="/assets/favicon/favicon-96x96.png">
  <link rel="shortcut icon" href="/assets/favicon/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png">
  <link rel="manifest" href="/assets/favicon/site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" media="print" onload="this.media='all'">
  <style>
:root {
  --serif: 'EB Garamond', Georgia, serif;
  --mono: 'DM Mono', monospace;
  --text-primary: #1a1a1a;
  --text-secondary: #555;
  --text-tertiary: #888;
  --border: #bbb;
  --bg-secondary: #f8f7f5;
  --accent: #2563eb;
  --green: #16a34a;
  --red: #dc2626;
  --yellow: #d97706;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #fff; font-family: var(--serif); color: var(--text-primary); font-size: 16px; line-height: 1.6; }

/* Nav */
.site-nav {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 2rem; height: 48px;
  background: #fff; border-bottom: 0.5px solid var(--border); z-index: 100;
}
.nav-brand {
  font-family: var(--mono); font-size: 12px;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-primary); text-decoration: none;
}
.nav-links { display: flex; gap: 2rem; }
.nav-links a {
  font-family: var(--mono); font-size: 12px;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-tertiary); text-decoration: none;
  transition: color 0.15s; position: relative;
}
.nav-links a::after {
  content: ''; position: absolute; bottom: -3px; left: 0;
  width: 0; height: 1px; background: var(--text-primary); transition: width 0.2s ease;
}
.nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
.nav-links a:hover, .nav-links a.active { color: var(--text-primary); }
.nav-hamburger {
  display: none; flex-direction: column; justify-content: center;
  gap: 5px; background: none; border: none; cursor: pointer; padding: 4px;
}
.nav-hamburger span { display: block; width: 20px; height: 1.5px; background: var(--text-primary); }

/* Main */
.admin-wrap {
  max-width: 1100px; margin: 0 auto;
  padding: calc(48px + 2rem) 1.5rem 4rem;
}
h1 {
  font-family: var(--serif); font-size: 28px; font-weight: 400;
  font-style: italic; margin-bottom: 1.5rem;
}
.eyebrow {
  font-family: var(--mono); font-size: 11px;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-secondary); margin-bottom: 0.5rem;
}

/* Auth gate */
.auth-gate {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 60vh; gap: 1rem;
}
.auth-gate input {
  font-family: var(--serif); font-size: 16px;
  padding: 0.6rem 1rem; border: 1px solid var(--border);
  border-radius: 4px; width: 280px; text-align: center;
}
.auth-gate input:focus { outline: none; border-color: var(--text-secondary); }
.auth-gate .btn { margin-top: 0.5rem; }
.auth-error { color: var(--red); font-family: var(--mono); font-size: 12px; }

/* Tabs */
.tab-bar {
  display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem;
}
.tab-btn {
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 0.6rem 1.25rem;
  background: none; border: none; border-bottom: 2px solid transparent;
  color: var(--text-tertiary); cursor: pointer; transition: all 0.15s;
}
.tab-btn:hover { color: var(--text-secondary); }
.tab-btn.active { color: var(--text-primary); border-bottom-color: var(--text-primary); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Sub-tabs */
.sub-tab-bar {
  display: flex; gap: 0.5rem; margin-bottom: 1rem;
}
.sub-tab-btn {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em;
  text-transform: uppercase; padding: 0.4rem 0.9rem;
  border: 1px solid var(--border); background: #fff;
  color: var(--text-secondary); border-radius: 4px;
  cursor: pointer; transition: all 0.15s;
}
.sub-tab-btn:hover { border-color: var(--text-secondary); }
.sub-tab-btn.active {
  background: var(--text-primary); color: #fff; border-color: var(--text-primary);
}

/* Buttons */
.btn {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 0.5rem 1rem;
  border: none; border-radius: 4px; cursor: pointer; transition: opacity 0.15s;
  display: inline-flex; align-items: center; gap: 0.35rem;
}
.btn:hover { opacity: 0.85; }
.btn-primary { background: var(--text-primary); color: #fff; }
.btn-green { background: var(--green); color: #fff; }
.btn-red { background: var(--red); color: #fff; }
.btn-outline {
  background: #fff; color: var(--text-secondary);
  border: 1px solid var(--border);
}
.btn-outline:hover { border-color: var(--text-secondary); }
.btn-sm { font-size: 10px; padding: 0.35rem 0.7rem; }
.btn-link {
  background: none; border: none; color: var(--accent);
  font-family: var(--mono); font-size: 11px; cursor: pointer;
  text-decoration: underline; padding: 0; letter-spacing: 0.04em;
}

/* Stats */
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 1rem; margin-bottom: 2rem;
}
.stat-card {
  background: var(--bg-secondary); border-radius: 6px;
  padding: 1.1rem 1.2rem; border: 1px solid transparent;
  transition: border-color 0.15s;
}
.stat-card:hover { border-color: var(--border); }
.stat-card .stat-label {
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-tertiary); margin-bottom: 0.3rem;
}
.stat-card .stat-value {
  font-family: var(--serif); font-size: 28px; font-weight: 500;
  color: var(--text-primary);
}
.stat-card .stat-sub {
  font-family: var(--mono); font-size: 11px;
  color: var(--text-secondary); margin-top: 0.15rem;
}

/* Cards */
.pending-card {
  background: var(--bg-secondary); border-radius: 6px;
  padding: 1.25rem 1.5rem; margin-bottom: 1rem;
  border: 1px solid var(--border);
}
.pending-card-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 0.75rem; flex-wrap: wrap; gap: 0.5rem;
}
.pending-card-title {
  font-family: var(--serif); font-size: 20px; font-weight: 500;
}
.pending-card-meta {
  font-family: var(--mono); font-size: 10px;
  color: var(--text-tertiary); letter-spacing: 0.06em;
  text-transform: uppercase;
}
.pending-card-fields {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 0.5rem 1.5rem; margin-bottom: 1rem;
}
.pending-field-label {
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-tertiary);
}
.pending-field-value {
  font-family: var(--serif); font-size: 15px;
  color: var(--text-primary); word-break: break-word;
}
.pending-actions {
  display: flex; gap: 0.5rem; flex-wrap: wrap;
  padding-top: 0.75rem; border-top: 0.5px solid var(--border);
}

/* Comparison */
.comparison {
  display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
  margin-bottom: 1rem;
}
.comparison-col {
  background: #fff; border-radius: 4px; padding: 1rem;
  border: 1px solid var(--border);
}
.comparison-col-label {
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-tertiary); margin-bottom: 0.5rem;
}
.diff-highlight { background: #fef3c7; padding: 0 2px; border-radius: 2px; }

/* Table */
.table-toolbar {
  display: flex; gap: 0.75rem; align-items: center;
  margin-bottom: 1rem; flex-wrap: wrap;
}
.table-toolbar input[type="text"] {
  font-family: var(--serif); font-size: 15px;
  padding: 0.5rem 0.75rem; border: 1px solid var(--border);
  border-radius: 4px; flex: 1; min-width: 200px;
}
.table-toolbar input:focus { outline: none; border-color: var(--text-secondary); }
.table-wrap { overflow-x: auto; }
table {
  width: 100%; border-collapse: collapse;
  font-size: 14px;
}
th {
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-tertiary); text-align: left;
  padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--border);
  cursor: pointer; white-space: nowrap; user-select: none;
}
th:hover { color: var(--text-secondary); }
th .sort-arrow { margin-left: 4px; font-size: 9px; }
td {
  padding: 0.55rem 0.75rem;
  border-bottom: 0.5px solid #eee;
  max-width: 200px; overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap; vertical-align: top;
}
td.editable { cursor: pointer; }
td.editable:hover { background: #f0efed; }
td input, td select {
  font-family: var(--serif); font-size: 14px;
  padding: 0.25rem 0.4rem; border: 1px solid var(--accent);
  border-radius: 3px; width: 100%;
}
tr.selected { background: #eff6ff; }
tr:hover { background: var(--bg-secondary); }

/* Status badges */
.badge {
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 0.2rem 0.5rem; border-radius: 3px;
  display: inline-block;
}
.badge-approved { background: #dcfce7; color: #166534; }
.badge-pending { background: #fef3c7; color: #92400e; }
.badge-rejected { background: #fee2e2; color: #991b1b; }

/* Edit modal */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4); z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 1rem;
}
.modal {
  background: #fff; border-radius: 8px; padding: 1.5rem 2rem;
  max-width: 600px; width: 100%; max-height: 85vh;
  overflow-y: auto; box-shadow: 0 8px 30px rgba(0,0,0,0.12);
}
.modal h2 {
  font-family: var(--serif); font-size: 22px; font-weight: 400;
  font-style: italic; margin-bottom: 1rem;
}
.modal .field {
  display: flex; flex-direction: column; margin-bottom: 0.75rem;
}
.modal .field label {
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-tertiary); margin-bottom: 0.25rem;
}
.modal .field input, .modal .field select, .modal .field textarea {
  font-family: var(--serif); font-size: 15px;
  padding: 0.5rem 0.7rem; border: 1px solid var(--border);
  border-radius: 4px; background: #fff; color: var(--text-primary);
}
.modal .field input:focus, .modal .field select:focus, .modal .field textarea:focus {
  outline: none; border-color: var(--text-secondary);
}
.modal .field textarea { resize: vertical; min-height: 70px; }
.modal-actions {
  display: flex; gap: 0.5rem; justify-content: flex-end;
  margin-top: 1rem; padding-top: 0.75rem; border-top: 0.5px solid var(--border);
}

/* TipTap editor (admin modal) */
.modal .tiptap-toolbar {
  display: flex; align-items: center; gap: 2px;
  padding: 0.3rem 0.5rem;
  border: 1px solid var(--border); border-bottom: none;
  border-radius: 4px 4px 0 0;
  background: var(--bg-secondary);
}
.modal .tiptap-toolbar-btn {
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  width: 26px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  border: none; border-radius: 3px;
  background: transparent; color: var(--text-tertiary);
  cursor: pointer;
}
.modal .tiptap-toolbar-btn:hover { background: var(--border); color: var(--text-primary); }
.modal .tiptap-toolbar-btn.active { background: var(--text-primary); color: #fff; }
.modal .tiptap-toolbar-sep { width: 1px; height: 16px; background: var(--border); margin: 0 3px; }
.modal .tiptap-notes {
  border: 1px solid var(--border); border-radius: 0 0 4px 4px;
  min-height: 80px; max-height: 200px; overflow-y: auto;
  padding: 0.6rem 0.75rem;
  font-family: var(--serif); font-size: 15px; line-height: 1.6;
  color: var(--text-primary); cursor: text;
}
.modal .tiptap-notes:focus-within { border-color: var(--text-secondary); }
.modal .tiptap-notes .tiptap { outline: none; min-height: 60px; }
.modal .tiptap-notes .tiptap p { margin-bottom: 0.5rem; }
.modal .tiptap-notes .tiptap p:last-child { margin-bottom: 0; }
.modal .tiptap-notes .tiptap p.is-editor-empty:first-child::before {
  content: attr(data-placeholder); float: left; height: 0;
  color: var(--text-tertiary); pointer-events: none;
}
.modal .tiptap-mention {
  background: #e0edff; color: var(--accent); padding: 1px 4px;
  border-radius: 3px; font-size: 13px; font-weight: 500;
}
/* Checkbox groups (admin modal) */
.modal .checkbox-group {
  display: flex; flex-wrap: wrap; gap: 0.3rem 0.75rem;
}
.modal .checkbox-group label {
  font-family: var(--mono); font-size: 11px;
  color: var(--text-secondary); display: flex; align-items: center; gap: 4px;
  cursor: pointer;
}
.modal .checkbox-group input[type="checkbox"] { margin: 0; }

/* Multi-select tags in modal */
.modal .tag-input-wrap {
  display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
  border: 1px solid var(--border); border-radius: 4px;
  padding: 0.3rem 0.4rem; min-height: 38px; cursor: text;
}
.modal .tag-input-wrap:focus-within { border-color: var(--text-secondary); }
.modal .tag-input-wrap input {
  border: none; outline: none; flex: 1; min-width: 80px;
  font-family: var(--serif); font-size: 15px; padding: 0.15rem 0;
  background: transparent; color: var(--text-primary);
}
.modal .es-tag {
  display: inline-flex; align-items: center; gap: 3px;
  background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: 3px; padding: 2px 6px;
  font-family: var(--mono); font-size: 11px; color: var(--text-secondary);
}
.modal .es-tag-remove {
  cursor: pointer; font-size: 13px; color: var(--text-tertiary);
  line-height: 1; margin-left: 2px;
}
.modal .es-tag-remove:hover { color: var(--red); }
/* Entity search autocomplete in modal */
.modal .entity-search-wrap { position: relative; }
.modal .entity-search-wrap input { width: 100%; }
.modal .entity-search-results {
  position: absolute; left: 0; right: 0; top: 100%;
  background: #fff; border: 1px solid var(--border); border-top: none;
  border-radius: 0 0 4px 4px; max-height: 160px; overflow-y: auto;
  z-index: 10; box-shadow: 0 4px 8px rgba(0,0,0,0.08);
}
.modal .entity-search-results .es-item {
  padding: 0.4rem 0.6rem; cursor: pointer;
  font-family: var(--serif); font-size: 14px;
  display: flex; justify-content: space-between; align-items: center;
}
.modal .entity-search-results .es-item:hover,
.modal .entity-search-results .es-item.active { background: #edecea; }
.modal .es-item-cat {
  font-family: var(--mono); font-size: 9px; color: var(--text-tertiary);
  text-transform: uppercase; letter-spacing: 0.04em;
}

/* Merge queue */
.submission-review {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1rem;
  margin: 0.75rem 0;
}
.submission-meta {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-tertiary);
  margin-bottom: 0.75rem;
}
.self-badge {
  background: #dbeafe;
  color: #1e40af;
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 10px;
  margin-left: 4px;
}
.merge-field {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: 0.5rem;
  align-items: start;
  padding: 0.4rem 0;
  border-bottom: 0.5px solid #eee;
}
.merge-field:last-of-type { border-bottom: none; }
.merge-field-label {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  color: var(--text-tertiary);
  padding-top: 0.2rem;
}
.merge-options label {
  display: block;
  font-size: 14px;
  margin: 0.3rem 0;
  cursor: pointer;
  padding: 0.25rem 0;
}
.merge-options input[type="radio"] {
  margin-right: 0.4rem;
}
.merge-options .option-label {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--text-tertiary);
  margin-right: 0.4rem;
}
.merge-options .diff-highlight {
  background: #fef3c7;
  padding: 2px 6px;
  border-radius: 3px;
  font-weight: 500;
}
.merge-options .custom-input {
  font-family: var(--serif);
  font-size: 13px;
  padding: 0.2rem 0.4rem;
  border: 1px solid var(--border);
  border-radius: 3px;
  width: 200px;
  margin-left: 0.3rem;
}
.merge-actions {
  display: flex;
  gap: 0.5rem;
  align-items: center;
  margin-top: 1rem;
  padding-top: 0.75rem;
  border-top: 0.5px solid var(--border);
}
.merge-actions textarea {
  flex: 1;
  font-family: var(--serif);
  font-size: 13px;
  padding: 0.4rem;
  border: 1px solid var(--border);
  border-radius: 4px;
  resize: none;
  height: 36px;
}

/* Loading */
.loading {
  text-align: center; padding: 2rem;
  font-family: var(--mono); font-size: 12px;
  color: var(--text-tertiary); letter-spacing: 0.06em;
}

/* Toast */
.toast {
  position: fixed; bottom: 2rem; right: 2rem;
  font-family: var(--mono); font-size: 12px;
  padding: 0.7rem 1.2rem; border-radius: 4px;
  background: var(--text-primary); color: #fff;
  z-index: 300; opacity: 0; transform: translateY(10px);
  transition: all 0.3s ease; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.error { background: var(--red); }

/* Responsive */
@media (max-width: 600px) {
  .site-nav { padding: 0 1rem; }
  .nav-hamburger { display: flex; }
  .nav-links {
    display: none; position: absolute; top: 48px;
    left: 0; right: 0; background: #fff;
    border-bottom: 0.5px solid var(--border);
    flex-direction: column; padding: 1rem 1.5rem; gap: 1rem;
  }
  .nav-links.open { display: flex; }
  .admin-wrap { padding: calc(48px + 1rem) 1rem 3rem; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .comparison { grid-template-columns: 1fr; }
  .pending-card-fields { grid-template-columns: 1fr; }
  table { font-size: 13px; }
  td, th { padding: 0.4rem 0.5rem; }
}
</style>
</head>
<body>

<nav class="site-nav">
  <a class="nav-brand" href="/">Mapping AI</a>
  <button class="nav-hamburger" aria-label="Menu" onclick="document.querySelector('.nav-links').classList.toggle('open')">
    <span></span><span></span><span></span>
  </button>
  <div class="nav-links">
    <a href="/">Background</a>
    <a href="/contribute">Contribute</a>
    <a href="/map">Map</a>
    <a href="/about">About</a>
  </div>
</nav>

<div class="admin-wrap">

  <div id="auth-gate">
    <h1>Database Admin</h1>
    <p style="color:var(--text-secondary);font-size:14px;margin-bottom:1rem;">Enter admin key to continue</p>
    <input type="password" id="auth-input" placeholder="Admin key..." onkeydown="if(event.key==='Enter')authenticate()">
    <button class="btn" onclick="authenticate()">Authenticate</button>
    <div id="auth-error" style="display:none;color:#c00;font-size:13px;margin-top:0.5rem;"></div>
  </div>

  <div id="admin-content" style="display:none">
    <div class="eyebrow">Internal</div>
    <h1>Database Admin</h1>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
      <button class="tab-btn" data-tab="pending">Pending Queue</button>
      <button class="tab-btn" data-tab="merge">Merge Queue</button>
      <button class="tab-btn" data-tab="entities">All Entities</button>
    </div>

    <!-- Dashboard -->
    <div id="tab-dashboard" class="tab-panel active">
      <div id="stats-loading" class="loading">Loading stats...</div>
      <div id="stats-content" style="display:none">
        <div class="eyebrow">Overview</div>
        <div id="stats-grid" class="stats-grid"></div>
        <div class="eyebrow" style="margin-top:1.5rem">Quick Actions</div>
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.5rem">
          <button class="btn btn-outline" onclick="switchToTab('pending')">Review Pending</button>
          <button class="btn btn-outline" onclick="switchToTab('entities');switchSubTab('people')">Browse People</button>
          <button class="btn btn-outline" onclick="switchToTab('entities');switchSubTab('organizations')">Browse Organizations</button>
          <button class="btn btn-outline" onclick="switchToTab('entities');switchSubTab('resources')">Browse Resources</button>
        </div>
      </div>
    </div>

    <!-- Pending Queue -->
    <div id="tab-pending" class="tab-panel">
      <div id="pending-loading" class="loading">Loading pending submissions...</div>
      <div id="pending-content"></div>
      <div id="pending-empty" style="display:none" class="loading">No pending submissions.</div>
    </div>

    <!-- Merge Queue -->
    <div id="tab-merge" class="tab-panel">
      <div id="merge-loading" class="loading">Loading merge queue...</div>
      <div id="merge-content"></div>
      <div id="merge-empty" style="display:none" class="loading">No pending merges.</div>
    </div>

    <!-- All Entities -->
    <div id="tab-entities" class="tab-panel">
      <div class="sub-tab-bar">
        <button class="sub-tab-btn active" data-subtab="people" onclick="switchSubTab('people')">People</button>
        <button class="sub-tab-btn" data-subtab="organizations" onclick="switchSubTab('organizations')">Organizations</button>
        <button class="sub-tab-btn" data-subtab="resources" onclick="switchSubTab('resources')">Resources</button>
      </div>
      <div class="table-toolbar">
        <input type="text" id="entity-search" placeholder="Search..." oninput="filterEntities()">
        <button class="btn btn-green btn-sm" id="bulk-approve-btn" style="display:none" onclick="bulkApprove()">Approve Selected</button>
        <button class="btn btn-red btn-sm" id="bulk-delete-btn" style="display:none" onclick="bulkDelete()">Delete Selected</button>
      </div>
      <div id="entities-loading" class="loading">Loading...</div>
      <div class="table-wrap">
        <table id="entities-table" style="display:none">
          <thead id="entities-thead"></thead>
          <tbody id="entities-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<div id="modal-container"></div>

<script src="/assets/js/tiptap-notes.js"></script>
<script>
// --- Config ---
// NOTE: Always use production API for testing (no local API server)
const API_BASE = window.location.hostname === 'localhost'
  ? ''
  : 'https://j8jamvdf6i.execute-api.eu-west-2.amazonaws.com';

const FIELD_OPTIONS = {
  belief_regulatory_stance: ['Accelerate','Light-touch','Targeted','Moderate','Restrictive','Precautionary','Nationalize','Mixed/unclear','Other'],
  belief_agi_timeline: ['Already here','2-3 years','5-10 years','10-25 years','25+ years or never','Ill-defined','Unknown'],
  belief_ai_risk: ['Overstated','Manageable','Serious','Catastrophic','Existential','Mixed/nuanced','Unknown'],
  belief_evidence_source: ['Explicitly stated','Inferred','Unknown'],
  funding_model: ['For-profit','Non-profit','Government','Hybrid','Unknown'],
  belief_threat_models: ['Labor displacement','Economic inequality','Power concentration','Democratic erosion','Cybersecurity threats','Misinformation/deepfakes','Environmental harm','Weapons proliferation','Loss of human control','Copyright/IP/creative economy','Existential/civilizational risk'],
  influence_type: ['Decision-maker','Advisor/strategist','Researcher/analyst','Funder/investor','Builder','Organizer/advocate','Narrator','Implementer','Connector/convener'],
};

// Fields that link to other entities — rendered as autocomplete search inputs
const LINK_FIELDS = {
  primary_org:     { searchType: 'organizations', display: 'name' },
  other_orgs:      { searchType: 'organizations', display: 'name', multi: true },
  parent_org_id:   { searchType: 'organizations', display: 'name', valueField: 'id' },
  resource_author: { searchType: 'people', display: 'name', multi: true },
};

// Cache of all entities for autocomplete (loaded on first edit)
let _adminEntityCache = null;

// Clear all entity caches after any mutation (approve/reject/merge/edit/delete)
function invalidateEntityCaches() {
  allEntitiesCache = {};
  _adminEntityCache = null;
}
async function getEntityCache() {
  if (_adminEntityCache) return _adminEntityCache;
  try {
    const [pRes, oRes] = await Promise.all([
      apiFetch('/admin?action=all&type=entity&entity_type=person'),
      apiFetch('/admin?action=all&type=entity&entity_type=organization'),
    ]);
    const pData = await pRes.json();
    const oData = await oRes.json();
    _adminEntityCache = {
      people: pData.data || [],
      organizations: oData.data || [],
    };
  } catch (e) {
    _adminEntityCache = { people: [], organizations: [] };
  }
  return _adminEntityCache;
}

function searchEntityCache(query, type) {
  if (!_adminEntityCache || !query || query.length < 2) return [];
  const q = query.toLowerCase();
  const list = _adminEntityCache[type] || [];
  return list.filter(e => (e.name || '').toLowerCase().includes(q)).slice(0, 8);
}

const FIELD_DEFS = {
  people: {
    fields: ['name','category','title','primary_org','other_orgs','location','belief_regulatory_stance','belief_regulatory_stance_detail','belief_evidence_source','belief_agi_timeline','belief_ai_risk','belief_threat_models','influence_type','twitter','bluesky','thumbnail_url','notes','status'],
    categories: ['Executive','Researcher','Policymaker','Investor','Organizer','Journalist','Academic','Cultural figure'],
    tableFields: ['name','category','title','primary_org','location','belief_regulatory_stance','status'],
    label: 'People',
    singular: 'person'
  },
  organizations: {
    fields: ['name','category','website','location','funding_model','belief_regulatory_stance','belief_regulatory_stance_detail','belief_evidence_source','belief_agi_timeline','belief_ai_risk','belief_threat_models','influence_type','twitter','bluesky','thumbnail_url','notes','status'],
    categories: ['Frontier Lab','AI Safety','Think Tank','Government','Academic','VC','Labor','Ethics','Media','Political Campaign'],
    tableFields: ['name','category','website','location','funding_model','belief_regulatory_stance','status'],
    label: 'Organizations',
    singular: 'organization'
  },
  resources: {
    fields: ['resource_title','resource_author','resource_type','resource_url','resource_year','resource_category','resource_key_argument','belief_regulatory_stance','belief_agi_timeline','belief_ai_risk','notes','status'],
    categories: ['Essay','Book','Report','Podcast','Video','Website','Academic Paper','News Article','Substack','Newsletter'],
    tableFields: ['resource_title','resource_author','resource_type','resource_year','resource_category','status'],
    label: 'Resources',
    singular: 'resource'
  }
};

let adminKey = sessionStorage.getItem('adminKey') || '';
let currentSubTab = 'people';
let entitiesData = [];
let sortCol = null;
let sortDir = 'asc';
let selectedIds = new Set();

// --- Auth ---
function authenticate() {
  const input = document.getElementById('auth-input');
  const key = input.value.trim();
  if (!key) return;
  adminKey = key;
  sessionStorage.setItem('adminKey', key);
  // Test the key by fetching stats
  testAuth(key);
}

async function testAuth(key) {
  try {
    const res = await apiFetch('/admin?action=stats');
    if (!res.ok) throw new Error('Invalid key');
    document.getElementById('auth-gate').style.display = 'none';
    document.getElementById('admin-content').style.display = 'block';
    // Restore last active tab, default to dashboard
    const savedTab = localStorage.getItem('admin_tab') || 'dashboard';
    const savedSubTab = localStorage.getItem('admin_subtab');
    if (savedSubTab) currentSubTab = savedSubTab;
    switchToTab(savedTab);
  } catch (e) {
    document.getElementById('auth-error').textContent = 'Invalid admin key. Try again.';
    document.getElementById('auth-error').style.display = 'block';
    sessionStorage.removeItem('adminKey');
    adminKey = '';
  }
}

// Auto-load: restore saved tab or default to dashboard
document.addEventListener("DOMContentLoaded", () => {
  // Auto-authenticate if key is saved
  if (adminKey) {
    testAuth(adminKey);
  }
});

// --- API helpers ---
function apiFetch(path, opts = {}) {
  const url = API_BASE + path;
  const headers = { 'X-Admin-Key': adminKey, ...(opts.headers || {}) };
  if (opts.body && typeof opts.body === 'object') {
    headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(opts.body);
  }
  return fetch(url, { ...opts, headers });
}

async function apiPost(body) {
  return apiFetch('/admin', { method: 'POST', body });
}

function toast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 2500);
}

// --- Tabs ---
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchToTab(btn.dataset.tab));
});

function switchToTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + tab));
  localStorage.setItem('admin_tab', tab);
  if (tab === 'dashboard') loadDashboard();
  if (tab === 'pending') loadPending();
  if (tab === 'merge') loadMergeQueue();
  if (tab === 'entities') {
    document.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.toggle('active', b.dataset.subtab === currentSubTab));
    loadEntities(currentSubTab);
  }
}

// Entity type filters (all active by default)
let activeEntityTypes = new Set(['people', 'organizations', 'resources']);
let allEntitiesCache = {}; // { people: [], organizations: [], resources: [] }

function toggleEntityFilter(type, btn) {
  if (activeEntityTypes.has(type)) {
    if (activeEntityTypes.size === 1) return; // don't deselect last one
    activeEntityTypes.delete(type);
    btn.classList.remove('active');
  } else {
    activeEntityTypes.add(type);
    btn.classList.add('active');
  }
  localStorage.setItem('admin_entity_filters', JSON.stringify([...activeEntityTypes]));
  selectedIds.clear();
  updateBulkButtons();
  renderMergedTable();
}

function switchSubTab(type) {
  // Legacy compat — activate only this type
  activeEntityTypes = new Set([type]);
  document.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.toggle('active', activeEntityTypes.has(b.dataset.subtab)));
  currentSubTab = type;
  localStorage.setItem('admin_subtab', type);
  selectedIds.clear();
  updateBulkButtons();
  loadEntities(type);
}

// --- Dashboard ---
async function loadDashboard() {
  const loading = document.getElementById('stats-loading');
  const content = document.getElementById('stats-content');
  loading.style.display = 'block';
  content.style.display = 'none';
  try {
    const res = await apiFetch('/admin?action=stats');
    const data = await res.json();
    renderStats(data);
    loading.style.display = 'none';
    content.style.display = 'block';
  } catch (e) {
    loading.textContent = 'Failed to load stats.';
  }
}

function renderStats(data) {
  const grid = document.getElementById('stats-grid');
  const approved = data.approved || {};
  const pending  = data.pending  || {};
  const cards = [
    { label: 'People — Approved',       value: approved.person       ?? '—' },
    { label: 'People — Pending',         value: pending.person        ?? '—' },
    { label: 'Orgs — Approved',          value: approved.organization ?? '—' },
    { label: 'Orgs — Pending',           value: pending.organization  ?? '—' },
    { label: 'Resources — Approved',     value: approved.resource     ?? '—' },
    { label: 'Resources — Pending',      value: pending.resource      ?? '—' },
    { label: 'New Submissions (Pending)',  value: data.pending_new_submissions  ?? '—' },
    { label: 'Edit Submissions (Pending)', value: data.pending_edit_submissions ?? '—' },
    { label: 'Edges',                    value: data.edges            ?? '—' },
  ];
  grid.innerHTML = cards.map(c => `
    <div class="stat-card">
      <div class="stat-label">${c.label}</div>
      <div class="stat-value">${c.value}</div>
    </div>
  `).join('');
}

// --- Pending Queue ---
async function loadPending() {
  const loading = document.getElementById('pending-loading');
  const content = document.getElementById('pending-content');
  const empty = document.getElementById('pending-empty');
  loading.style.display = 'block';
  content.style.display = 'none';
  empty.style.display = 'none';
  content.innerHTML = '';
  try {
    const res = await apiFetch('/admin?action=pending');
    const data = await res.json();
    // API returns { submissions: [...] } — flat rows with entity_id IS NULL
    const submissions = data.submissions || [];
    loading.style.display = 'none';
    if (submissions.length === 0) {
      empty.style.display = 'block';
      return;
    }
    content.innerHTML = submissions.map(sub => renderPendingCard(sub)).join('');
    content.style.display = 'block';
  } catch (e) {
    loading.textContent = 'Failed to load pending items.';
  }
}

function renderPendingCard(sub) {
  // sub is a flat submission row (entity_id IS NULL)
  const entityType = sub.entity_type || 'person'; // 'person' | 'organization' | 'resource'
  const typeKey = entityType === 'person' ? 'people' : entityType === 'organization' ? 'organizations' : 'resources';
  const def = FIELD_DEFS[typeKey] || FIELD_DEFS.people;
  const displayName = sub.name || sub.resource_title || 'Untitled';
  const id = sub.id;

  let fieldsHtml = '';
  def.fields.forEach(f => {
    if (f === 'status') return;
    const val = sub[f];
    if (val !== undefined && val !== null && val !== '') {
      fieldsHtml += `
        <div>
          <div class="pending-field-label">${f.replace(/_/g, ' ')}</div>
          <div class="pending-field-value">${escHtml(String(val))}</div>
        </div>`;
    }
  });

  let metaHtml = '';
  if (sub.submitted_at) metaHtml += `Submitted: ${new Date(sub.submitted_at).toLocaleDateString()} `;
  if (sub.submitter_relationship) metaHtml += `&middot; ${escHtml(sub.submitter_relationship)} `;

  let llmHtml = '';
  if (sub.llm_review) {
    let r = typeof sub.llm_review === 'string' ? JSON.parse(sub.llm_review) : sub.llm_review;
    if (r.raw && !r.quality) {
      try { r = JSON.parse(r.raw.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim()); } catch {}
    }
    const stars = '★'.repeat(r.quality || 0) + '☆'.repeat(5 - (r.quality || 0));
    const flags = (r.flags || []).map(f => `<span style="background:#fef3c7;color:#92400e;padding:1px 5px;border-radius:3px;font-size:10px;margin-left:4px;">${escHtml(f)}</span>`).join('');
    llmHtml = `<div style="padding:0.5rem 0.75rem;background:var(--bg-secondary,#f8f7f5);border-radius:4px;margin-bottom:0.5rem;font-size:12px;">
      <strong style="font-size:10px;letter-spacing:0.04em;text-transform:uppercase;color:#888;">LLM Review</strong>
      <div>Quality: ${stars} ${flags}</div>
      ${r.notes ? `<div style="color:#666;margin-top:2px;">${escHtml(r.notes)}</div>` : ''}
    </div>`;
  }

  return `
    <div class="pending-card" id="pending-sub-${id}">
      <div class="pending-card-header">
        <div>
          <div class="pending-card-title">${escHtml(displayName)}</div>
          <div class="pending-card-meta">${entityType} &middot; ${metaHtml}</div>
        </div>
        <span class="badge badge-pending">Pending</span>
      </div>
      ${llmHtml}
      <div class="pending-card-fields">${fieldsHtml}</div>
      <div class="pending-actions">
        <button class="btn btn-green btn-sm" onclick="approveItem(${id})">Approve</button>
        <button class="btn btn-red btn-sm" onclick="rejectItem(${id})">Reject</button>
        <button class="btn btn-outline btn-sm" onclick="editAndApproveSub(${id},'${typeKey}')">Edit &amp; Approve</button>
      </div>
    </div>`;
}

function renderComparison(newItem, existing, def) {
  let rows = '';
  def.fields.forEach(f => {
    if (f === 'status') return;
    const nv = newItem[f] ?? '';
    const ev = existing[f] ?? '';
    const isDiff = String(nv) !== String(ev);
    rows += `
      <div>
        <div class="pending-field-label">${f.replace(/_/g, ' ')}</div>
        <div class="pending-field-value">${escHtml(String(ev))}</div>
      </div>
      <div>
        <div class="pending-field-label">${f.replace(/_/g, ' ')}</div>
        <div class="pending-field-value ${isDiff ? 'diff-highlight' : ''}">${escHtml(String(nv))}</div>
      </div>`;
  });
  return `
    <div class="comparison" style="margin-bottom:1rem">
      <div class="comparison-col">
        <div class="comparison-col-label">Current (Approved)</div>
      </div>
      <div class="comparison-col">
        <div class="comparison-col-label">Submitted Edit</div>
      </div>
      ${rows}
    </div>`;
}

async function approveItem(submissionId) {
  try {
    const res = await apiPost({ action: 'approve', submission_id: submissionId });
    if (!res.ok) throw new Error();
    toast('Approved');
    invalidateEntityCaches();
    loadPending();
    loadDashboard();
  } catch (e) { toast('Failed to approve', true); }
}

async function rejectItem(submissionId) {
  if (!confirm('Reject this submission?')) return;
  try {
    const res = await apiPost({ action: 'reject', submission_id: submissionId });
    if (!res.ok) throw new Error();
    toast('Rejected');
    invalidateEntityCaches();
    loadPending();
    loadDashboard();
  } catch (e) { toast('Failed to reject', true); }
}

function editAndApproveSub(submissionId, typeKey) {
  // Open a modal pre-filled with the submission's field values so admin can edit before approving.
  // We'll re-fetch the pending list to find the submission data.
  apiFetch('/admin?action=pending').then(r => r.json()).then(data => {
    const sub = (data.submissions || []).find(s => s.id === submissionId);
    if (!sub) { toast('Could not load submission', true); return; }
    editAndApproveSubModal(sub, typeKey);
  }).catch(() => toast('Failed to load submission', true));
}

function editAndApproveSubModal(sub, typeKey) {
  const def = FIELD_DEFS[typeKey] || FIELD_DEFS.people;
  let fieldsHtml = '';
  def.fields.forEach(f => {
    if (f === 'status') return;
    const val = sub[f] ?? '';
    const label = f.replace(/_/g, ' ');
    if (FIELD_OPTIONS[f] && (f === 'belief_threat_models' || f === 'influence_type')) {
      const selected = String(val).split(',').map(s => s.trim()).filter(Boolean);
      fieldsHtml += `<div class="field"><label>${label}</label><div class="checkbox-group" data-field="${f}">
        ${FIELD_OPTIONS[f].map(opt => `<label><input type="checkbox" name="${f}" value="${opt}" ${selected.includes(opt) ? 'checked' : ''}> ${opt}</label>`).join('')}
      </div></div>`;
    } else if (FIELD_OPTIONS[f]) {
      fieldsHtml += `<div class="field"><label>${label}</label><select name="${f}">
        <option value="">—</option>
        ${FIELD_OPTIONS[f].map(opt => `<option value="${opt}" ${opt === val ? 'selected' : ''}>${opt}</option>`).join('')}
      </select></div>`;
    } else if (f === 'resource_category') {
      fieldsHtml += `<div class="field"><label>${label}</label><select name="${f}">
        <option value="">—</option>
        ${(def.categories || []).map(c => `<option value="${c}" ${c === val ? 'selected' : ''}>${c}</option>`).join('')}
      </select></div>`;
    } else if (f === 'category') {
      fieldsHtml += `<div class="field"><label>${label}</label><select name="${f}">
        <option value="">—</option>
        ${(def.categories || []).map(c => `<option value="${c}" ${c === val ? 'selected' : ''}>${c}</option>`).join('')}
      </select></div>`;
    } else if (f === 'belief_regulatory_stance_detail' || f === 'resource_key_argument' || f === 'belief_threat_models') {
      fieldsHtml += `<div class="field"><label>${label}</label><textarea name="${f}">${escHtml(String(val))}</textarea></div>`;
    } else {
      fieldsHtml += `<div class="field"><label>${label}</label><input type="text" name="${f}" value="${escHtml(String(val))}"></div>`;
    }
  });

  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h2>Edit &amp; Approve</h2>
        <form id="edit-form">${fieldsHtml}</form>
        <div class="modal-actions">
          <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
          <button class="btn btn-green" onclick="saveAndApproveSub(${sub.id})">Save &amp; Approve</button>
        </div>
      </div>
    </div>`;
}

async function saveAndApproveSub(submissionId) {
  const form = document.getElementById('edit-form');
  const overrides = {};
  form.querySelectorAll('input:not([type="checkbox"]), select, textarea').forEach(el => {
    if (el.name && el.value !== '') overrides[el.name] = el.value;
  });
  form.querySelectorAll('.checkbox-group').forEach(group => {
    const field = group.dataset.field;
    const checked = [...group.querySelectorAll('input:checked')].map(cb => cb.value);
    if (checked.length > 0) overrides[field] = checked.join(', ');
  });
  try {
    const res = await apiPost({ action: 'approve', submission_id: submissionId, data: overrides });
    if (!res.ok) throw new Error();
    toast('Approved');
    invalidateEntityCaches();
    closeModal();
    loadPending();
    loadDashboard();
  } catch (e) { toast('Failed to approve', true); }
}

// Map sub-tab key → entity_type value for API
const ENTITY_TYPE_MAP = { people: 'person', organizations: 'organization', resources: 'resource' };

// --- All Entities ---
async function loadEntities(type) {
  const loading = document.getElementById('entities-loading');
  const table = document.getElementById('entities-table');
  loading.style.display = 'block';
  table.style.display = 'none';
  selectedIds.clear();
  updateBulkButtons();
  try {
    // Use cache if available for instant switching
    if (allEntitiesCache[type]) {
      entitiesData = allEntitiesCache[type];
    } else {
      const entityType = ENTITY_TYPE_MAP[type] || type;
      const res = await apiFetch(`/admin?action=all&type=entity&entity_type=${entityType}`);
      const data = await res.json();
      entitiesData = data.data || [];
      if (!Array.isArray(entitiesData)) entitiesData = [];
      allEntitiesCache[type] = entitiesData;
    }
    loading.style.display = 'none';
    table.style.display = 'table';
    renderEntitiesTable(type);
    // Preload other types in background for fast switching
    for (const t of ['people', 'organizations', 'resources']) {
      if (!allEntitiesCache[t] && t !== type) {
        const et = ENTITY_TYPE_MAP[t];
        apiFetch(`/admin?action=all&type=entity&entity_type=${et}`).then(r => r.json()).then(d => {
          allEntitiesCache[t] = d.data || [];
        }).catch(() => {});
      }
    }
  } catch (e) {
    loading.textContent = 'Failed to load entities.';
  }
}

function renderMergedTable() {
  // Merge active entity types into a single list
  entitiesData = [];
  for (const t of activeEntityTypes) {
    entitiesData.push(...(allEntitiesCache[t] || []));
  }

  // Unified columns: type + name/title + category + key detail + status
  const thead = document.getElementById('entities-thead');
  const tbody = document.getElementById('entities-tbody');
  const cols = ['type', 'name', 'category', 'detail', 'belief_regulatory_stance', 'status'];

  thead.innerHTML = '<tr>' +
    '<th style="width:30px"><input type="checkbox" onchange="toggleSelectAll(this)"></th>' +
    cols.map(c => {
      const arrow = sortCol === c ? (sortDir === 'asc' ? ' &#9650;' : ' &#9660;') : '';
      return `<th onclick="sortEntities('${c}')" style="cursor:pointer">${c.replace(/_/g, ' ')}<span class="sort-arrow">${arrow}</span></th>`;
    }).join('') +
    '<th>Actions</th></tr>';

  // Filter by search
  const search = (document.getElementById('entity-search').value || '').toLowerCase();
  let filtered = entitiesData;
  if (search) {
    filtered = entitiesData.filter(item =>
      Object.values(item).some(v => v != null && String(v).toLowerCase().includes(search))
    );
  }

  // Sort
  if (sortCol) {
    filtered = [...filtered].sort((a, b) => {
      let av, bv;
      if (sortCol === 'name') { av = (a.name || a.title || '').toLowerCase(); bv = (b.name || b.title || '').toLowerCase(); }
      else if (sortCol === 'type') { av = a._entityType; bv = b._entityType; }
      else if (sortCol === 'detail') { av = (a.title || a.website || a.resource_type || '').toLowerCase(); bv = (b.title || b.website || b.resource_type || '').toLowerCase(); }
      else { av = String(a[sortCol] || '').toLowerCase(); bv = String(b[sortCol] || '').toLowerCase(); }
      return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
    });
  }

  tbody.innerHTML = filtered.map(item => {
    const id = item.id;
    const t = item._entityType;
    const singular = FIELD_DEFS[t]?.singular || t;
    const name = item.name || item.resource_title || '';
    const detail = t === 'people' ? (item.title || item.primary_org || '') : t === 'organizations' ? (item.website || '') : (item.resource_type || item.resource_category || '');
    const typeLabel = t === 'people' ? 'Person' : t === 'organizations' ? 'Org' : 'Resource';
    const checked = selectedIds.has(`${t}-${id}`) ? 'checked' : '';

    return `<tr>
      <td><input type="checkbox" data-type="${t}" data-id="${id}" ${checked} onchange="toggleSelect('${t}',${id},this)"></td>
      <td><span style="font-family:var(--mono);font-size:9px;letter-spacing:0.04em;text-transform:uppercase;color:var(--text-tertiary);background:var(--bg-secondary);padding:1px 4px;border-radius:2px;">${typeLabel}</span></td>
      <td title="${escHtml(name)}">${escHtml(name)}</td>
      <td>${escHtml(item.category || '')}</td>
      <td title="${escHtml(detail)}">${escHtml(detail.length > 30 ? detail.slice(0, 30) + '...' : detail)}</td>
      <td>${escHtml(item.belief_regulatory_stance || '')}</td>
      <td><span class="badge badge-${item.status || 'pending'}">${item.status || 'pending'}</span></td>
      <td>
        <button class="btn btn-outline btn-sm" onclick="editEntity('${t}','${singular}',${id})">Edit</button>
        <button class="btn btn-red btn-sm" onclick="deleteEntity('${singular}',${id})">Del</button>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('entities-table').style.display = 'table';
}

function renderEntitiesTable(type) {
  const def = FIELD_DEFS[type];
  const cols = def.tableFields;
  const thead = document.getElementById('entities-thead');
  const tbody = document.getElementById('entities-tbody');

  // Header
  thead.innerHTML = '<tr>' +
    '<th style="width:30px"><input type="checkbox" onchange="toggleSelectAll(this)"></th>' +
    cols.map(c => {
      const arrow = sortCol === c ? (sortDir === 'asc' ? ' &#9650;' : ' &#9660;') : '';
      return `<th onclick="sortEntities('${c}')">${c.replace(/_/g, ' ')}<span class="sort-arrow">${arrow}</span></th>`;
    }).join('') +
    '<th>Actions</th></tr>';

  // Filter — searches ALL fields on the entity, not just visible table columns
  const search = (document.getElementById('entity-search').value || '').toLowerCase();
  let filtered = entitiesData;
  if (search) {
    filtered = entitiesData.filter(item =>
      Object.values(item).some(v => v != null && String(v).toLowerCase().includes(search))
    );
  }

  // Sort
  if (sortCol) {
    filtered = [...filtered].sort((a, b) => {
      const av = String(a[sortCol] || '').toLowerCase();
      const bv = String(b[sortCol] || '').toLowerCase();
      return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
    });
  }

  // Rows
  tbody.innerHTML = filtered.map(item => {
    const id = item.id;
    const isSelected = selectedIds.has(id);
    return '<tr class="' + (isSelected ? 'selected' : '') + '">' +
      `<td><input type="checkbox" ${isSelected ? 'checked' : ''} onchange="toggleSelect(${id}, this)"></td>` +
      cols.map(c => {
        const val = item[c] ?? '';
        if (c === 'status') {
          const cls = val === 'approved' ? 'badge-approved' : val === 'pending' ? 'badge-pending' : 'badge-rejected';
          return `<td><span class="badge ${cls}">${escHtml(val)}</span></td>`;
        }
        return `<td class="editable" title="${escHtml(String(val))}" onclick="inlineEdit(this, '${type}', ${id}, '${c}')">${escHtml(String(val))}</td>`;
      }).join('') +
      `<td style="white-space:nowrap">
        <button class="btn btn-outline btn-sm" onclick="editEntity('${type}','${FIELD_DEFS[type].singular}',${id})">Edit</button>
        <button class="btn btn-red btn-sm" onclick="deleteEntity('${FIELD_DEFS[type].singular}',${id})">Del</button>
      </td></tr>`;
  }).join('');
}

function sortEntities(col) {
  if (sortCol === col) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortCol = col;
    sortDir = 'asc';
  }
  renderEntitiesTable(currentSubTab);
}

function filterEntities() {
  renderEntitiesTable(currentSubTab);
}

// --- Inline edit ---
function inlineEdit(td, type, id, field) {
  if (td.querySelector('input, select')) return;
  const currentVal = td.textContent;
  const def = FIELD_DEFS[type];

  let input;
  if (field === 'category') {
    input = document.createElement('select');
    (def.categories || []).forEach(c => {
      const opt = document.createElement('option');
      opt.value = c; opt.textContent = c;
      if (c === currentVal) opt.selected = true;
      input.appendChild(opt);
    });
  } else if (field === 'status') {
    input = document.createElement('select');
    ['approved','pending','rejected'].forEach(s => {
      const opt = document.createElement('option');
      opt.value = s; opt.textContent = s;
      if (s === currentVal) opt.selected = true;
      input.appendChild(opt);
    });
  } else if (field === 'resource_type') {
    input = document.createElement('select');
    (FIELD_DEFS.resources.categories || []).forEach(c => {
      const opt = document.createElement('option');
      opt.value = c; opt.textContent = c;
      if (c === currentVal) opt.selected = true;
      input.appendChild(opt);
    });
  } else {
    input = document.createElement('input');
    input.type = 'text';
    input.value = currentVal;
  }

  td.textContent = '';
  td.appendChild(input);
  input.focus();

  const save = async () => {
    const newVal = input.value;
    if (newVal === currentVal) {
      td.textContent = currentVal;
      return;
    }
    td.textContent = 'Saving...';
    try {
      const res = await apiPost({ action: 'update_entity', entity_id: id, data: { [field]: newVal } });
      if (!res.ok) throw new Error();
      toast('Updated');
      loadEntities(type);
    } catch (e) {
      toast('Failed to update', true);
      td.textContent = currentVal;
    }
  };

  input.addEventListener('keydown', e => { if (e.key === 'Enter') save(); if (e.key === 'Escape') td.textContent = currentVal; });
  input.addEventListener('blur', save);
}

// --- Selection ---
function toggleSelect(id, checkbox) {
  if (checkbox.checked) selectedIds.add(id); else selectedIds.delete(id);
  checkbox.closest('tr').classList.toggle('selected', checkbox.checked);
  updateBulkButtons();
}

function toggleSelectAll(checkbox) {
  const tbody = document.getElementById('entities-tbody');
  tbody.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.checked = checkbox.checked;
    const id = parseInt(cb.getAttribute('onchange').match(/\d+/)[0]);
    if (checkbox.checked) selectedIds.add(id); else selectedIds.delete(id);
    cb.closest('tr').classList.toggle('selected', checkbox.checked);
  });
  updateBulkButtons();
}

function updateBulkButtons() {
  const show = selectedIds.size > 0;
  document.getElementById('bulk-approve-btn').style.display = show ? 'inline-flex' : 'none';
  document.getElementById('bulk-delete-btn').style.display = show ? 'inline-flex' : 'none';
}

async function bulkApprove() {
  if (!confirm(`Approve ${selectedIds.size} items?`)) return;
  for (const id of selectedIds) {
    await apiPost({ action: 'update_entity', entity_id: id, data: { status: 'approved' } });
  }
  toast(`Approved ${selectedIds.size} items`);
  selectedIds.clear();
  invalidateEntityCaches();
  loadEntities(currentSubTab);
}

async function bulkDelete() {
  if (!confirm(`Delete ${selectedIds.size} items? This cannot be undone.`)) return;
  for (const id of selectedIds) {
    await apiPost({ action: 'delete', entity_id: id });
  }
  toast(`Deleted ${selectedIds.size} items`);
  selectedIds.clear();
  invalidateEntityCaches();
  loadEntities(currentSubTab);
}

// --- Edit Modal ---
async function editEntity(type, singular, id) {
  const def = FIELD_DEFS[type];
  // Prefetch entity cache for autocomplete
  await getEntityCache();
  // Fetch current data
  let item = entitiesData.find(e => e.id === id);
  if (!item) {
    // Try fetching from API
    try {
      const entityType = ENTITY_TYPE_MAP[type] || type;
      const res = await apiFetch(`/admin?action=all&type=entity&entity_type=${entityType}`);
      const data = await res.json();
      item = (data.data || []).find(e => e.id === id);
    } catch (e) {}
  }
  if (!item) { toast('Could not load item', true); return; }

  let fieldsHtml = '';
  let hasNotes = false;
  def.fields.forEach(f => {
    const val = item[f] ?? '';
    const label = f.replace(/_/g, ' ');

    if (f === 'category' || f === 'resource_category') {
      fieldsHtml += `<div class="field"><label>${label}</label><select name="${f}">
        <option value="">—</option>
        ${(def.categories || []).map(c => `<option value="${c}" ${c === val ? 'selected' : ''}>${c}</option>`).join('')}
      </select></div>`;
    } else if (f === 'resource_type') {
      fieldsHtml += `<div class="field"><label>${label}</label><select name="${f}">
        <option value="">—</option>
        ${(FIELD_DEFS.resources.categories || []).map(c => `<option value="${c}" ${c === val ? 'selected' : ''}>${c}</option>`).join('')}
      </select></div>`;
    } else if (f === 'status') {
      fieldsHtml += `<div class="field"><label>${f}</label><select name="${f}">
        ${['approved','pending','rejected'].map(s => `<option value="${s}" ${s === val ? 'selected' : ''}>${s}</option>`).join('')}
      </select></div>`;
    } else if (FIELD_OPTIONS[f] && (f === 'belief_threat_models' || f === 'influence_type')) {
      // Checkbox group for multi-select fields
      const selected = String(val).split(',').map(s => s.trim()).filter(Boolean);
      fieldsHtml += `<div class="field"><label>${label}</label><div class="checkbox-group" data-field="${f}">
        ${FIELD_OPTIONS[f].map(opt => `<label><input type="checkbox" name="${f}" value="${opt}" ${selected.includes(opt) ? 'checked' : ''}> ${opt}</label>`).join('')}
      </div></div>`;
    } else if (FIELD_OPTIONS[f]) {
      // Select dropdown for fields with predefined options
      fieldsHtml += `<div class="field"><label>${label}</label><select name="${f}">
        <option value="">—</option>
        ${FIELD_OPTIONS[f].map(opt => `<option value="${opt}" ${opt === val ? 'selected' : ''}>${opt}</option>`).join('')}
      </select></div>`;
    } else if (f === 'thumbnail_url') {
      fieldsHtml += `<div class="field"><label>thumbnail</label>
        ${val ? `<img src="${escHtml(String(val))}" style="max-width:80px;max-height:80px;border-radius:4px;margin-bottom:0.3rem;display:block;">` : ''}
        <input type="file" name="thumbnail_file" accept="image/jpeg,image/png,image/webp" style="font-size:12px;">
        <input type="hidden" name="thumbnail_url" value="${escHtml(String(val))}">
      </div>`;
    } else if (f === 'notes') {
      hasNotes = true;
      fieldsHtml += `<div class="field"><label>${label}</label>
        <div class="tiptap-notes" id="admin-tiptap"></div>
        <textarea name="notes" class="hidden" style="display:none">${escHtml(String(val))}</textarea>
        <input type="hidden" name="notesHtml" value="${escHtml(item.notes_html || '')}">
        <input type="hidden" name="notesMentions" value="">
      </div>`;
    } else if (LINK_FIELDS[f]) {
      const linkDef = LINK_FIELDS[f];
      if (linkDef.multi) {
        // Multi-select tag input
        const existingTags = String(val).split(',').map(s => s.trim()).filter(Boolean);
        const tagsHtml = existingTags.map(t => `<span class="es-tag" data-value="${escHtml(t)}">${escHtml(t)}<span class="es-tag-remove">&times;</span></span>`).join('');
        fieldsHtml += `<div class="field"><label>${label}</label>
          <div class="entity-search-wrap" data-multi="true">
            <div class="tag-input-wrap">
              ${tagsHtml}
              <input type="text" class="es-input" data-link-field="${f}" data-search-type="${linkDef.searchType}" data-value-field="${linkDef.valueField || ''}" placeholder="Search..." autocomplete="off">
            </div>
            <input type="hidden" name="${f}" value="${escHtml(String(val))}">
            <div class="entity-search-results"></div>
          </div>
        </div>`;
      } else {
        // Single-value autocomplete
        const displayVal = linkDef.valueField === 'id' && val
          ? (_adminEntityCache?.[linkDef.searchType]?.find(e => e.id === parseInt(val))?.name || val)
          : val;
        fieldsHtml += `<div class="field"><label>${label}</label>
          <div class="entity-search-wrap">
            <input type="text" class="es-input" data-link-field="${f}" data-search-type="${linkDef.searchType}" data-value-field="${linkDef.valueField || ''}" value="${escHtml(String(displayVal))}" autocomplete="off">
            <input type="hidden" name="${f}" value="${escHtml(String(val))}">
            <div class="entity-search-results"></div>
          </div>
        </div>`;
      }
    } else if (f === 'resource_key_argument' || f === 'belief_regulatory_stance_detail') {
      fieldsHtml += `<div class="field"><label>${label}</label><textarea name="${f}">${escHtml(String(val))}</textarea></div>`;
    } else {
      fieldsHtml += `<div class="field"><label>${label}</label><input type="text" name="${f}" value="${escHtml(String(val))}"></div>`;
    }
  });

  const title = 'Edit ' + (item.name || item.resource_title || '');

  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h2>${escHtml(title)}</h2>
        <form id="edit-form">${fieldsHtml}</form>
        <div class="modal-actions">
          <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveEdit('${type}','${singular}',${id})">Save</button>
        </div>
      </div>
    </div>`;

  // Initialize TipTap on notes field if present
  if (hasNotes && typeof window.initTipTapEditors === 'function') {
    window.initTipTapEditors();
    const tiptapEl = document.querySelector('#admin-tiptap');
    if (tiptapEl && tiptapEl._editor && item.notes_html) {
      tiptapEl._editor.commands.setContent(item.notes_html);
    } else if (tiptapEl && tiptapEl._editor && item.notes) {
      tiptapEl._editor.commands.setContent(`<p>${escHtml(String(item.notes))}</p>`);
    }
  }

  // Wire up entity search autocomplete inputs
  document.querySelectorAll('#edit-form .es-input').forEach(input => {
    const wrap = input.closest('.entity-search-wrap');
    const resultsDiv = wrap.querySelector('.entity-search-results');
    const hidden = wrap.querySelector('input[type="hidden"]');
    const searchType = input.dataset.searchType;
    const valueField = input.dataset.valueField;
    const isMulti = wrap.dataset.multi === 'true';
    const tagWrap = wrap.querySelector('.tag-input-wrap');

    // For multi: update hidden from current tags
    function updateMultiHidden() {
      const tags = [...wrap.querySelectorAll('.es-tag')].map(t => t.dataset.value);
      hidden.value = tags.join(', ');
    }

    // For multi: add a tag
    function addTag(name) {
      const existing = [...wrap.querySelectorAll('.es-tag')].map(t => t.dataset.value);
      if (existing.includes(name)) return;
      const tag = document.createElement('span');
      tag.className = 'es-tag';
      tag.dataset.value = name;
      tag.innerHTML = `${escHtml(name)}<span class="es-tag-remove">&times;</span>`;
      tag.querySelector('.es-tag-remove').addEventListener('click', () => { tag.remove(); updateMultiHidden(); });
      tagWrap.insertBefore(tag, input);
      updateMultiHidden();
    }

    // Wire existing tag remove buttons
    if (isMulti) {
      wrap.querySelectorAll('.es-tag-remove').forEach(btn => {
        btn.addEventListener('click', () => { btn.parentElement.remove(); updateMultiHidden(); });
      });
      tagWrap.addEventListener('click', () => input.focus());
    }

    function selectResult(item) {
      if (isMulti) {
        addTag(item.dataset.name);
        input.value = '';
      } else {
        input.value = item.dataset.name;
        hidden.value = valueField === 'id' ? item.dataset.id : item.dataset.name;
      }
      resultsDiv.innerHTML = '';
    }

    input.addEventListener('input', () => {
      const q = input.value.trim();
      if (q.length < 2) { resultsDiv.innerHTML = ''; return; }
      const results = searchEntityCache(q, searchType);
      resultsDiv.innerHTML = results.map(e => `
        <div class="es-item" data-id="${e.id}" data-name="${escHtml(e.name)}">
          <span>${escHtml(e.name)}</span>
          <span class="es-item-cat">${escHtml(e.category || '')}</span>
        </div>`).join('');
      resultsDiv.querySelectorAll('.es-item').forEach(item => {
        item.addEventListener('click', () => selectResult(item));
      });
    });

    if (!isMulti && !valueField) {
      input.addEventListener('change', () => { hidden.value = input.value; });
    }
    input.addEventListener('blur', () => {
      setTimeout(() => {
        resultsDiv.innerHTML = '';
        if (!isMulti && !valueField) hidden.value = input.value;
      }, 200);
    });

    // Keyboard nav
    input.addEventListener('keydown', (e) => {
      const items = resultsDiv.querySelectorAll('.es-item');
      const active = resultsDiv.querySelector('.es-item.active');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        const next = active ? active.nextElementSibling : items[0];
        if (next) { active?.classList.remove('active'); next.classList.add('active'); next.scrollIntoView({ block: 'nearest' }); }
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        const prev = active?.previousElementSibling;
        if (prev) { active.classList.remove('active'); prev.classList.add('active'); prev.scrollIntoView({ block: 'nearest' }); }
      } else if (e.key === 'Enter') {
        e.preventDefault();
        const sel = active || items[0];
        if (sel) selectResult(sel);
      } else if (e.key === 'Escape') {
        resultsDiv.innerHTML = '';
      } else if (isMulti && e.key === 'Backspace' && !input.value) {
        const lastTag = tagWrap.querySelector('.es-tag:last-of-type');
        if (lastTag) { lastTag.remove(); updateMultiHidden(); }
      }
    });
  });
}

async function saveEdit(type, singular, id) {
  const form = document.getElementById('edit-form');
  const data = {};

  // Simple fields (inputs, selects, visible textareas)
  form.querySelectorAll('input:not([type="file"]):not([type="checkbox"]):not([type="hidden"]), select, textarea:not(.hidden)').forEach(el => {
    if (el.name) data[el.name] = el.value;
  });
  // Hidden fields
  form.querySelectorAll('input[type="hidden"]').forEach(el => {
    if (el.name && el.value) data[el.name] = el.value;
  });
  // Checkbox groups → comma-separated
  form.querySelectorAll('.checkbox-group').forEach(group => {
    const field = group.dataset.field;
    const checked = [...group.querySelectorAll('input:checked')].map(cb => cb.value);
    data[field] = checked.join(', ');
  });
  // TipTap notes
  const tiptapEl = document.querySelector('#admin-tiptap');
  if (tiptapEl && tiptapEl._editor) {
    data.notes = tiptapEl._editor.getText();
  }

  try {
    // Upload thumbnail if file selected
    const fileInput = form.querySelector('input[name="thumbnail_file"]');
    if (fileInput && fileInput.files.length > 0) {
      const formData = new FormData();
      formData.append('file', fileInput.files[0]);
      formData.append('type', singular);
      formData.append('id', String(id));
      const uploadRes = await fetch(`${API_BASE}/upload?key=${adminKey}`, { method: 'POST', body: formData });
      if (uploadRes.ok) {
        const result = await uploadRes.json();
        data.thumbnail_url = result.url;
      } else {
        toast('Thumbnail upload failed', true);
      }
    }
    const res = await apiPost({ action: 'update_entity', entity_id: id, data });
    if (!res.ok) throw new Error();
    toast('Updated');
    invalidateEntityCaches();
    closeModal();
    loadEntities(currentSubTab);
    loadPending();
  } catch (e) {
    toast('Failed to save', true);
  }
}

    if (!res.ok) throw new Error();

// --- Merge Queue ---
async function loadMergeQueue() {
  const loading = document.getElementById('merge-loading');
  const content = document.getElementById('merge-content');
  const empty = document.getElementById('merge-empty');
  loading.style.display = 'block';
  content.style.display = 'none';
  empty.style.display = 'none';
  content.innerHTML = '';

  try {
    const res = await apiFetch('/admin?action=pending_merges');
    if (!res.ok) {
      const errText = await res.text();
      throw new Error(`API error ${res.status}: ${errText}`);
    }
    const data = await res.json();
    loading.style.display = 'none';

    // API returns { entities: [...] } — each entity has pending_submissions[]
    const entities = data.entities || [];

    if (entities.length === 0) {
      empty.style.display = 'block';
      return;
    }

    // Group by entity_type for display
    const byType = { person: [], organization: [], resource: [] };
    entities.forEach(e => { (byType[e.entity_type] || byType.person).push(e); });

    let html = '';
    for (const [eType, label] of [['person','People'],['organization','Organizations'],['resource','Resources']]) {
      const group = byType[eType];
      if (group.length === 0) continue;
      html += `<div class="eyebrow" style="margin:1rem 0 0.5rem">${label} (${group.length})</div>`;
      group.forEach(entity => { html += renderMergeCard(entity); });
    }
    content.innerHTML = html;
    content.style.display = 'block';
  } catch (e) {
    loading.textContent = 'Failed to load merge queue: ' + e.message;
    console.error('Merge queue error:', e);
  }
}

// Fields to show in merge comparison (per entity_type)
const MERGE_FIELDS = {
  person:       ['category', 'title', 'primary_org', 'other_orgs', 'location', 'belief_regulatory_stance', 'belief_regulatory_stance_detail', 'belief_evidence_source', 'belief_agi_timeline', 'belief_ai_risk', 'belief_threat_models', 'influence_type', 'twitter', 'bluesky', 'notes'],
  organization: ['category', 'website', 'location', 'funding_model', 'belief_regulatory_stance', 'belief_regulatory_stance_detail', 'belief_evidence_source', 'belief_agi_timeline', 'belief_ai_risk', 'belief_threat_models', 'influence_type', 'twitter', 'bluesky', 'notes'],
  resource:     ['resource_category', 'resource_author', 'resource_type', 'resource_url', 'resource_year', 'resource_key_argument', 'belief_regulatory_stance', 'belief_agi_timeline', 'belief_ai_risk', 'notes'],
};

function renderMergeCard(entity) {
  const singular = entity.entity_type || 'person';
  const displayName = entity.name || entity.resource_title || 'Untitled';
  const pendingSubs = entity.pending_submissions || [];

  let subsHtml = '';
  pendingSubs.forEach(sub => {
    if (!sub || !sub.id) return;
    const llmReview = typeof sub.llm_review === 'string' ? JSON.parse(sub.llm_review) : (sub.llm_review || {});
    const stars = '★'.repeat(llmReview.quality || 0) + '☆'.repeat(5 - (llmReview.quality || 0));
    const selfBadge = sub.submitter_relationship === 'self' ? '<span class="self-badge">Self</span>' : '';
    const submittedDate = sub.submitted_at ? new Date(sub.submitted_at).toLocaleDateString() : '';

    // Build field comparison rows — sub columns are flat (no .data JSONB)
    let fieldsHtml = '';
    const fields = MERGE_FIELDS[singular] || MERGE_FIELDS.person;
    fields.forEach(f => {
      const currentVal = entity[f] ?? '';
      const submittedVal = sub[f] ?? '';
      // Only show fields where submitted value exists and differs from current
      if (submittedVal && String(submittedVal) !== String(currentVal)) {
        const fieldName = f.replace(/_/g, ' ');
        const radioName = `merge_${entity.id}_${sub.id}_${f}`;
        fieldsHtml += `
          <div class="merge-field" data-field="${f}">
            <div class="merge-field-label">${fieldName}</div>
            <div class="merge-options">
              <label><input type="radio" name="${radioName}" value="current" ${currentVal ? 'checked' : ''}> <span class="option-label">Keep:</span> ${escHtml(String(currentVal)) || '<em style="color:#888">(empty)</em>'}</label>
              <label><input type="radio" name="${radioName}" value="submitted" ${!currentVal ? 'checked' : ''}> <span class="option-label">Use submitted:</span> <span class="diff-highlight">${escHtml(String(submittedVal))}</span></label>
              <label><input type="radio" name="${radioName}" value="custom"> <span class="option-label">Custom:</span> <input type="text" class="custom-input" placeholder="Enter value..."></label>
            </div>
          </div>`;
      }
    });

    if (!fieldsHtml) {
      fieldsHtml = '<div style="color:var(--text-tertiary);font-size:13px;padding:0.5rem 0">No field differences detected.</div>';
    }

    subsHtml += `
      <div class="submission-review" data-submission-id="${sub.id}" data-entity-id="${entity.id}">
        <div class="submission-meta">
          Submitted ${submittedDate} ${sub.submitter_email ? `by ${escHtml(sub.submitter_email)}` : ''} &middot; ${stars} ${selfBadge}
        </div>
        ${fieldsHtml}
        <div class="merge-actions">
          <textarea placeholder="Resolution notes (optional)" class="resolution-notes"></textarea>
          <button class="btn btn-green" onclick="mergeSubmission(${entity.id}, ${sub.id})">Merge</button>
          <button class="btn btn-red btn-sm" onclick="rejectSubmission(${sub.id})">Reject</button>
        </div>
      </div>`;
  });

  return `
    <div class="pending-card" id="merge-${singular}-${entity.id}">
      <div class="pending-card-header">
        <div>
          <div class="pending-card-title">${escHtml(displayName)}</div>
          <div class="pending-card-meta">${singular} &middot; Ground truth entry</div>
        </div>
        <span class="badge badge-pending">${pendingSubs.length} to review</span>
      </div>
      ${subsHtml}
    </div>`;
}

async function mergeSubmission(entityId, submissionId) {
  const reviewEl = document.querySelector(`[data-submission-id="${submissionId}"]`);
  if (!reviewEl) return;

  const mergedData = {};
  reviewEl.querySelectorAll('.merge-field').forEach(field => {
    const fieldName = field.dataset.field;
    const selected = field.querySelector('input[type="radio"]:checked');
    if (!selected) return;
    if (selected.value === 'submitted') {
      const highlightSpan = field.querySelector('.diff-highlight');
      if (highlightSpan) mergedData[fieldName] = highlightSpan.textContent;
    } else if (selected.value === 'custom') {
      const customInput = field.querySelector('.custom-input');
      if (customInput && customInput.value.trim()) mergedData[fieldName] = customInput.value.trim();
    }
    // 'current' selected → don't include in mergedData (keep existing)
  });

  const resolutionNotes = reviewEl.querySelector('.resolution-notes')?.value || '';

  try {
    const res = await apiPost({
      action: 'merge',
      entity_id: entityId,
      submission_id: submissionId,
      merged_data: mergedData,
      resolution_notes: resolutionNotes,
    });
    if (!res.ok) throw new Error();
    toast('Merged');
    invalidateEntityCaches();
    loadMergeQueue();
    loadDashboard();
  } catch (e) {
    toast('Failed to merge', true);
    console.error(e);
  }
}

async function rejectSubmission(submissionId) {
  if (!confirm('Reject this submission?')) return;
  const reviewEl = document.querySelector(`[data-submission-id="${submissionId}"]`);
  const resolutionNotes = reviewEl?.querySelector('.resolution-notes')?.value || '';

  try {
    const res = await apiPost({
      action: 'reject_submission',
      submission_id: submissionId,
      resolution_notes: resolutionNotes,
    });
    if (!res.ok) throw new Error();
    toast('Rejected');
    loadMergeQueue();
    loadDashboard();
  } catch (e) {
    toast('Failed to reject', true);
    console.error(e);
  }
}
</script>
