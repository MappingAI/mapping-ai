# CI gate — runs on every PR and every push to non-main branches.
#
# These jobs are the candidate required status checks on `main`. Configure
# the branch protection rule in GitHub Settings → Branches once this has
# had a green run, so the gate is only enforced after it's proven green.
#
# Security posture:
# - `pull_request` (never `pull_request_target`) so fork PRs run without
#   repository secrets in scope. Nothing here exposes secrets to a fork.
# - Top-level `permissions: contents: read`. Individual jobs don't ask
#   for more.
# - Third-party actions pinned to commit SHAs, not mutable tags. The
#   intended semver is in a comment so Dependabot's bump PRs stay obvious.
# - `actions/checkout` uses `persist-credentials: false` to avoid leaving
#   GITHUB_TOKEN on disk after checkout.
#
# `pnpm install --frozen-lockfile` runs lifecycle scripts for packages listed
# in package.json's `onlyBuiltDependencies`. pnpm 10 defaults to blocking
# install scripts from other packages. If a devDep ever needs a blocked
# script, add it to `onlyBuiltDependencies` rather than loosening globally.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, type-check, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier format-check
        run: pnpm run format:check

      - name: ESLint
        run: pnpm run lint

      - name: TypeScript type-check
        run: pnpm run typecheck

      - name: Vitest
        run: pnpm test

      - name: Vite build
        run: pnpm run build

