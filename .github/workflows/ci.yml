# CI gate — runs on every PR and every non-main branch push.
#
# Jobs are required status checks on `main`; see docs/DEPLOYMENT.md for the
# GitHub branch protection configuration.
#
# Hardening notes:
# - Uses `pull_request`, never `pull_request_target`. Fork PRs run without
#   repository secrets, so nothing here leaks creds if a PR introduces
#   malicious code.
# - Top-level permissions are minimal (`contents: read`). Individual jobs
#   don't request more.
# - Third-party actions are pinned to commit SHAs rather than tags — a tag
#   can be silently rewritten; a commit SHA can't. Comments next to each
#   pin record the intended semver so updates stay obvious.
# - `actions/checkout` uses `persist-credentials: false` — avoids leaving
#   the GITHUB_TOKEN on disk after checkout.
# - `npm ci` runs lifecycle scripts by default (lefthook installs hooks
#   locally on developer machines, but on CI the `.git/hooks/` directory
#   is not used). If a future devDep starts doing something risky at
#   install, switch to `npm ci --ignore-scripts` and re-install the ones
#   we need explicitly.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, type-check, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier format-check
        run: npm run format:check

      - name: ESLint
        # --max-warnings is intentionally not set here. When the legacy a11y
        # warning count reaches zero (tracked in CONTRIBUTING.md), flip this
        # to `--max-warnings=0` so the ratchet can't slip backward.
        run: npm run lint

      - name: TypeScript type-check
        run: npm run type-check

      - name: Vitest
        run: npm test

      - name: Vite build
        run: npm run build

  sam-validate:
    name: SAM template validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Setup Python (SAM CLI dependency)
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@819220f63fb333a9a394dd0a5cab2d8303fd17e2 # v2
        with:
          use-installer: true

      - name: SAM validate
        run: sam validate --lint
