name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TipTap bundle
        run: pnpm run build:tiptap

      - name: Build with Vite
        run: pnpm exec vite build

      - name: Generate map-data.json from database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          pnpm exec tsx scripts/export-map-data.ts
          cp map-data.json dist/map-data.json
          if [ -f map-detail.json ]; then cp map-detail.json dist/map-detail.json; fi

      - name: Inject Cloudflare analytics token
        env:
          CF_ANALYTICS_TOKEN: ${{ secrets.CF_ANALYTICS_TOKEN }}
        run: |
          if [ -n "$CF_ANALYTICS_TOKEN" ]; then
            sed -i "s/__CF_ANALYTICS_TOKEN__/$CF_ANALYTICS_TOKEN/g" dist/*.html
            echo "✓ Cloudflare Web Analytics token injected"
          else
            echo "⚠ No CF_ANALYTICS_TOKEN set — analytics beacon will not fire"
          fi

      # Cloudflare Pages auto-deploys from GitHub on push to main.
      # This workflow handles pre-build steps (map-data generation,
      # analytics token injection) that Pages can't do
      # in its build command alone. The dist/ output here is NOT
      # uploaded anywhere — Pages builds independently from the same
      # commit and runs the same build steps via its own build config.
      #
      # TODO: consolidate so Pages build handles everything and this
      # workflow only runs the smoke test.

      - name: Wait for Cloudflare Pages build
        run: |
          echo "Waiting for Cloudflare Pages production deployment..."
          COMMIT=$(git rev-parse --short HEAD)
          for i in $(seq 1 30); do
            # Check if Pages has deployed this commit
            STATUS=$(curl -sf -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
              "https://api.cloudflare.com/client/v4/accounts/ac57c6d87068ab259c6f54dba468de8d/pages/projects/mapping-ai/deployments?sort_by=created_on&sort_order=desc" 2>/dev/null \
              | python3 -c "import sys,json; ds=json.load(sys.stdin).get('result',[]); print(ds[0]['latest_stage']['status'] if ds and ds[0].get('deployment_trigger',{}).get('metadata',{}).get('commit_hash','')[:7]=='$COMMIT' else 'waiting')" 2>/dev/null || echo "waiting")
            if [ "$STATUS" = "success" ]; then
              echo "✓ Cloudflare Pages deployment complete"
              break
            fi
            echo "  Build status: $STATUS (attempt $i/30)"
            sleep 10
          done

      - name: Post-deploy smoke test
        run: |
          FAILED=0
          for page in "/" "/contribute" "/map" "/about" "/insights" "/admin"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://mapping-ai.org${page}")
            if [ "$STATUS" -ne 200 ]; then
              echo "❌ FAIL: ${page} returned HTTP ${STATUS}"
              FAILED=1
            else
              echo "✓ ${page} — HTTP 200"
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "⚠️ POST-DEPLOY SMOKE TEST FAILED — some pages are not returning 200"
            echo "Check https://mapping-ai.org immediately"
            exit 1
          fi
          echo "✓ All pages healthy"
