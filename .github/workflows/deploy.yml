name: Deploy to S3 + CloudFront

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Write .env.production
        run: |
          cat > .env.production <<EOL
          VITE_API_BASE=https://j8jamvdf6i.execute-api.eu-west-2.amazonaws.com
          VITE_SITE_PASSWORD_HASH=__SITE_PASSWORD_HASH__
          EOL

      - name: Build with Vite
        run: npx vite build

      - name: Verify DB schema (smoke test)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          node -e "
          import pg from 'pg';
          const pool = new pg.Pool({ connectionString: process.env.DATABASE_URL, ssl: { rejectUnauthorized: false } });
          const client = await pool.connect();
          try {
            // Verify new tables exist
            for (const t of ['entity', 'submission', 'edge']) {
              await client.query('SELECT 1 FROM ' + t + ' LIMIT 0');
              console.log('  ✓ ' + t + ' exists');
            }
            // Verify old tables are gone
            for (const t of ['people', 'organizations', 'resources', 'submissions', 'relationships', 'person_organizations']) {
              try { await client.query('SELECT 1 FROM ' + t + ' LIMIT 0'); console.error('  ✗ OLD TABLE ' + t + ' still exists!'); process.exit(1); }
              catch { console.log('  ✓ ' + t + ' dropped'); }
            }
          } finally { client.release(); await pool.end(); }
          "

      - name: Generate map-data.json from database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          node scripts/export-map-data.js
          cp map-data.json dist/map-data.json
          if [ -f map-detail.json ]; then cp map-detail.json dist/map-detail.json; fi

      # PASSWORD GATE — remove after public launch
      - name: Inject password gate hash
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: |
          if [ -n "$SITE_PASSWORD" ]; then
            HASH=$(echo -n "$SITE_PASSWORD" | sha256sum | cut -d' ' -f1)
            sed -i "s/__SITE_PASSWORD_HASH__/$HASH/g" dist/map.html dist/contribute.html dist/assets/*.js
            echo "✓ Password gate hash injected"
          else
            echo "⚠ No SITE_PASSWORD set — gate will auto-bypass"
          fi

      - name: Inject Cloudflare analytics token
        env:
          CF_ANALYTICS_TOKEN: ${{ secrets.CF_ANALYTICS_TOKEN }}
        run: |
          if [ -n "$CF_ANALYTICS_TOKEN" ]; then
            sed -i "s/__CF_ANALYTICS_TOKEN__/$CF_ANALYTICS_TOKEN/g" dist/*.html
            echo "✓ Cloudflare Web Analytics token injected"
          else
            echo "⚠ No CF_ANALYTICS_TOKEN set — analytics beacon will not fire"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Sync static files to S3 (with cache headers)
        run: |
          # HTML files — always revalidate so users get latest on deploy
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache" \
            --delete

          # map-data.json + map-detail.json — short cache, stale-while-revalidate
          aws s3 cp dist/map-data.json s3://${{ secrets.S3_BUCKET_NAME }}/map-data.json \
            --cache-control "public, max-age=60, stale-while-revalidate=300"
          if [ -f dist/map-detail.json ]; then
            aws s3 cp dist/map-detail.json s3://${{ secrets.S3_BUCKET_NAME }}/map-detail.json \
              --cache-control "public, max-age=60, stale-while-revalidate=300"
          fi

          # Hashed assets (JS/CSS) — immutable, long cache
          # No --delete: S3 assets/ also has legacy static files (favicon/, images/)
          # used by map.html. Old hashed files are harmless (never referenced).
          aws s3 sync dist/assets/ s3://${{ secrets.S3_BUCKET_NAME }}/assets/ \
            --cache-control "public, max-age=31536000, immutable"

          # Workshop subdirectory
          if [ -d dist/workshop ]; then
            aws s3 sync dist/workshop/ s3://${{ secrets.S3_BUCKET_NAME }}/workshop/ \
              --cache-control "no-cache" \
              --delete
          fi

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
