# Per-PR Neon branch scaffolding (Phase 2.2).
#
# When a PR that touches backend/DB code is opened or reopened, create a Neon
# branch seeded from prod so the PR gets an isolated database. When the PR is
# closed or merged, delete that branch so we stay within Neon's free-tier
# 10-branch ceiling.
#
# PRs that only touch frontend, docs, CI config, or dependencies skip branch
# creation entirely.
#
# NOT YET WIRED:
#   - Does NOT wire the branch URL into a preview deploy. That is Phase 4.1;
#     this file is the shape, not the full feature.
#
# Security posture matches .github/workflows/ci.yml:
#   - `pull_request_target` here is needed so we have the NEON_API_KEY secret on
#     PRs from forks. We do NOT check out PR-fork code in any job, so the secret
#     is not exposed to untrusted code. Any future step that does check out PR
#     code must set `ref: ${{ github.event.pull_request.head.sha }}` and must not
#     have `NEON_API_KEY` in its env.
#   - Third-party actions pinned to commit SHAs (semver in comments for Dependabot).
#   - Top-level `permissions: pull-requests: write` so the branch URL can be
#     posted as a PR comment; nothing else.

name: Neon preview branch

on:
  pull_request_target:
    types: [opened, reopened, closed]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: neon-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  check-relevance:
    name: Check if PR needs a preview DB
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      needs_branch: ${{ steps.check_files.outputs.needs_branch }}
    steps:
      - name: Check changed files
        id: check_files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch the list of files changed in this PR
          FILES=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files \
            --paginate --jq '.[].filename')

          # Backend/DB patterns that warrant a preview branch
          NEEDS_BRANCH=false
          while IFS= read -r file; do
            case "$file" in
              api/*|functions/*|scripts/migrate*|scripts/seed*|scripts/enrich-*|template.yaml)
                NEEDS_BRANCH=true
                break
                ;;
            esac
          done <<< "$FILES"

          echo "needs_branch=$NEEDS_BRANCH" >> "$GITHUB_OUTPUT"
          if [ "$NEEDS_BRANCH" = "true" ]; then
            echo "PR touches backend/DB files; preview branch needed"
          else
            echo "PR is frontend/docs/deps only; skipping preview branch"
          fi

  require-secret:
    name: Verify NEON_API_KEY is configured
    needs: check-relevance
    if: needs.check-relevance.outputs.needs_branch == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Fail loudly if NEON_API_KEY is missing
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: |
          if [ -z "${NEON_API_KEY:-}" ]; then
            echo "::error::NEON_API_KEY secret is not set. Add it at https://github.com/MappingAI/mapping-ai/settings/secrets/actions and rerun this workflow."
            exit 1
          fi

  create-branch:
    name: Create Neon branch for PR
    needs: [check-relevance, require-secret]
    if: needs.check-relevance.outputs.needs_branch == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check if Neon branch already exists
        id: check_branch
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: |
          BRANCH_NAME="preview/pr-${{ github.event.pull_request.number }}"
          COUNT=$(curl -sf \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            "https://console.neon.tech/api/v2/projects/calm-tree-46517731/branches?search=${BRANCH_NAME}" \
            | jq --arg name "$BRANCH_NAME" '[.branches[] | select(.name == $name)] | length')
          if [ "$COUNT" -gt 0 ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Branch ${BRANCH_NAME} already exists; skipping create"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Neon branch
        if: steps.check_branch.outputs.exists == 'false'
        # neondatabase/create-branch-action@v6.4.0 (SHA-pinned for prod use).
        uses: neondatabase/create-branch-action@72ed4f69a12b6be9c16aebfad893f6a21e9aba8b # v6.4.0
        id: create_branch
        with:
          project_id: calm-tree-46517731
          parent_branch: production
          branch_name: preview/pr-${{ github.event.pull_request.number }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Comment branch URL on PR
        if: steps.check_branch.outputs.exists == 'false'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BRANCH_HOST: ${{ steps.create_branch.outputs.host }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = [
              '### Neon preview branch ready',
              '',
              '```',
              `branch: preview/pr-${process.env.PR_NUMBER}`,
              `host:   ${process.env.BRANCH_HOST}`,
              '```',
              '',
              'The full connection string is available to workflow steps on this PR',
              'via the `db_url` output of the Neon create-branch action. It is NOT',
              'printed here because the output includes the password, and posting it',
              'as a PR comment would leak that credential in email notifications.',
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  delete-branch:
    name: Delete Neon branch on PR close
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check if NEON_API_KEY exists
        id: has_secret
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: |
          if [ -n "${NEON_API_KEY:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if Neon branch exists
        if: steps.has_secret.outputs.available == 'true'
        id: check_branch
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: |
          BRANCH_NAME="preview/pr-${{ github.event.pull_request.number }}"
          COUNT=$(curl -sf \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            "https://console.neon.tech/api/v2/projects/calm-tree-46517731/branches?search=${BRANCH_NAME}" \
            | jq --arg name "$BRANCH_NAME" '[.branches[] | select(.name == $name)] | length')
          if [ "$COUNT" -gt 0 ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Branch ${BRANCH_NAME} not found; skipping delete"
          fi

      - name: Delete Neon branch
        if: steps.check_branch.outputs.exists == 'true'
        # neondatabase/delete-branch-action@v3.2.1 (SHA-pinned for prod use).
        uses: neondatabase/delete-branch-action@4468d825d5a88ef4012f1705a82f02ec3072f776 # v3.2.1
        with:
          project_id: calm-tree-46517731
          branch: preview/pr-${{ github.event.pull_request.number }}
          api_key: ${{ secrets.NEON_API_KEY }}
