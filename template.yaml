AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: mapping-ai — Static hosting (S3 + CloudFront) + API (Lambda + API Gateway)

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        DATABASE_URL: !Ref DatabaseUrl

Parameters:
  AcmCertificateArn:
    Type: String
    Default: 'arn:aws:acm:us-east-1:561047280976:certificate/8a05baf0-3b6b-492f-a0bd-db625b46a5a8'
    Description: ACM certificate ARN (us-east-1) covering mapping-ai.org + aimapping.org + wildcards
  DatabaseUrl:
    Type: String
    NoEcho: true
    Description: Postgres connection string (AWS RDS)
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Description: Anthropic API key for LLM submission review
    Default: ''
  AnthropicSemanticSearchKey:
    Type: String
    NoEcho: true
    Description: Anthropic API key for semantic search (separate from submission review)
    Default: ''
  AdminKey:
    Type: String
    NoEcho: true
    Description: Admin API key for protected endpoints (admin, upload, search admin features)
    Default: ''

Resources:
  # ==================== API (Lambda + API Gateway) ====================
  MappingAiApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - 'https://mapping-ai.org'
          - 'https://www.mapping-ai.org'
          - 'https://aimapping.org'
          - 'https://www.aimapping.org'
          - 'https://mapping-ai.pages.dev'
          - !Sub 'https://${WebsiteBucket}.s3.${AWS::Region}.amazonaws.com'
          - !Sub 'https://${CloudFrontDistribution.DomainName}'
          - 'http://localhost:3000'
          - 'http://localhost:4000'
          - 'http://localhost:5000'
          - 'http://localhost:5173'
          - 'http://localhost:5500'
          - 'http://localhost:8000'
          - 'http://localhost:8080'
          - 'http://127.0.0.1:3000'
          - 'http://127.0.0.1:5000'
          - 'http://127.0.0.1:5173'
          - 'http://127.0.0.1:5500'
        AllowHeaders:
          - Content-Type
          - X-Admin-Key
          - X-Contributor-Key
        AllowMethods:
          - GET
          - POST
          - OPTIONS
      DefaultRouteSettings:
        ThrottlingRateLimit: 100
        ThrottlingBurstLimit: 200
      RouteSettings:
        'GET /semantic-search':
          ThrottlingRateLimit: 1
          ThrottlingBurstLimit: 3

  # Lambda handlers are TypeScript (`api/*.ts`) and get bundled via SAM's
  # esbuild BuildMethod. `Metadata.BuildMethod: esbuild` tells SAM CLI to
  # compile + bundle at `sam build` time; the deployed artefact is JS.
  #
  # `External` keeps heavy/runtime-provided packages out of the Lambda bundle:
  #   - `pg` has native bindings; bundling breaks them.
  #   - `@anthropic-ai/sdk` is large; leaving it external shrinks cold-start.
  #   - `@aws-sdk/*` is pre-installed in the Lambda Node 20 runtime.
  # Lambda still resolves them from `node_modules` at runtime because SAM
  # installs them from `package.json` into each function's build directory.
  SubmitFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: false
        EntryPoints:
          - api/submit.ts
        External:
          - pg
          - '@anthropic-ai/sdk'
          - '@aws-sdk/client-s3'
          - '@aws-sdk/client-cloudfront'
    Properties:
      FunctionName: mapping-ai-submit
      Handler: submit.handler
      Timeout: 15
      Environment:
        Variables:
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
      Events:
        Submit:
          Type: HttpApi
          Properties:
            ApiId: !Ref MappingAiApi
            Path: /submit
            Method: POST

  SearchFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: false
        EntryPoints:
          - api/search.ts
        External:
          - pg
          - '@anthropic-ai/sdk'
          - '@aws-sdk/client-s3'
          - '@aws-sdk/client-cloudfront'
    Properties:
      FunctionName: mapping-ai-search
      Handler: search.handler
      Environment:
        Variables:
          ADMIN_KEY: !Ref AdminKey
      Events:
        Search:
          Type: HttpApi
          Properties:
            ApiId: !Ref MappingAiApi
            Path: /search
            Method: GET

  SemanticSearchFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: false
        EntryPoints:
          - api/semantic-search.ts
        External:
          - pg
          - '@anthropic-ai/sdk'
          - '@aws-sdk/client-s3'
          - '@aws-sdk/client-cloudfront'
    Properties:
      FunctionName: mapping-ai-semantic-search
      Handler: semantic-search.handler
      Timeout: 30
      Environment:
        Variables:
          ANTHROPIC_SEMANTIC_SEARCH_KEY: !Ref AnthropicSemanticSearchKey
      Events:
        SemanticSearch:
          Type: HttpApi
          Properties:
            ApiId: !Ref MappingAiApi
            Path: /semantic-search
            Method: GET

  AdminFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: false
        EntryPoints:
          - api/admin.ts
        External:
          - pg
          - '@anthropic-ai/sdk'
          - '@aws-sdk/client-s3'
          - '@aws-sdk/client-cloudfront'
    Properties:
      FunctionName: mapping-ai-admin
      Handler: admin.handler
      Timeout: 30
      Environment:
        Variables:
          ADMIN_KEY: !Ref AdminKey
          S3_BUCKET: !Ref WebsiteBucket
          CF_DISTRIBUTION_ID: !Ref CloudFrontDistribution
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref WebsiteBucket
        - Statement:
            - Effect: Allow
              Action: cloudfront:CreateInvalidation
              Resource: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'
      Events:
        AdminGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref MappingAiApi
            Path: /admin
            Method: GET
        AdminPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref MappingAiApi
            Path: /admin
            Method: POST

  UploadFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: false
        EntryPoints:
          - api/upload.ts
        External:
          - pg
          - '@anthropic-ai/sdk'
          - '@aws-sdk/client-s3'
          - '@aws-sdk/client-cloudfront'
    Properties:
      FunctionName: mapping-ai-upload
      Handler: upload.handler
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          ADMIN_KEY: !Ref AdminKey
          THUMBNAIL_BUCKET: !Ref WebsiteBucket
          CLOUDFRONT_DOMAIN: !GetAtt CloudFrontDistribution.DomainName
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref WebsiteBucket
      Events:
        Upload:
          Type: HttpApi
          Properties:
            ApiId: !Ref MappingAiApi
            Path: /upload
            Method: POST

  SubmissionsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: false
        EntryPoints:
          - api/submissions.ts
        External:
          - pg
          - '@anthropic-ai/sdk'
          - '@aws-sdk/client-s3'
          - '@aws-sdk/client-cloudfront'
    Properties:
      FunctionName: mapping-ai-submissions
      Handler: submissions.handler
      Events:
        Submissions:
          Type: HttpApi
          Properties:
            ApiId: !Ref MappingAiApi
            Path: /submissions
            Method: GET

  # ==================== Static Hosting (S3 + CloudFront) ====================
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'mapping-ai-website-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontAccess
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${WebsiteBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  SecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub 'mapping-ai-security-headers-${AWS::AccountId}'
        SecurityHeadersConfig:
          ContentSecurityPolicy:
            ContentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline' https://d3js.org https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; frame-src 'self'; frame-ancestors 'self'"
            Override: true
          FrameOptions:
            FrameOption: SAMEORIGIN
            Override: true
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 31536000
            IncludeSubdomains: true
            Override: true
            Preload: false
          ContentTypeOptions:
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true

  CloudFrontOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub 'mapping-ai-oac-${AWS::AccountId}'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # CloudFront Function: rewrites clean URLs (/contribute → /contribute.html)
  UrlRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub 'mapping-ai-url-rewrite-${AWS::AccountId}'
      AutoPublish: true
      FunctionConfig:
        Comment: Rewrite clean URLs to .html
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
            var request = event.request;
            var uri = request.uri;
            if (uri.endsWith('/')) {
                request.uri += 'index.html';
            } else if (!uri.includes('.')) {
                request.uri += '.html';
            }
            return request;
        }

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: Mapping AI static website
        DefaultRootObject: index.html
        HttpVersion: http2
        PriceClass: PriceClass_100
        # Custom domains
        Aliases:
          - mapping-ai.org
          - www.mapping-ai.org
          - aimapping.org
          - www.aimapping.org
        ViewerCertificate:
          AcmCertificateArn: !Ref AcmCertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOriginAccessControl
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # Managed-CachingOptimized
          ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt UrlRewriteFunction.FunctionARN

Outputs:
  ApiUrl:
    Description: API Gateway URL — use this as API_BASE in script.js
    Value: !Sub 'https://${MappingAiApi}.execute-api.${AWS::Region}.amazonaws.com'

  WebsiteBucketName:
    Description: S3 bucket for static files — use this for deployment
    Value: !Ref WebsiteBucket

  CloudFrontUrl:
    Description: CloudFront URL — your site is live here (use for testing)
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'

  CloudFrontDistributionId:
    Description: CloudFront distribution ID — use for cache invalidation
    Value: !Ref CloudFrontDistribution
