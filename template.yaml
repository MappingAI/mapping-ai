AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: mapping-ai — Static hosting (S3 + CloudFront) + API (Lambda + API Gateway)

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        DATABASE_URL: !Ref DatabaseUrl

Parameters:
  DatabaseUrl:
    Type: String
    NoEcho: true
    Description: Postgres connection string (from Neon)

Resources:
  # ==================== API (Lambda + API Gateway) ====================
  MappingAiApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - 'https://aimapping.org'
          - 'https://www.aimapping.org'
          - !Sub 'https://${WebsiteBucket}.s3.${AWS::Region}.amazonaws.com'
          - !Sub 'https://${CloudFrontDistribution.DomainName}'
        AllowHeaders:
          - Content-Type
        AllowMethods:
          - GET
          - POST
          - OPTIONS
      DefaultRouteSettings:
        ThrottlingRateLimit: 10
        ThrottlingBurstLimit: 20

  SubmitFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mapping-ai-submit
      Handler: api/submit.handler
      Events:
        Submit:
          Type: HttpApi
          Properties:
            ApiId: !Ref MappingAiApi
            Path: /submit
            Method: POST

  SearchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mapping-ai-search
      Handler: api/search.handler
      Events:
        Search:
          Type: HttpApi
          Properties:
            ApiId: !Ref MappingAiApi
            Path: /search
            Method: GET

  AdminFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mapping-ai-admin
      Handler: api/admin.handler
      Environment:
        Variables:
          ADMIN_KEY: 'mappingai-admin-2026'
      Events:
        AdminGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref MappingAiApi
            Path: /admin
            Method: GET
        AdminPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref MappingAiApi
            Path: /admin
            Method: POST

  SubmissionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mapping-ai-submissions
      Handler: api/submissions.handler
      Events:
        Submissions:
          Type: HttpApi
          Properties:
            ApiId: !Ref MappingAiApi
            Path: /submissions
            Method: GET

  # ==================== Static Hosting (S3 + CloudFront) ====================
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'mapping-ai-website-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontAccess
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${WebsiteBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  CloudFrontOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub 'mapping-ai-oac-${AWS::AccountId}'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: Mapping AI static website
        DefaultRootObject: index.html
        HttpVersion: http2
        PriceClass: PriceClass_100
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOriginAccessControl
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # Managed-CachingOptimized
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

Outputs:
  ApiUrl:
    Description: API Gateway URL — use this as API_BASE in script.js
    Value: !Sub 'https://${MappingAiApi}.execute-api.${AWS::Region}.amazonaws.com'

  WebsiteBucketName:
    Description: S3 bucket for static files — use this for deployment
    Value: !Ref WebsiteBucket

  CloudFrontUrl:
    Description: CloudFront URL — your site is live here (use for testing)
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'

  CloudFrontDistributionId:
    Description: CloudFront distribution ID — use for cache invalidation
    Value: !Ref CloudFrontDistribution
