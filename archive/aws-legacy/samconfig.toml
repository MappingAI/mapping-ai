version = 0.1

[default.deploy.parameters]
stack_name = "mapping-ai"
resolve_s3 = true
s3_prefix = "mapping-ai"
region = "eu-west-2"
confirm_changeset = true
capabilities = "CAPABILITY_IAM"
image_repositories = []
# DatabaseUrl and AdminKey are passed at deploy time via --parameter-overrides, never committed
# Example: sam deploy --parameter-overrides DatabaseUrl=$DATABASE_URL AdminKey=$ADMIN_KEY AnthropicApiKey=$ANTHROPIC_API_KEY

[default.global.parameters]
region = "eu-west-2"
