<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map — Mapping AI</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap');
:root {
  --serif: 'EB Garamond', Georgia, serif;
  --mono: 'DM Mono', monospace;
  --text-primary: #1a1a1a;
  --text-secondary: #555;
  --text-tertiary: #888;
  --border: #ddd;
  --bg: #f0eeeb;
  --bg-secondary: #f8f7f5;
  --accent: #2563eb;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); font-family: var(--serif); color: var(--text-primary); overflow: hidden; height: 100vh; }

/* Nav */
.site-nav {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 2rem; height: 48px;
  background: #fff; border-bottom: 0.5px solid var(--border);
  z-index: 100;
}
.nav-brand {
  font-family: var(--mono); font-size: 12px;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-primary); text-decoration: none;
}
.nav-links { display: flex; gap: 2rem; }
.nav-links a {
  font-family: var(--mono); font-size: 12px;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-tertiary); text-decoration: none;
  transition: color 0.15s; position: relative;
}
.nav-links a::after {
  content: ''; position: absolute; bottom: -3px; left: 0;
  width: 0; height: 1px; background: var(--text-primary);
  transition: width 0.2s ease;
}
.nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
.nav-links a:hover, .nav-links a.active { color: var(--text-primary); }

/* Main layout */
.map-container {
  position: fixed; top: 48px; left: 0; right: 0; bottom: 0;
}

/* Controls */
.controls {
  position: fixed; top: 60px; left: 1rem;
  display: flex; flex-direction: column; gap: 0.5rem;
  z-index: 50;
}
.control-group {
  background: #fff; border-radius: 8px;
  padding: 0.75rem 1rem;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  border: 1px solid var(--border);
}
.control-group h3 {
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-tertiary); margin-bottom: 0.5rem;
}
.view-toggles { display: flex; gap: 0.25rem; }
.view-btn {
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.04em; text-transform: uppercase;
  padding: 0.35rem 0.65rem; border: 1px solid var(--border);
  background: #fff; color: var(--text-secondary);
  border-radius: 4px; cursor: pointer; transition: all 0.15s;
}
.view-btn:hover { border-color: var(--text-secondary); }
.view-btn.active { background: var(--text-primary); color: #fff; border-color: var(--text-primary); }

.filter-chips { display: flex; flex-wrap: wrap; gap: 0.25rem; max-width: 200px; }
.chip {
  font-family: var(--mono); font-size: 9px;
  letter-spacing: 0.03em;
  padding: 0.25rem 0.5rem; border-radius: 3px;
  cursor: pointer; transition: all 0.15s;
  border: 1px solid transparent;
  opacity: 0.5;
}
.chip.active { opacity: 1; border-color: rgba(0,0,0,0.2); }
.chip:hover { opacity: 0.8; }

/* Detail panel */
.detail-panel {
  position: fixed; top: 48px; right: 0; bottom: 0;
  width: 340px; background: #fff;
  border-left: 1px solid var(--border);
  z-index: 50; transform: translateX(100%);
  transition: transform 0.25s ease;
  overflow-y: auto; padding: 1.5rem;
}
.detail-panel.open { transform: translateX(0); }
.detail-close {
  position: absolute; top: 1rem; right: 1rem;
  background: none; border: none; cursor: pointer;
  font-size: 18px; color: var(--text-tertiary);
  font-family: var(--mono);
}
.detail-close:hover { color: var(--text-primary); }
.detail-name {
  font-family: var(--serif); font-size: 22px;
  font-weight: 500; margin-bottom: 0.25rem;
  padding-right: 2rem;
}
.detail-type {
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-tertiary); margin-bottom: 1rem;
}
.detail-category {
  display: inline-block; padding: 0.2rem 0.6rem;
  border-radius: 3px; font-family: var(--mono);
  font-size: 10px; letter-spacing: 0.04em;
  margin-bottom: 1rem;
}
.detail-fields { display: flex; flex-direction: column; gap: 0.75rem; }
.detail-field label {
  font-family: var(--mono); font-size: 9px;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-tertiary); display: block;
  margin-bottom: 0.15rem;
}
.detail-field span {
  font-family: var(--serif); font-size: 15px;
  color: var(--text-primary); line-height: 1.5;
}

/* Zoom controls */
.zoom-controls {
  position: fixed; bottom: 1.5rem; right: 1.5rem;
  display: flex; flex-direction: column; gap: 0.25rem;
  z-index: 50;
}
.zoom-btn {
  width: 36px; height: 36px;
  background: #fff; border: 1px solid var(--border);
  border-radius: 6px; cursor: pointer;
  font-family: var(--mono); font-size: 16px;
  color: var(--text-secondary);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.zoom-btn:hover { border-color: var(--text-secondary); color: var(--text-primary); }

/* Entity count */
.entity-count {
  position: fixed; bottom: 1.5rem; left: 1rem;
  font-family: var(--mono); font-size: 11px;
  color: var(--text-tertiary); letter-spacing: 0.04em;
  background: rgba(255,255,255,0.9); padding: 0.4rem 0.75rem;
  border-radius: 4px; border: 1px solid var(--border);
  z-index: 50;
}

/* D3 styles */
.cluster-label {
  font-family: var(--mono);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  fill: var(--text-secondary);
  pointer-events: none;
}
.node { cursor: pointer; }
.node:hover .node-circle { filter: brightness(1.1); }
.node-label {
  font-family: var(--mono);
  fill: var(--text-secondary);
  pointer-events: none;
}
.connection-line {
  stroke: var(--border);
  stroke-width: 0.5;
  stroke-dasharray: 2,2;
  opacity: 0.4;
}
.cluster-bg {
  stroke: none;
  opacity: 0.06;
}

/* Hamburger */
.nav-hamburger {
  display: none; flex-direction: column; justify-content: center;
  gap: 5px; background: none; border: none; cursor: pointer; padding: 4px;
}
.nav-hamburger span { display: block; width: 20px; height: 1.5px; background: var(--text-primary); }
@media (max-width: 600px) {
  .site-nav { padding: 0 1rem; }
  .nav-hamburger { display: flex; }
  .nav-links {
    display: none; position: absolute; top: 48px; left: 0; right: 0;
    background: #fff; border-bottom: 0.5px solid var(--border);
    flex-direction: column; padding: 1rem 1.5rem; gap: 1rem;
  }
  .nav-links.open { display: flex; }
  .controls { top: 56px; left: 0.5rem; }
  .control-group { padding: 0.5rem 0.75rem; }
  .detail-panel { width: 100%; }
}
</style>
</head>
<body>

<nav class="site-nav">
  <a class="nav-brand" href="/">Mapping AI</a>
  <button class="nav-hamburger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <div class="nav-links">
    <a href="/">Background</a>
    <a href="/theoryofchange.html">Theory of Change</a>
    <a href="/contribute.html">Take Part</a>
    <a href="/map.html">Map</a>
    <a href="/about.html">About Us</a>
  </div>
</nav>

<div class="controls">
  <div class="control-group">
    <h3>View</h3>
    <div class="view-toggles">
      <button class="view-btn active" data-view="orgs">Organizations</button>
      <button class="view-btn" data-view="people">People</button>
      <button class="view-btn" data-view="all">All</button>
    </div>
  </div>
  <div class="control-group" id="stance-filters">
    <h3>Regulatory Stance</h3>
    <div class="filter-chips" id="stance-chips"></div>
  </div>
  <div class="control-group" id="category-filters">
    <h3>Category</h3>
    <div class="filter-chips" id="category-chips"></div>
  </div>
</div>

<div class="detail-panel" id="detail-panel">
  <button class="detail-close" id="detail-close">&times;</button>
  <div id="detail-content"></div>
</div>

<div class="map-container" id="map-container"></div>

<div class="zoom-controls">
  <button class="zoom-btn" id="zoom-in">+</button>
  <button class="zoom-btn" id="zoom-out">&minus;</button>
  <button class="zoom-btn" id="zoom-reset" style="font-size:12px;">&#9678;</button>
</div>

<div class="entity-count" id="entity-count"></div>

<script>
// Category colors (muted, between colorful and minimal)
const CATEGORY_COLORS = {
  'Frontier Lab':          '#c45a3c',
  'AI Safety/Alignment':   '#3c8a6e',
  'Think Tank/Policy Org': '#5b7fb5',
  'Government/Agency':     '#7a6aad',
  'Academic':              '#c4913c',
  'VC/Capital/Philanthropy':'#4a9a8a',
  'Labor/Civil Society':   '#c47a5a',
  'Media/Journalism':      '#8a7a5a',
  'Political Campaign/PAC':'#9a5a7a',
  'Ethics/Bias/Rights':    '#5aaa8a',
  // People categories
  'Policymaker':           '#7a6aad',
  'Executive':             '#c45a3c',
  'Researcher':            '#3c8a6e',
  'Investor':              '#4a9a8a',
  'Organizer':             '#c47a5a',
  'Journalist':            '#8a7a5a',
  'Cultural figure':       '#9a5a7a',
};

const DEFAULT_COLOR = '#8a8a8a';

function getColor(category) {
  return CATEGORY_COLORS[category] || DEFAULT_COLOR;
}

// State
let currentView = 'orgs';
let activeCategories = new Set();
let activeStances = new Set();
let allData = { people: [], organizations: [] };
let simulation = null;

// Load data
fetch('map-data.json')
  .then(r => r.json())
  .then(data => {
    allData = data;
    buildFilters();
    render();
  });

function buildFilters() {
  // Category chips
  const orgCats = [...new Set(allData.organizations.map(d => d.category).filter(Boolean))].sort();
  const peopleCats = [...new Set(allData.people.map(d => d.category).filter(Boolean))].sort();
  const allCats = [...new Set([...orgCats, ...peopleCats])].sort();

  const catContainer = document.getElementById('category-chips');
  allCats.forEach(cat => {
    const chip = document.createElement('span');
    chip.className = 'chip active';
    chip.textContent = cat;
    chip.style.background = getColor(cat) + '22';
    chip.style.color = getColor(cat);
    chip.dataset.category = cat;
    activeCategories.add(cat);
    chip.addEventListener('click', () => {
      if (activeCategories.has(cat)) {
        activeCategories.delete(cat);
        chip.classList.remove('active');
      } else {
        activeCategories.add(cat);
        chip.classList.add('active');
      }
      render();
    });
    catContainer.appendChild(chip);
  });

  // Stance chips (many are null, so just show what exists)
  const stances = [...new Set([
    ...allData.organizations.map(d => d.regulatory_stance),
    ...allData.people.map(d => d.regulatory_stance)
  ].filter(Boolean))].sort();

  const stanceContainer = document.getElementById('stance-chips');
  if (stances.length === 0) {
    document.getElementById('stance-filters').style.display = 'none';
  }
  stances.forEach(stance => {
    const chip = document.createElement('span');
    chip.className = 'chip active';
    chip.textContent = stance;
    chip.style.background = '#e0e0e0';
    chip.style.color = '#555';
    chip.dataset.stance = stance;
    activeStances.add(stance);
    chip.addEventListener('click', () => {
      if (activeStances.has(stance)) {
        activeStances.delete(stance);
        chip.classList.remove('active');
      } else {
        activeStances.add(stance);
        chip.classList.add('active');
      }
      render();
    });
    stanceContainer.appendChild(chip);
  });
}

// View toggles
document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    render();
  });
});

function getVisibleNodes() {
  let nodes = [];

  if (currentView === 'orgs' || currentView === 'all') {
    allData.organizations.forEach(d => {
      if (!d.category || !activeCategories.has(d.category)) return;
      if (d.regulatory_stance && activeStances.size > 0 && !activeStances.has(d.regulatory_stance)) return;
      nodes.push({ ...d, entityType: 'organization', radius: 22 });
    });
  }

  if (currentView === 'people' || currentView === 'all') {
    allData.people.forEach(d => {
      const cat = d.category || 'Unknown';
      if (d.category && !activeCategories.has(d.category)) return;
      if (!d.category && activeCategories.size < Object.keys(CATEGORY_COLORS).length) return;
      if (d.regulatory_stance && activeStances.size > 0 && !activeStances.has(d.regulatory_stance)) return;
      nodes.push({ ...d, category: cat, entityType: 'person', radius: currentView === 'all' ? 12 : 16 });
    });
  }

  return nodes;
}

function render() {
  const container = document.getElementById('map-container');
  const width = container.clientWidth;
  const height = container.clientHeight;

  // Clear
  d3.select('#map-container').selectAll('*').remove();

  const svg = d3.select('#map-container')
    .append('svg')
    .attr('width', width)
    .attr('height', height);

  // Zoom
  const g = svg.append('g');

  const zoom = d3.zoom()
    .scaleExtent([0.3, 5])
    .on('zoom', (event) => {
      g.attr('transform', event.transform);
    });

  svg.call(zoom);

  // Zoom buttons
  document.getElementById('zoom-in').onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 1.4);
  document.getElementById('zoom-out').onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 0.7);
  document.getElementById('zoom-reset').onclick = () => svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);

  const nodes = getVisibleNodes();

  // Update count
  document.getElementById('entity-count').textContent =
    `${nodes.length} ${nodes.length === 1 ? 'entity' : 'entities'}`;

  if (nodes.length === 0) return;

  // Group by category for cluster centers
  const categories = [...new Set(nodes.map(d => d.category))].sort();
  const clusterCenters = {};

  // Arrange cluster centers in a circle
  const centerX = width / 2;
  const centerY = height / 2;
  const orbitRadius = Math.min(width, height) * 0.32;

  categories.forEach((cat, i) => {
    const angle = (i / categories.length) * 2 * Math.PI - Math.PI / 2;
    clusterCenters[cat] = {
      x: centerX + orbitRadius * Math.cos(angle),
      y: centerY + orbitRadius * Math.sin(angle)
    };
  });

  // Initialize node positions near cluster centers
  nodes.forEach(d => {
    const center = clusterCenters[d.category] || { x: centerX, y: centerY };
    d.x = center.x + (Math.random() - 0.5) * 80;
    d.y = center.y + (Math.random() - 0.5) * 80;
  });

  // Draw cluster background regions
  const clusterBgs = g.selectAll('.cluster-bg')
    .data(categories)
    .join('circle')
    .attr('class', 'cluster-bg')
    .attr('cx', d => clusterCenters[d].x)
    .attr('cy', d => clusterCenters[d].y)
    .attr('r', d => {
      const count = nodes.filter(n => n.category === d).length;
      return Math.max(60, Math.sqrt(count) * 35);
    })
    .attr('fill', d => getColor(d));

  // Draw cluster labels
  g.selectAll('.cluster-label')
    .data(categories)
    .join('text')
    .attr('class', 'cluster-label')
    .attr('x', d => clusterCenters[d].x)
    .attr('y', d => {
      const count = nodes.filter(n => n.category === d).length;
      return clusterCenters[d].y - Math.max(60, Math.sqrt(count) * 35) - 10;
    })
    .attr('text-anchor', 'middle')
    .attr('font-size', '10px')
    .text(d => d);

  // Draw connections (person → primary_org) in "all" view
  if (currentView === 'all') {
    const orgByName = {};
    nodes.forEach(d => {
      if (d.entityType === 'organization') orgByName[d.name] = d;
    });

    const links = [];
    nodes.forEach(d => {
      if (d.entityType === 'person' && d.primary_org) {
        const target = orgByName[d.primary_org];
        if (target) links.push({ source: d, target });
      }
    });

    g.selectAll('.connection-line')
      .data(links)
      .join('line')
      .attr('class', 'connection-line');
  }

  // Simulation
  if (simulation) simulation.stop();

  simulation = d3.forceSimulation(nodes)
    .force('charge', d3.forceManyBody().strength(-8))
    .force('collision', d3.forceCollide().radius(d => d.radius + 3).strength(0.8))
    .force('cluster', forceCluster(clusterCenters, 0.15))
    .force('center', d3.forceCenter(centerX, centerY).strength(0.02))
    .alpha(0.8)
    .alphaDecay(0.02)
    .on('tick', ticked);

  // Create nodes
  const nodeGroup = g.selectAll('.node')
    .data(nodes)
    .join('g')
    .attr('class', 'node')
    .on('click', (event, d) => showDetail(d))
    .call(d3.drag()
      .on('start', dragstarted)
      .on('drag', dragged)
      .on('end', dragended));

  nodeGroup.append('circle')
    .attr('class', 'node-circle')
    .attr('r', d => d.radius)
    .attr('fill', d => getColor(d.category))
    .attr('stroke', '#fff')
    .attr('stroke-width', d => d.entityType === 'organization' ? 2 : 1)
    .attr('opacity', 0.85);

  // Initials or short label inside node
  nodeGroup.append('text')
    .attr('text-anchor', 'middle')
    .attr('dy', '0.35em')
    .attr('font-family', 'var(--mono)')
    .attr('font-size', d => d.radius > 16 ? '8px' : '6px')
    .attr('fill', '#fff')
    .attr('pointer-events', 'none')
    .text(d => {
      const name = d.name || '';
      const parts = name.split(/[\s]+/);
      if (parts.length >= 2) return parts[0][0] + parts[1][0];
      return name.slice(0, 2).toUpperCase();
    });

  // Label below node (only for larger nodes)
  nodeGroup.append('text')
    .attr('class', 'node-label')
    .attr('text-anchor', 'middle')
    .attr('dy', d => d.radius + 12)
    .attr('font-size', d => d.radius > 16 ? '9px' : '7px')
    .text(d => {
      if (d.radius < 14) return '';
      const name = d.name || '';
      return name.length > 18 ? name.slice(0, 16) + '...' : name;
    });

  function ticked() {
    nodeGroup.attr('transform', d => `translate(${d.x},${d.y})`);

    // Update connection lines
    g.selectAll('.connection-line')
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);
  }

  function dragstarted(event, d) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x;
    d.fy = d.y;
  }

  function dragged(event, d) {
    d.fx = event.x;
    d.fy = event.y;
  }

  function dragended(event, d) {
    if (!event.active) simulation.alphaTarget(0);
    d.fx = null;
    d.fy = null;
  }
}

// Custom cluster force
function forceCluster(centers, strength) {
  let nodes;
  function force(alpha) {
    nodes.forEach(d => {
      const center = centers[d.category];
      if (!center) return;
      d.vx += (center.x - d.x) * alpha * strength;
      d.vy += (center.y - d.y) * alpha * strength;
    });
  }
  force.initialize = function(_) { nodes = _; };
  return force;
}

// Detail panel
function showDetail(d) {
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');
  const color = getColor(d.category);

  let fields = '';

  const addField = (label, value) => {
    if (value) {
      fields += `<div class="detail-field"><label>${label}</label><span>${value}</span></div>`;
    }
  };

  if (d.entityType === 'person') {
    addField('Title', d.title);
    addField('Primary Organization', d.primary_org);
    addField('Other Organizations', d.other_orgs);
    addField('Location', d.location);
    addField('Regulatory Stance', d.regulatory_stance);
    addField('Capability Belief', d.capability_belief);
    addField('Influence Type', d.influence_type);
    addField('Twitter/X', d.twitter ? `@${d.twitter.replace('@', '')}` : null);
    addField('Notes', d.notes);
  } else {
    addField('Website', d.website ? `<a href="${d.website}" target="_blank">${d.website}</a>` : null);
    addField('Location', d.location);
    addField('Funding Model', d.funding_model);
    addField('Regulatory Stance', d.regulatory_stance);
    addField('Capability Belief', d.capability_belief);
    addField('Influence Type', d.influence_type);
    addField('Twitter/X', d.twitter ? `@${d.twitter.replace('@', '')}` : null);
    addField('Notes', d.notes);
  }

  if (!fields) {
    fields = '<div class="detail-field"><span style="color:var(--text-tertiary); font-style:italic;">No additional details yet. <a href="/contribute.html">Contribute info</a> about this entity.</span></div>';
  }

  content.innerHTML = `
    <div class="detail-name">${d.name}</div>
    <div class="detail-type">${d.entityType}</div>
    <div class="detail-category" style="background:${color}22; color:${color};">${d.category}</div>
    <div class="detail-fields">${fields}</div>
  `;

  panel.classList.add('open');
}

document.getElementById('detail-close').addEventListener('click', () => {
  document.getElementById('detail-panel').classList.remove('open');
});

// Nav
const path = window.location.pathname;
document.querySelectorAll('.nav-links a').forEach(a => {
  if (a.getAttribute('href') === path) a.classList.add('active');
});
document.querySelector('.nav-hamburger').addEventListener('click', () => {
  document.querySelector('.nav-links').classList.toggle('open');
});

// Resize
window.addEventListener('resize', () => { if (allData.people.length || allData.organizations.length) render(); });
</script>
</body>
</html>
