<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>Map — Mapping AI</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap');
:root {
  --serif: 'EB Garamond', Georgia, serif;
  --mono: 'DM Mono', monospace;
  --accent: #2563eb;
  /* Light mode (default) */
  --bg-page: #f0eeeb;
  --bg-panel: #fff;
  --bg-panel-alpha: rgba(255,255,255,0.92);
  --text-1: #1a1a1a;
  --text-2: #555;
  --text-3: #888;
  --line: #ddd;
  --input-bg: #f0eeeb;
  --node-text: #fff;
}
[data-theme="dark"] {
  --bg-page: #1a1f2e;
  --bg-panel: #141824;
  --bg-panel-alpha: rgba(20,24,36,0.92);
  --text-1: #e0ddd8;
  --text-2: #aab0c0;
  --text-3: #6a7080;
  --line: #2a2f3e;
  --input-bg: #1a1f2e;
  --node-text: #fff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg-page); font-family: var(--serif); color: var(--text-1); overflow: hidden; height: 100vh; transition: background 0.3s, color 0.3s; }

.site-nav {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 2rem; height: 48px;
  background: var(--bg-panel); border-bottom: 1px solid var(--line);
  z-index: 100; transition: background 0.3s;
}
.nav-brand {
  font-family: var(--mono); font-size: 12px;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-1); text-decoration: none;
}
.nav-links { display: flex; gap: 2rem; }
.nav-links a {
  font-family: var(--mono); font-size: 12px;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-3); text-decoration: none;
  transition: color 0.15s; position: relative;
}
.nav-links a::after {
  content: ''; position: absolute; bottom: -3px; left: 0;
  width: 0; height: 1px; background: var(--text-1);
  transition: width 0.2s ease;
}
.nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
.nav-links a:hover, .nav-links a.active { color: var(--text-1); }

.map-container { position: fixed; top: 48px; left: 0; right: 0; bottom: 0; transition: right 0.3s ease; }
.map-container.shifted { right: min(440px, 50vw); }

/* Controls */
.controls {
  position: fixed; top: 60px; left: 1rem;
  display: flex; flex-direction: column; gap: 0.4rem;
  z-index: 50; max-height: calc(100vh - 80px); overflow: visible;
}
.control-group {
  background: var(--bg-panel-alpha); border-radius: 6px;
  padding: 0.6rem 0.75rem;
  border: 1px solid var(--line);
  backdrop-filter: blur(8px);
}
.control-group h3 {
  font-family: var(--mono); font-size: 9px;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-3); margin-bottom: 0.4rem;
}
.view-toggles { display: flex; gap: 0.2rem; }
.view-btn {
  font-family: var(--mono); font-size: 9px;
  letter-spacing: 0.04em; text-transform: uppercase;
  padding: 0.3rem 0.5rem; border: 1px solid var(--line);
  background: transparent; color: var(--text-3);
  border-radius: 3px; cursor: pointer; transition: all 0.15s;
}
.view-btn:hover { border-color: var(--text-3); color: var(--text-2); }
.view-btn.active { background: var(--text-1); color: var(--bg-panel); border-color: var(--text-1); }
.filter-chips { display: flex; flex-wrap: wrap; gap: 0.2rem; max-width: 180px; }
.chip {
  font-family: var(--mono); font-size: 8px;
  letter-spacing: 0.02em;
  padding: 0.2rem 0.4rem; border-radius: 3px;
  cursor: pointer; transition: all 0.15s;
  border: 1px solid transparent;
  opacity: 0.35;
}
.chip.active { opacity: 1; border-color: rgba(255,255,255,0.15); }
.chip:hover { opacity: 0.7; }

/* Detail panel */
.detail-panel {
  position: fixed; top: 48px; right: 0; bottom: 0;
  width: 320px; background: var(--bg-panel);
  border-left: 1px solid var(--line);
  z-index: 50; transform: translateX(100%);
  transition: transform 0.25s ease, background 0.3s;
  overflow-y: auto; padding: 1.25rem;
}
.detail-panel.open { transform: translateX(0); }
.detail-close {
  position: absolute; top: 0.75rem; right: 0.75rem;
  background: none; border: none; cursor: pointer;
  font-size: 16px; color: var(--text-3); font-family: var(--mono);
}
.detail-close:hover { color: var(--text-1); }
.detail-name {
  font-family: var(--serif); font-size: 20px;
  font-weight: 500; margin-bottom: 0.2rem;
  padding-right: 2rem; color: var(--text-1);
}
.detail-type {
  font-family: var(--mono); font-size: 9px;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-3); margin-bottom: 0.75rem;
}
.detail-category {
  display: inline-block; padding: 0.15rem 0.5rem;
  border-radius: 3px; font-family: var(--mono);
  font-size: 9px; letter-spacing: 0.04em;
  margin-bottom: 0.75rem;
}
.detail-fields { display: flex; flex-direction: column; gap: 0.6rem; }
.detail-field label {
  font-family: var(--mono); font-size: 8px;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-3); display: block; margin-bottom: 0.1rem;
}
.detail-field span {
  font-family: var(--serif); font-size: 14px;
  color: var(--text-2); line-height: 1.5;
}
.detail-field a { color: var(--accent); }
.detail-affiliated {
  margin-top: 0.75rem; padding-top: 0.75rem;
  border-top: 1px solid var(--line);
}
.detail-affiliated h4 {
  font-family: var(--mono); font-size: 9px;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-3); margin-bottom: 0.4rem;
}
.affiliated-item {
  font-family: var(--mono); font-size: 11px;
  color: var(--accent); cursor: pointer; padding: 0.15rem 0;
}
.affiliated-item:hover { opacity: 0.7; }

/* Zoom controls */
.zoom-controls {
  position: fixed; bottom: 1.5rem; right: 1.5rem;
  display: flex; flex-direction: column; gap: 0.2rem; z-index: 50;
}
.zoom-btn {
  width: 32px; height: 32px;
  background: var(--bg-panel-alpha); border: 1px solid var(--line);
  border-radius: 4px; cursor: pointer;
  font-family: var(--mono); font-size: 14px; color: var(--text-3);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; backdrop-filter: blur(8px);
}
.zoom-btn:hover { border-color: var(--text-3); color: var(--text-1); }

.entity-count {
  position: fixed; bottom: 1.5rem; left: 1rem;
  font-family: var(--mono); font-size: 10px; color: var(--text-3);
  letter-spacing: 0.04em;
  background: var(--bg-panel-alpha); padding: 0.3rem 0.6rem;
  border-radius: 3px; border: 1px solid var(--line);
  z-index: 50; backdrop-filter: blur(8px);
}

/* Tooltip */
.tooltip {
  position: fixed; pointer-events: none; z-index: 200;
  background: var(--bg-panel-alpha); border: 1px solid var(--line);
  border-radius: 4px; padding: 0.4rem 0.6rem;
  backdrop-filter: blur(8px);
  max-width: 220px;
  opacity: 0; transition: opacity 0.15s;
}
.tooltip.visible { opacity: 1; }
.tooltip-name {
  font-family: var(--mono); font-size: 10px;
  color: var(--text-1); letter-spacing: 0.02em;
}
.tooltip-sub {
  font-family: var(--mono); font-size: 8px;
  color: var(--text-3); margin-top: 0.1rem;
}

/* Search */
.search-box {
  position: relative;
}
.search-input {
  width: 100%; padding: 0.35rem 0.5rem 0.35rem 1.6rem;
  font-family: var(--mono); font-size: 10px;
  background: var(--input-bg); color: var(--text-1);
  border: 1px solid var(--line); border-radius: 4px;
  outline: none; letter-spacing: 0.02em;
}
.search-input::placeholder { color: var(--text-3); }
.search-input:focus { border-color: var(--text-3); }
.search-icon {
  position: absolute; left: 0.5rem; top: 50%;
  transform: translateY(-50%);
  font-size: 10px; color: var(--text-3); pointer-events: none;
}
.search-results {
  display: none; position: absolute; top: 100%; left: 0; right: 0;
  background: var(--bg-panel); border: 1px solid var(--line);
  border-top: none; border-radius: 0 0 4px 4px;
  max-height: 240px; overflow-y: auto; z-index: 60;
}
.search-results.visible { display: block; }
.search-result {
  padding: 0.35rem 0.5rem; cursor: pointer;
  display: flex; align-items: center; gap: 0.4rem;
  transition: background 0.1s;
}
.search-result:hover { background: var(--input-bg); }
.search-result-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.search-result-name {
  font-family: var(--mono); font-size: 10px; color: var(--text-1);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.search-result-meta {
  font-family: var(--mono); font-size: 8px; color: var(--text-3);
  margin-left: auto; flex-shrink: 0;
}
.search-match-hint {
  font-family: var(--mono); font-size: 8px; color: var(--text-3);
  padding: 0.25rem 0.5rem; border-top: 1px solid var(--line);
}
.stance-legend-items { display: flex; flex-direction: column; gap: 0.15rem; }
.stance-legend-item {
  display: flex; align-items: center; gap: 0.35rem;
  font-family: var(--mono); font-size: 8px; color: var(--text-2);
  cursor: pointer; padding: 0.1rem 0; transition: opacity 0.15s;
}
.stance-legend-item.inactive { opacity: 0.3; }
.stance-legend-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.node.dimmed { opacity: 0.2 !important; }
.node.highlighted .node-ring { stroke-width: 3 !important; stroke: #fff !important; }
.node-image { opacity: 0.75; }
.node:hover .node-image,
.node.highlighted .node-image { opacity: 1; }

/* D3 */
.cluster-label {
  font-family: var(--mono); text-transform: uppercase;
  letter-spacing: 0.08em; pointer-events: none;
}
.node { cursor: pointer; }

.nav-hamburger {
  display: none; flex-direction: column; justify-content: center;
  gap: 5px; background: none; border: none; cursor: pointer; padding: 4px;
}
.nav-hamburger span { display: block; width: 20px; height: 1.5px; background: var(--text-1); }
/* Theme toggle */
.theme-toggle {
  background: none; border: 1px solid var(--line);
  border-radius: 4px; cursor: pointer; padding: 0.2rem 0.4rem;
  font-size: 14px; line-height: 1; transition: border-color 0.15s;
}
.theme-toggle:hover { border-color: var(--text-3); }
@media (max-width: 600px) {
  .site-nav { padding: 0 1rem; }
  .nav-hamburger { display: flex; }
  .nav-links {
    display: none; position: absolute; top: 48px; left: 0; right: 0;
    background: var(--bg-panel); border-bottom: 1px solid var(--line);
    flex-direction: column; padding: 1rem 1.5rem; gap: 1rem;
  }
  .nav-links.open { display: flex; }
  .detail-panel { width: 100%; }
}

/* Mobile banner */
.mobile-banner { display: none; }
@media (max-width: 768px) {
  .mobile-banner {
    display: flex; align-items: center; justify-content: space-between;
    position: fixed; top: 48px; left: 0; right: 0; z-index: 90;
    padding: 0.4rem 1rem;
    background: var(--bg-panel); border-bottom: 1px solid var(--line);
    font-family: var(--mono); font-size: 10px; color: var(--text-3);
    letter-spacing: 0.02em;
  }
  .mobile-banner button {
    background: none; border: none; cursor: pointer;
    font-size: 14px; color: var(--text-3); padding: 0.2rem 0.4rem;
    line-height: 1;
  }
  .mobile-banner button:hover { color: var(--text-1); }
  .controls { top: calc(48px + 32px + 12px); }
  .mobile-banner ~ .map-container { top: calc(48px + 32px); }
}

/* Mobile controls: bottom bar with filter overlay */
@media (max-width: 600px) {
  .controls {
    position: fixed; top: auto; left: 0; right: 0; bottom: 0;
    flex-direction: row; align-items: center;
    gap: 0.3rem; padding: 0.4rem 0.6rem;
    max-height: none; overflow: visible;
    background: var(--bg-panel-alpha); backdrop-filter: blur(8px);
    border-top: 1px solid var(--line);
  }
  .controls .control-group { padding: 0.4rem 0.5rem; }
  .controls .control-group:first-child { flex: 1; min-width: 0; }
  .controls #category-filters,
  .controls #stance-legend { display: none; }
  .controls.filters-open #category-filters,
  .controls.filters-open #stance-legend {
    display: block; position: fixed; bottom: 52px; left: 0; right: 0;
    background: var(--bg-panel); border-top: 1px solid var(--line);
    padding: 0.75rem; max-height: 60vh; overflow-y: auto;
    z-index: 55;
  }
  .filter-chips { max-width: none; }
  .search-input { width: 100%; }
  /* Larger tap targets on mobile */
  .chip { padding: 0.35rem 0.6rem; font-size: 9px; }
  .view-btn { padding: 0.4rem 0.6rem; font-size: 10px; }
  .stance-legend-item { padding: 0.3rem 0; font-size: 9px; }
  /* Detail panel full-width overlay */
  .detail-panel { width: 100%; }
  /* Contribute panel full-width */
  #contribute-panel { width: 100vw; }
  .map-container.shifted { right: 0; }
  /* Zoom controls smaller */
  .zoom-controls { bottom: 4rem; right: 0.75rem; }
  .zoom-btn { width: 28px; height: 28px; font-size: 12px; }
  /* Entity count repositioned above bottom bar */
  .entity-count { bottom: 4rem; left: 0.75rem; font-size: 9px; }
  /* Contribute button above bottom bar */
  #contribute-btn { bottom: 4rem; right: 3.5rem; }
}

/* Mobile filter toggle button (injected via JS) */
.mobile-filter-btn {
  display: none;
  font-family: var(--mono); font-size: 9px;
  letter-spacing: 0.04em; text-transform: uppercase;
  padding: 0.4rem 0.6rem; border: 1px solid var(--line);
  background: transparent; color: var(--text-3);
  border-radius: 3px; cursor: pointer; white-space: nowrap;
}
@media (max-width: 600px) {
  .mobile-filter-btn { display: block; }
}

/* Tablet: narrower controls */
@media (min-width: 601px) and (max-width: 1024px) {
  .controls { left: 0.5rem; }
  .filter-chips { max-width: 160px; }
  .control-group { padding: 0.5rem 0.6rem; }
  .detail-panel { width: 280px; }
}
</style>
</head>

      <option value="agi_timeline">AGI Timeline</option>

    </select>
    <div id="axis-y-group">
      <h3 style="margin-top:12px">Y Axis</h3>
      <select id="axis-y-select" style="width:100%;padding:4px 6px;background:var(--bg-input,var(--bg-panel));color:var(--text-1);border:1px solid var(--line);border-radius:4px;font-family:var(--mono);font-size:11px;">

</div>

<div class="detail-panel" id="detail-panel">

  <div id="detail-content"></div>
</div>

<div class="tooltip" id="tooltip">
  <div class="tooltip-name" id="tooltip-name"></div>
  <div class="tooltip-sub" id="tooltip-sub"></div>
</div>

<div class="map-container" id="map-container"></div>

<div class="zoom-controls">

</div>

<div class="entity-count" id="entity-count"></div>

@media (max-width: 800px) {

<script>
const contribBtn = document.getElementById('contribute-btn');
const contribPanel = document.getElementById('contribute-panel');
const contribClose = document.getElementById('contribute-close');
const mapContainer = document.querySelector('.map-container');

contribBtn.addEventListener('click', () => {
  contribPanel.classList.add('open');
  contribBtn.classList.add('hidden');
  mapContainer.classList.add('shifted');
  // Re-render map after transition to recalculate center
  setTimeout(() => { if (typeof render === 'function') render(); }, 350);
});
contribClose.addEventListener('click', () => {
  contribPanel.classList.remove('open');
  contribBtn.classList.remove('hidden');
  mapContainer.classList.remove('shifted');
  setTimeout(() => { if (typeof render === 'function') render(); }, 350);
});

// Mobile banner: hide if previously dismissed
if (localStorage.getItem('mobileBannerDismissed') === '1') {
  const banner = document.getElementById('mobile-banner');
  if (banner) banner.remove();
}

// Mobile filter toggle button
(function() {
  const controls = document.querySelector('.controls');
  if (!controls) return;
  const btn = document.createElement('button');
  btn.className = 'mobile-filter-btn';
  btn.textContent = 'Filters';
  btn.addEventListener('click', () => {
    controls.classList.toggle('filters-open');
    btn.textContent = controls.classList.contains('filters-open') ? 'Close' : 'Filters';
  });
  controls.appendChild(btn);
})();
</script>

function getOrgLogoUrl(name) {
  const domain = ORG_DOMAINS[name];
  if (!domain) return null;
  // Try S3-cached logo first (higher quality), fall back to Google Favicons
  const cleanDomain = domain.replace('www.', '');
  return `https://d3fo5mm9fktie3.cloudfront.net/logos/${cleanDomain}.png`;
}

function getPersonImageUrl(name) {
  // First check hardcoded fallbacks, then we'll try Wikipedia API dynamically
  return PEOPLE_IMAGES[name] || null;
}

// Dynamically fetch Wikipedia thumbnail for people without hardcoded images
const wikiImageCache = {};
async function fetchWikiImage(name) {
  if (wikiImageCache[name] !== undefined) return wikiImageCache[name];
  try {
    const res = await fetch('https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(name));
    if (!res.ok) { wikiImageCache[name] = null; return null; }
    const data = await res.json();
    const url = data.thumbnail?.source || null;
    wikiImageCache[name] = url;
    return url;
  } catch { wikiImageCache[name] = null; return null; }
}

function inferOrgLinks(people, orgs) {
  const links = [];
  const orgNames = orgs.map(o => o.name);

  people.forEach(person => {
    const text = `${person.title || ''} ${person.primary_org || ''} ${person.other_orgs || ''}`;
    if (!text.trim()) return;

    // Check keyword matches
    for (const [orgName, keywords] of Object.entries(ORG_KEYWORDS)) {
      if (!orgNames.includes(orgName)) continue;
      for (const kw of keywords) {
        if (text.includes(kw)) {
          links.push({ personName: person.name, orgName });
          break;
        }
      }
    }

    // Direct org name matches
    orgNames.forEach(orgName => {
      if (orgName.length > 3 && text.includes(orgName)) {
        if (!links.find(l => l.personName === person.name && l.orgName === orgName)) {
          links.push({ personName: person.name, orgName });
        }
      }
    });
  });

  return links;
}

function getStanceColor(stance) {
  if (!stance) return null;
  if (STANCE_COLORS[stance]) return STANCE_COLORS[stance];
  // Try matching the first word
  const firstWord = stance.split(/[\s\/]/)[0];
  if (STANCE_COLORS[firstWord]) return STANCE_COLORS[firstWord];
  // Try partial match
  for (const key of Object.keys(STANCE_COLORS)) {
    if (stance.toLowerCase().includes(key.toLowerCase())) return STANCE_COLORS[key];
  }
  return null;
}
function getStanceKey(stance) {
  if (!stance) return null;
  if (STANCE_COLORS[stance]) return stance;
  const firstWord = stance.split(/[\s\/]/)[0];
  if (STANCE_COLORS[firstWord]) return firstWord;
  for (const key of Object.keys(STANCE_COLORS)) {
    if (stance.toLowerCase().includes(key.toLowerCase())) return key;
  }
  return null;
}

// Build links from explicit person_organizations + relationships data
function buildExplicitLinks(data) {
  const links = [];
  const orgById = {};
  data.organizations.forEach(o => { orgById[o.id] = o; });
  const personById = {};
  data.people.forEach(p => { personById[p.id] = p; });

  // Person-org affiliations
  data.person_organizations.forEach(po => {
    const person = personById[po.person_id];
    const org = orgById[po.organization_id];
    if (person && org) {
      links.push({ personName: person.name, orgName: org.name });
    }
  });

  // Also add relationships between people and orgs
  data.relationships.forEach(rel => {
    if (rel.source_type === 'person' && rel.target_type === 'organization') {
      const person = personById[rel.source_id];
      const org = orgById[rel.target_id];
      if (person && org && !links.some(l => l.personName === person.name && l.orgName === org.name)) {
        links.push({ personName: person.name, orgName: org.name });
      }
    }
  });

  return links;
}

function buildFilters() {
  let rawCats;
  if (currentView === 'people') {
    // People solo view: show person ROLE categories
    rawCats = [...new Set(allData.people.map(d => normalizeCategory(d.category)).filter(Boolean))];
  } else if (currentView === 'resources') {
    // Resources view: show resource TYPE categories
    rawCats = [...new Set(allData.resources.map(d => d.resource_type || 'Other').filter(Boolean))];
  } else if (currentView === '2d') {
    // 2D view: show categories for whichever entity types are selected
    const peopleCats = axis2dEntityType !== 'organizations'
      ? allData.people.map(d => normalizeCategory(d.category)).filter(Boolean) : [];
    const orgCats = axis2dEntityType !== 'people'
      ? allData.organizations.map(d => normalizeCategory(d.category)).filter(Boolean) : [];
    rawCats = [...new Set([...peopleCats, ...orgCats])];
  } else {
    // Orgs, All: show org SECTOR categories
    rawCats = [...new Set(allData.organizations.map(d => normalizeCategory(d.category)).filter(Boolean))];
  }
  const allCats = rawCats.sort((a, b) => {
    const ia = CLUSTER_ORDER.indexOf(a);
    const ib = CLUSTER_ORDER.indexOf(b);
    return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
  });

  const container = document.getElementById('category-chips');
  container.innerHTML = '';

  // Activate all categories when: first load, view switch (no overlap), or explicitly empty
  const anyOverlap = allCats.some(cat => activeCategories.has(cat));
  // Always activate all on first load or when view changes (categories shift completely)
  const viewChanged = window._lastFilterView !== currentView;
  const activateAll = viewChanged || !anyOverlap || activeCategories.size === 0;
  window._lastFilterView = currentView;

  const newActive = new Set();
  allCats.forEach(cat => {
    const chip = document.createElement('span');
    const isActive = activateAll || activeCategories.has(cat);
    chip.className = 'chip' + (isActive ? ' active' : '');
    chip.textContent = cat;
    chip.style.background = getColor(cat) + '33';
    chip.style.color = getColor(cat);
    chip.dataset.category = cat;
    if (isActive) newActive.add(cat);
    chip.addEventListener('click', () => {
      if (activeCategories.has(cat)) {
        activeCategories.delete(cat);
        chip.classList.remove('active');
      } else {
        activeCategories.add(cat);
        chip.classList.add('active');
      }
      updateCategoryResetBtn();
      render();
    });
    container.appendChild(chip);
  });
  activeCategories = newActive;
  updateCategoryResetBtn();
}

// Normalize similar category names to a canonical form
function normalizeCategory(cat) {
  if (!cat) return null;
  // Person role categories — pass through unchanged
  const personRoles = ['Executive','Researcher','Policymaker','Investor','Organizer','Journalist','Academic','Cultural figure'];
  if (personRoles.includes(cat)) return cat;
  // Org sector normalization
  const c = cat.toLowerCase();
  if (c.includes('ethics') || c.includes('civil society') || c.includes('bias') || c.includes('rights')) return 'Ethics / Civil Society';
  if (c.includes('ai safety') || c.includes('alignment')) return 'AI Safety';
  if (c.includes('think tank') || c.includes('policy org')) return 'Think Tank';
  if (c.includes('government') || c.includes('agency')) return 'Government';
  if (c.includes('vc') || c.includes('capital') || c.includes('philanthropy') || c.includes('funder')) return 'VC / Funder';
  if (c.includes('labor') || c.includes('workforce')) return 'Labor / Workforce';
  if (c.includes('media') || c.includes('journalism')) return 'Media';
  if (c.includes('academic')) return 'Academic';
  if (c.includes('frontier')) return 'Frontier Lab';
  if (c.includes('campaign') || c.includes('pac')) return 'Political Campaign';
  return cat;
}

// Semantic cluster ordering — related categories are adjacent
const CLUSTER_ORDER = [
  // Org sector categories
  'Frontier Lab',
  'AI Safety',
  'Academic',
  'Think Tank',
  'Government',
  'VC / Funder',
  'Ethics / Civil Society',
  'Labor / Workforce',
  'Media',
  'Political Campaign',
  // Person role categories
  'Executive',
  'Researcher',
  'Policymaker',
  'Investor',
  'Organizer',
  'Journalist',
  'Cultural figure',
  // Collapsed
  'Resources',
];

function getVisibleNodes() {
  let nodes = [];
  // Helper: check if a category (raw or normalized) is active
  const isCatActive = (rawCat) => {
    if (!rawCat) return false;
    return activeCategories.has(rawCat) || activeCategories.has(normalizeCategory(rawCat));
  };

  // Build org lookup for mapping people to their org's sector
  const orgById = {};
  allData.organizations.forEach(o => { orgById[o.id] = o; });
  const personOrgMap = {}; // person_id -> primary org
  (allData.person_organizations || []).forEach(po => {
    if (po.is_primary && orgById[po.organization_id]) {
      personOrgMap[po.person_id] = orgById[po.organization_id];
    }
  });

  // Count total for scaling
  let totalCount = 0;
  if (currentView === 'orgs' || currentView === 'all') totalCount += allData.organizations.filter(d => d.category && isCatActive(d.category) && passesStanceFilter(d)).length;
  if (currentView === 'people' || currentView === 'all') totalCount += allData.people.filter(d => d.category && isCatActive(d.category) && passesStanceFilter(d)).length;
  if (currentView === 'resources' || currentView === 'all') totalCount += allData.resources.length;

  // Scale: gentler curve — 1.0 at 40, 0.7 at 100, 0.55 at 200
  const scale = Math.max(0.55, Math.min(1.0, 40 / Math.max(totalCount, 1)));

  if (currentView === 'orgs' || currentView === 'all') {
    allData.organizations.forEach(d => {
      if (!d.category || !isCatActive(d.category)) return;
      if (!passesStanceFilter(d)) return;
      const sc = d.submission_count || 1;
      const baseR = currentView === 'all' ? 14 : 18;
      const r = Math.round((baseR + Math.min(Math.floor(sc / 3), 3)) * scale);
      const normCat = normalizeCategory(d.category);
      nodes.push({ ...d, category: normCat, _rawCategory: d.category, entityType: 'organization', radius: r, submissionCount: sc });
    });
  }
  if (currentView === 'people' || currentView === 'all') {
    allData.people.forEach(d => {
      if (!d.category) return;
      // In "all" view, people are clustered by their org's sector, so filter by the
      // display category (org sector) not their personal role category
      if (currentView === 'people' && !isCatActive(d.category)) return;
      // In "all" view, always include people (they'll be mapped to an org sector cluster)
      if (!passesStanceFilter(d)) return;
      const sc = d.submission_count || 1;

      // In "all" view: cluster people by their PRIMARY ORG'S sector
      // In "people" view: cluster by their personal role
      let displayCat;
      if (currentView === 'all') {
        // Try person_organizations junction first
        const primaryOrg = personOrgMap[d.id];
        if (primaryOrg) {
          displayCat = normalizeCategory(primaryOrg.category);
        } else {
          // Fall back: try to find org by primary_org text field
          const orgMatch = allData.organizations.find(o =>
            d.primary_org && o.name.toLowerCase().includes(d.primary_org.toLowerCase())
          );
          if (orgMatch) {
            displayCat = normalizeCategory(orgMatch.category);
          } else {
            // No org found — use the org-sector version of their role if possible
            const roleCat = normalizeCategory(d.category);
            const personRoles = ['Executive','Researcher','Investor','Organizer','Journalist','Cultural figure'];
            // Map roles to closest org sector so they don't create separate clusters
            const roleToSector = {
              'Executive': 'Frontier Lab', 'Researcher': 'Academic', 'Investor': 'VC / Funder',
              'Organizer': 'Ethics / Civil Society', 'Journalist': 'Media', 'Cultural figure': 'Media',
            };
            displayCat = personRoles.includes(roleCat) ? (roleToSector[roleCat] || roleCat) : roleCat;
          }
        }
      } else {
        displayCat = normalizeCategory(d.category);
      }

      const baseR = currentView === 'all' ? 8 : 14; // bigger in solo people view
      const r = Math.round((baseR + Math.min(Math.floor(sc / 3), 2)) * scale);
      nodes.push({ ...d, category: displayCat, _rawCategory: d.category, entityType: 'person', radius: r, submissionCount: sc });
    });
  }
  if (currentView === 'resources') {
    allData.resources.forEach(d => {
      const cat = d.resource_type || 'Other'; // cluster by type in resources view
      const sc = d.submission_count || 1;
      const r = Math.round((14 + Math.min(Math.floor(sc / 3), 3)) * scale);
      nodes.push({ ...d, name: d.title, category: cat, entityType: 'resource', radius: r, submissionCount: sc, isResource: true });
    });
  } else if (currentView === 'all') {
    allData.resources.forEach(d => {
      const sc = d.submission_count || 1;
      const r = Math.round((10 + Math.min(Math.floor(sc / 3), 3)) * scale);
      nodes.push({ ...d, name: d.title, category: 'Resources', _rawCategory: d.category, entityType: 'resource', radius: r, submissionCount: sc, isResource: true });
    });
  }
  return nodes;
}

function render() {
  const container = document.getElementById('map-container');
  const width = container.clientWidth;
  const height = container.clientHeight;

  d3.select('#map-container').selectAll('*').remove();

  const svg = d3.select('#map-container')
    .append('svg')
    .attr('width', width)
    .attr('height', height);

  const g = svg.append('g');

  // Restore zoom state
  zoomBehavior = d3.zoom()
    .scaleExtent([0.1, 20])
    .on('zoom', (event) => {
      currentZoom = event.transform;
      g.attr('transform', event.transform);
    });
  svg.call(zoomBehavior);
  svg.call(zoomBehavior.transform, currentZoom);

  document.getElementById('zoom-in').onclick = () => svg.transition().duration(300).call(zoomBehavior.scaleBy, 1.5);
  document.getElementById('zoom-out').onclick = () => svg.transition().duration(300).call(zoomBehavior.scaleBy, 0.67);
  document.getElementById('zoom-reset').onclick = () => {
    currentZoom = d3.zoomIdentity;
    svg.transition().duration(500).call(zoomBehavior.transform, d3.zoomIdentity);
  };

  if (currentView === '2d') { render2D(svg, g, width, height); return; }

  const nodes = getVisibleNodes();
  document.getElementById('entity-count').textContent = `${nodes.length} entities`;
  if (nodes.length === 0) return;

  // Order categories semantically, filter out "Resources" from cluster layout in "all" view
  const rawCats = [...new Set(nodes.map(d => d.category))];
  const displayCats = currentView === 'all' ? rawCats.filter(c => c !== 'Resources') : rawCats;
  const categories = displayCats.sort((a, b) => {
    const ia = CLUSTER_ORDER.indexOf(a);
    const ib = CLUSTER_ORDER.indexOf(b);
    return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
  });

  // Count members per category for size-weighted positioning
  const catCounts = {};
  nodes.forEach(d => { catCounts[d.category] = (catCounts[d.category] || 0) + 1; });

  const clusterCenters = {};
  const controlsWidth = 280;
  const centerX = controlsWidth + (width - controlsWidth) / 2;
  const centerY = height / 2;
  // Scale orbit by number of clusters — fewer clusters = tighter orbit
  const maxDim = Math.min(width - controlsWidth, height);
  const orbitRadius = maxDim * Math.min(0.35, Math.max(0.15, categories.length * 0.035));

  // Sort by size descending — larger clusters get top positions
  const catsBySize = [...categories].sort((a, b) => (catCounts[b] || 0) - (catCounts[a] || 0));
  catsBySize.forEach((cat, i) => {
    const angle = (i / catsBySize.length) * 2 * Math.PI - Math.PI / 2;
    clusterCenters[cat] = {
      x: centerX + orbitRadius * Math.cos(angle),
      y: centerY + orbitRadius * Math.sin(angle)
    };
  });

  // Position resource nodes near their closest related entity (author/org) in "all" view
  const entityById = {};
  nodes.forEach(d => { if (d.id) entityById[`${d.entityType}-${d.id}`] = d; });

  nodes.forEach(d => {
    if (d.isResource && currentView === 'all') {
      // Find closest related entity from relationships
      let placed = false;
      for (const rel of (allData.relationships || [])) {
        let relatedKey = null;
        if (rel.source_type === 'resource' && rel.source_id === d.id) {
          relatedKey = `${rel.target_type}-${rel.target_id}`;
        } else if (rel.target_type === 'resource' && rel.target_id === d.id) {
          relatedKey = `${rel.source_type}-${rel.source_id}`;
        }
        if (relatedKey && entityById[relatedKey]) {
          const related = entityById[relatedKey];
          const relCenter = clusterCenters[related.category] || { x: centerX, y: centerY };
          d.x = relCenter.x + (Math.random() - 0.5) * 40;
          d.y = relCenter.y + (Math.random() - 0.5) * 40;
          placed = true;
          break;
        }
      }
      if (!placed) {
        d.x = centerX + (Math.random() - 0.5) * 80;
        d.y = centerY + (Math.random() - 0.5) * 80;
      }
    } else {
      const center = clusterCenters[d.category] || { x: centerX, y: centerY };
      d.x = center.x + (Math.random() - 0.5) * 60;
      d.y = center.y + (Math.random() - 0.5) * 60;
    }
  });

  // Cluster background circles (behind everything)
  const bgLayer = g.append('g').attr('class', 'bg-layer');
  bgLayer.selectAll('.cluster-bg')
    .data(categories)
    .join('circle')
    .attr('class', 'cluster-bg')
    .attr('cx', d => clusterCenters[d].x)
    .attr('cy', d => clusterCenters[d].y)
    .attr('r', d => {
      const count = nodes.filter(n => n.category === d).length;
      return Math.max(50, Math.sqrt(count) * 28);
    })
    .attr('fill', d => getColor(d))
    .attr('opacity', 0.06)
    .attr('stroke', d => getColor(d))
    .attr('stroke-width', 0.5)
    .attr('stroke-opacity', 0.15);

  // Connection lines (in all view)
  let linkElements = null;
  if (currentView === 'all') {
    const nodeByName = {};
    nodes.forEach(d => { nodeByName[d.name] = d; });

    // Person-org links
    const visibleLinks = inferredLinks
      .filter(l => nodeByName[l.personName] && nodeByName[l.orgName])
      .map(l => ({ source: nodeByName[l.personName], target: nodeByName[l.orgName] }));

    // Resource and other relationship links from DB
    const nodeById = {};
    nodes.forEach(d => {
      if (d.entityType === 'organization') nodeById[`organization-${d.id}`] = d;
      else if (d.entityType === 'person') nodeById[`person-${d.id}`] = d;
      else if (d.entityType === 'resource') nodeById[`resource-${d.id}`] = d;
    });
    (allData.relationships || []).forEach(rel => {
      if (rel.relationship_type === 'subsidiary') return; // skip, handled by hierarchy
      const srcKey = `${rel.source_type}-${rel.source_id}`;
      const tgtKey = `${rel.target_type}-${rel.target_id}`;
      if (nodeById[srcKey] && nodeById[tgtKey]) {
        visibleLinks.push({ source: nodeById[srcKey], target: nodeById[tgtKey], relType: rel.relationship_type });
      }
    });

    linkElements = g.selectAll('.connection-line')
      .data(visibleLinks)
      .join('line')
      .attr('class', 'connection-line')
      .attr('stroke', 'var(--text-3)')
      .attr('stroke-width', 0.5)
      .attr('stroke-opacity', 0.25);
  }

  // Simulation
  if (simulation) simulation.stop();
  simulation = d3.forceSimulation(nodes)
    .force('charge', d3.forceManyBody().strength(d => d.entityType === 'organization' ? -5 : -2))
    .force('collision', d3.forceCollide().radius(d => d.radius + 2).strength(0.9))
    .force('cluster', forceCluster(clusterCenters, 0.15))
    .force('x', d3.forceX(centerX).strength(0.02))
    .force('y', d3.forceY(centerY).strength(0.02))
    .alpha(0.5)
    .alphaDecay(0.04)
    .on('tick', ticked);

  // Node groups
  const nodeGroup = g.selectAll('.node')
    .data(nodes)
    .join('g')
    .attr('class', 'node')
    .on('click', (event, d) => {
      event.stopPropagation();
      showDetail(d, nodes);
      const k = 3;
      const t = d3.zoomIdentity.translate(width / 2 - k * d.x, height / 2 - k * d.y).scale(k);
      svg.transition().duration(500).call(zoomBehavior.transform, t);
    })
    .on('mouseenter', function(event, d) {
      d3.select(this).select('.node-bg').attr('opacity', d.isResource ? 0.3 : 1);
      d3.select(this).select('.node-ring').attr('stroke-width', 3);
      showTooltip(event, d);
    })
    .on('mousemove', (event) => moveTooltip(event))
    .on('mouseleave', function(event, d) {
      const baseOpacity = d.isResource ? 0.15 : (d.entityType === 'organization' ? 0.9 : 0.7);
      d3.select(this).select('.node-bg').attr('opacity', baseOpacity);
      d3.select(this).select('.node-ring').attr('stroke-width', 2);
      hideTooltip();
    })
    .call(d3.drag()
      .on('start', (event, d) => { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
      .on('end', (event, d) => { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));

  // Define clip paths and image patterns in defs
  const defs = svg.append('defs');

  nodes.forEach((d, i) => {
    const imgUrl = getImageUrl(d);
    const r = d.radius;
    const id = `clip-${i}`;
    const patId = `img-${i}`;

    // Clip path (circle)
    defs.append('clipPath')
      .attr('id', id)
      .append('circle')
      .attr('r', r);

    d._clipId = id;
    d._patternId = patId;
    d._imgIndex = i;

    // Load image — try multiple sources, add to node when one succeeds
    function applyImage(url) {
      d._imgUrl = url;
      const pat = defs.append('pattern')
        .attr('id', patId)
        .attr('width', 1).attr('height', 1)
        .attr('patternContentUnits', 'objectBoundingBox');
      pat.append('rect')
        .attr('width', 1).attr('height', 1)
        .attr('fill', d.entityType === 'organization' ? '#fff' : getColor(d.category));
      pat.append('image')
        .attr('href', url)
        .attr('width', 1).attr('height', 1)
        .attr('preserveAspectRatio', 'xMidYMid slice');
      const nodeEl = d3.select(nodeGroup.nodes()[i]);
      if (nodeEl.node()) {
        nodeEl.select('text').remove(); // remove initials now that image loaded
        nodeEl.insert('circle', '.stance-pip')
          .attr('class', 'node-image')
          .attr('r', r - (d.entityType === 'organization' ? 2 : 1))
          .attr('fill', `url(#${patId})`)
          .attr('clip-path', `url(#${id})`);
        nodeEl.insert('circle', '.stance-pip')
          .attr('class', 'node-ring')
          .attr('r', r)
          .attr('fill', 'none')
          .attr('stroke', getColor(d.category))
          .attr('stroke-width', 2)
          .attr('opacity', 0.8);
      }
    }

    if (d.entityType === 'person') {
      // People: try hardcoded first, then Wikipedia API
      if (imgUrl) {
        const testImg = new Image();
        testImg.referrerPolicy = 'no-referrer';
        testImg.onload = () => applyImage(imgUrl);
        testImg.onerror = async () => {
          // Hardcoded URL failed — try Wikipedia API
          const wikiUrl = await fetchWikiImage(d.name);
          if (wikiUrl) {
            const testImg2 = new Image();
            testImg2.referrerPolicy = 'no-referrer';
            testImg2.onload = () => applyImage(wikiUrl);
            testImg2.src = wikiUrl;
          }
        };
        testImg.src = imgUrl;
      } else {
        // No hardcoded — try Wikipedia API directly
        fetchWikiImage(d.name).then(wikiUrl => {
          if (wikiUrl) {
            const testImg = new Image();
            testImg.referrerPolicy = 'no-referrer';
            testImg.onload = () => applyImage(wikiUrl);
            testImg.src = wikiUrl;
          }
        });
      }
    } else if (d.entityType === 'organization' && !d.isResource) {
      // Orgs: try S3-cached logo, fall back to Google Favicons
      let domain;
      try { domain = ORG_DOMAINS[d.name] || (d.website ? new URL(d.website).hostname.replace('www.', '') : null); } catch {}
      if (domain) {
        const s3LogoUrl = `https://d3fo5mm9fktie3.cloudfront.net/logos/${domain}.png`;
        const fallbackUrl = `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;
        const testImg = new Image();
        testImg.onload = () => applyImage(s3LogoUrl);
        testImg.onerror = () => {
          // S3 logo not cached — try Google Favicons
          const fallback = new Image();
          fallback.onload = () => applyImage(fallbackUrl);
          fallback.src = fallbackUrl;
        };
        testImg.src = s3LogoUrl;
      }
    }
  });

  // Background shape — circle for people/orgs, rounded rect for resources
  nodeGroup.filter(d => !d.isResource).append('circle')
    .attr('class', 'node-bg')
    .attr('r', d => d.radius)
    .attr('fill', d => getColor(d.category))
    .attr('stroke', d => d.entityType === 'organization'
      ? d3.color(getColor(d.category)).brighter(0.8) : 'none')
    .attr('stroke-width', d => d.entityType === 'organization' ? 1.5 : 0)
    .attr('opacity', d => d.entityType === 'organization' ? 0.9 : 0.7);

  // Resource nodes: rounded squares
  nodeGroup.filter(d => d.isResource).append('rect')
    .attr('class', 'node-bg')
    .attr('x', d => -d.radius)
    .attr('y', d => -d.radius)
    .attr('width', d => d.radius * 2)
    .attr('height', d => d.radius * 2)
    .attr('rx', 5).attr('ry', 5)
    .attr('fill', d => getColor(d.category))
    .attr('opacity', 0.15)
    .attr('stroke', d => getColor(d.category))
    .attr('stroke-width', 1.5);

  // Image circles and rings are now added asynchronously via the preloader above

  // Initials (only for nodes without images, or small nodes) — not for resources
  nodeGroup.filter(d => !d._imgUrl && !d.isResource && d.radius >= 6)
    .append('text')
    .attr('text-anchor', 'middle')
    .attr('dy', '0.35em')
    .attr('font-family', 'var(--mono)')
    .attr('font-size', d => d.radius >= 16 ? '7px' : d.radius >= 10 ? '5px' : '4px')
    .attr('fill', '#fff')
    .attr('opacity', 0.9)
    .attr('pointer-events', 'none')
    .text(d => {
      const parts = (d.name || '').split(/[\s]+/);
      if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
      return (d.name || '').slice(0, 2).toUpperCase();
    });

  // Resource type icons (clean SVG paths)
  nodeGroup.filter(d => d.isResource).each(function(d) {
    const iconPath = RESOURCE_TYPE_ICONS[d.resource_type] || RESOURCE_TYPE_ICONS['Essay'];
    const iconSize = d.radius * 1.1;
    const g = d3.select(this).append('g')
      .attr('transform', `translate(${-iconSize/2},${-iconSize/2})`)
      .attr('pointer-events', 'none');
    // Split multi-path strings (separated by ' M') and draw each
    const paths = iconPath.split(/(?= M)/);
    paths.forEach(p => {
      g.append('path')
        .attr('d', p.trim())
        .attr('fill', 'none')
        .attr('stroke', getColor(d.category))
        .attr('stroke-width', 1.5)
        .attr('stroke-linecap', 'round')
        .attr('stroke-linejoin', 'round')
        .attr('transform', `scale(${iconSize / 24})`);
    });
  });

  // Stance indicator (small colored pip at bottom-right of node)
  nodeGroup.filter(d => getStanceColor(d.regulatory_stance))
    .append('circle')
    .attr('class', 'stance-pip')
    .attr('cx', d => d.radius * 0.65)
    .attr('cy', d => d.radius * 0.65)
    .attr('r', d => Math.max(2, d.radius * 0.2))
    .attr('fill', d => getStanceColor(d.regulatory_stance))
    .attr('stroke', 'var(--bg-page)')
    .attr('stroke-width', d => d.radius >= 10 ? 1.5 : 0.75)
    .attr('pointer-events', 'none');

  // Submission count indicator — subtle gold outer ring for entities with 5+ submissions
  nodeGroup.filter(d => (d.submissionCount || 0) >= 5 && !d.isResource)
    .append('circle')
    .attr('class', 'submission-ring')
    .attr('r', d => d.radius + 2)
    .attr('fill', 'none')
    .attr('stroke', '#fbbf24')
    .attr('stroke-width', 1)
    .attr('stroke-dasharray', '2,2')
    .attr('opacity', 0.5)
    .attr('pointer-events', 'none');
  nodeGroup.filter(d => (d.submissionCount || 0) >= 5 && d.isResource)
    .append('rect')
    .attr('class', 'submission-ring')
    .attr('x', d => -d.radius - 2)
    .attr('y', d => -d.radius - 2)
    .attr('width', d => d.radius * 2 + 4)
    .attr('height', d => d.radius * 2 + 4)
    .attr('rx', 6).attr('ry', 6)
    .attr('fill', 'none')
    .attr('stroke', '#fbbf24')
    .attr('stroke-width', 1)
    .attr('stroke-dasharray', '2,2')
    .attr('opacity', 0.5)
    .attr('pointer-events', 'none');

  // Cluster labels (overlay layer, rendered AFTER nodes so they're on top)
  const labelLayer = g.append('g').attr('class', 'label-layer');
  // Position labels on the outer edge of each cluster, radiating away from center
  function getLabelPos(cat) {
    const c = clusterCenters[cat];
    const count = nodes.filter(n => n.category === cat).length;
    const clusterR = Math.max(50, Math.sqrt(count) * 28);
    // Direction from map center to cluster center
    const dx = c.x - centerX;
    const dy = c.y - centerY;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    // Place label beyond the cluster circle, in the outward direction
    const labelDist = clusterR + 14;
    return {
      x: c.x + (dx / dist) * labelDist,
      y: c.y + (dy / dist) * labelDist,
      anchor: dx > 20 ? 'start' : dx < -20 ? 'end' : 'middle',
    };
  }

  labelLayer.selectAll('.cluster-label-bg')
    .data(categories)
    .join('rect')
    .attr('class', 'cluster-label-bg')
    .attr('x', d => {
      const pos = getLabelPos(d);
      const w = d.length * 6.4 + 16;
      return pos.anchor === 'end' ? pos.x - w : pos.anchor === 'start' ? pos.x - 4 : pos.x - w / 2;
    })
    .attr('y', d => getLabelPos(d).y - 10)
    .attr('width', d => d.length * 6.4 + 16)
    .attr('height', 16)
    .attr('rx', 3)
    .attr('fill', 'var(--bg-page)')
    .attr('opacity', 0.85)
    .attr('pointer-events', 'none');

  labelLayer.selectAll('.cluster-label')
    .data(categories)
    .join('text')
    .attr('class', 'cluster-label')
    .attr('x', d => getLabelPos(d).x)
    .attr('y', d => getLabelPos(d).y)
    .attr('text-anchor', d => getLabelPos(d).anchor)
    .attr('font-size', '9px')
    .attr('font-weight', '500')
    .attr('fill', d => getColor(d))
    .attr('opacity', 1)
    .attr('pointer-events', 'none')
    .text(d => d);

  function ticked() {
    nodeGroup.attr('transform', d => `translate(${d.x},${d.y})`);
    if (linkElements) {
      linkElements
        .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    }
  }

  // Click background to close panel
  svg.on('click', () => document.getElementById('detail-panel').classList.remove('open'));
}

function forceCluster(centers, strength) {
  let nodes;
  function force(alpha) {
    nodes.forEach(d => {
      const c = centers[d.category];
      if (!c) return;
      d.vx += (c.x - d.x) * alpha * strength;
      d.vy += (c.y - d.y) * alpha * strength;
    });
  }
  force.initialize = (_) => { nodes = _; };
  return force;
}


function render2D(svg, g, width, height) {
  const CONTROLS_WIDTH = 280;
  const margin = { top: 60, right: 280, bottom: 70, left: 130 };
  const plotW = width - CONTROLS_WIDTH - margin.left - margin.right;
  const plotH = height - margin.top - margin.bottom;

  const xAxisDef = AXES[axisX];
  const yAxisDef = axisMode === '2d' ? AXES[axisY] : null;

  // Build candidate nodes: people + orgs passing entity type and category filter
  const candidates = [
    ...(axis2dEntityType !== 'organizations' ? allData.people.map(d => ({ ...d, entityType: 'person', submissionCount: d.submission_count || 1 })) : []),
    ...(axis2dEntityType !== 'people' ? allData.organizations.map(d => ({ ...d, entityType: 'organization', submissionCount: d.submission_count || 1 })) : []),
  ].filter(d => {
    if (!d.category) return false;
    if (activeCategories.size === 0) return true;
    return activeCategories.has(d.category) || activeCategories.has(normalizeCategory(d.category));
  });

  // Filter to nodes with valid scores on all selected axes
  const nodes = candidates.filter(d => {
    if (d[xAxisDef.scoreKey] == null) return false;
    if (yAxisDef && d[yAxisDef.scoreKey] == null) return false;
    return true;
  }).map(d => ({ ...d }));
  // Dynamic radius: fewer nodes → bigger circles, more → smaller
  const nodeRadius = Math.max(7, Math.min(14, Math.round(Math.sqrt(2500 / Math.max(nodes.length, 1)))));
  nodes.forEach(d => { d.radius = nodeRadius; });

  // Update excluded count message
  const excluded = candidates.length - nodes.length;
  document.getElementById('axis-excluded-msg').textContent =
    `${nodes.length} of ${candidates.length} shown` +
    (excluded > 0 ? ` (${excluded} excluded — missing data)` : '');

  document.getElementById('entity-count').textContent = `${nodes.length} entities`;

  if (nodes.length === 0) return;

  // Scale functions: score (1-based integer) → pixel position
  const xTicks = xAxisDef.ticks;
  const xScale = score => CONTROLS_WIDTH + margin.left + (score - 1) / (xTicks.length - 1) * plotW;

  let yScale;
  if (yAxisDef) {
    const yTicks = yAxisDef.ticks;
    // Higher score = top of chart
    yScale = score => margin.top + (1 - (score - 1) / (yTicks.length - 1)) * plotH;
  } else {
    // 1D: all nodes target vertical center
    yScale = () => height / 2;
  }

  // Set target positions
  nodes.forEach(d => {
    d.targetX = xScale(d[xAxisDef.scoreKey]);
    d.targetY = yAxisDef ? yScale(d[yAxisDef.scoreKey]) : yScale();
  });

  // Draw axes
  drawAxes2D(g, xAxisDef, yAxisDef, xScale, yScale, CONTROLS_WIDTH, margin, plotW, plotH, width, height);

  // Node groups
  const nodeGroup = g.selectAll('.node')
    .data(nodes)
    .join('g')
    .attr('class', 'node')
    .on('click', (event, d) => {
      event.stopPropagation();
      showDetail(d, nodes);
      const k = 3;
      const t = d3.zoomIdentity.translate(width / 2 - k * d.x, height / 2 - k * d.y).scale(k);
      svg.transition().duration(500).call(zoomBehavior.transform, t);
    })
    .on('mouseenter', function(event, d) {
      d3.select(this).select('.node-bg').attr('opacity', 1);
      d3.select(this).select('.node-image').attr('opacity', 1);
      showTooltip(event, d);
    })
    .on('mousemove', (event) => moveTooltip(event))
    .on('mouseleave', function(event, d) {
      const baseOpacity = d.entityType === 'organization' ? 0.9 : 0.7;
      d3.select(this).select('.node-bg').attr('opacity', baseOpacity);
      d3.select(this).select('.node-image').attr('opacity', baseOpacity);
      hideTooltip();
    })
    .call(d3.drag()
      .on('start', (event, d) => { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
      .on('end', (event, d) => { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));

  // Background circles (category color)
  nodeGroup.append('circle')
    .attr('class', 'node-bg')
    .attr('r', d => d.radius)
    .attr('fill', d => getColor(normalizeCategory(d.category)))
    .attr('stroke', d => d.entityType === 'organization'
      ? d3.color(getColor(normalizeCategory(d.category))).brighter(0.8) : 'none')
    .attr('stroke-width', d => d.entityType === 'organization' ? 1.5 : 0)
    .attr('opacity', d => d.entityType === 'organization' ? 0.9 : 0.7);

  // Initials fallback text
  nodeGroup.append('text')
    .attr('text-anchor', 'middle')
    .attr('dy', '0.35em')
    .attr('font-family', 'var(--mono)')
    .attr('font-size', '5px')
    .attr('fill', '#fff')
    .attr('opacity', 0.9)
    .attr('pointer-events', 'none')
    .text(d => {
      const parts = (d.name || '').split(/[\s]+/);
      return parts.length >= 2
        ? (parts[0][0] + parts[parts.length - 1][0]).toUpperCase()
        : (d.name || '').slice(0, 2).toUpperCase();
    });

  // Stance pip
  nodeGroup.filter(d => getStanceColor(d.regulatory_stance))
    .append('circle')
    .attr('class', 'stance-pip')
    .attr('cx', d => d.radius * 0.65)
    .attr('cy', d => d.radius * 0.65)
    .attr('r', d => Math.max(2, d.radius * 0.2))
    .attr('fill', d => getStanceColor(d.regulatory_stance))
    .attr('stroke', 'var(--bg-page)')
    .attr('stroke-width', 1.5)
    .attr('pointer-events', 'none');

  // Submission count ring (5+ submissions)
  nodeGroup.filter(d => (d.submissionCount || 0) >= 5)
    .append('circle')
    .attr('r', d => d.radius + 4)
    .attr('fill', 'none')
    .attr('stroke', '#d4a574')
    .attr('stroke-dasharray', '2,2')
    .attr('stroke-width', 1.5)
    .attr('pointer-events', 'none');

  // Async image loading (same pattern as main render)
  const defs = svg.append('defs');
  nodes.forEach((d, i) => {
    const r = d.radius;
    const clipId = `clip2d-${i}`;
    const patId = `img2d-${i}`;
    defs.append('clipPath').attr('id', clipId).append('circle').attr('r', r);
    d._clipId2d = clipId;
    d._patId2d = patId;
    d._imgIdx2d = i;

    function applyImage(url) {
      const pat = defs.append('pattern')
        .attr('id', patId).attr('width', 1).attr('height', 1)
        .attr('patternContentUnits', 'objectBoundingBox');
      pat.append('rect').attr('width', 1).attr('height', 1)
        .attr('fill', d.entityType === 'organization' ? '#fff' : getColor(normalizeCategory(d.category)));
      pat.append('image').attr('href', url).attr('width', 1).attr('height', 1)
        .attr('preserveAspectRatio', 'xMidYMid slice');
      const nodeEl = d3.select(nodeGroup.nodes()[i]);
      if (nodeEl.node()) {
        nodeEl.select('text').remove(); // remove initials now that image loaded
        nodeEl.insert('circle', '.stance-pip')
          .attr('class', 'node-image')
          .attr('r', r - (d.entityType === 'organization' ? 2 : 1))
          .attr('fill', `url(#${patId})`)
          .attr('clip-path', `url(#${clipId})`);
        nodeEl.insert('circle', '.stance-pip')
          .attr('r', r).attr('fill', 'none')
          .attr('stroke', getColor(normalizeCategory(d.category)))
          .attr('stroke-width', 2).attr('opacity', 0.8);
      }
    }

    if (d.entityType === 'person') {
      const imgUrl = getImageUrl(d);
      if (imgUrl) {
        const img = new Image();
        img.referrerPolicy = 'no-referrer';
        img.onload = () => applyImage(imgUrl);
        img.onerror = async () => {
          const wikiUrl = await fetchWikiImage(d.name);
          if (wikiUrl) { const img2 = new Image(); img2.referrerPolicy = 'no-referrer'; img2.onload = () => applyImage(wikiUrl); img2.src = wikiUrl; }
        };
        img.src = imgUrl;
      } else {
        fetchWikiImage(d.name).then(wikiUrl => {
          if (wikiUrl) { const img = new Image(); img.referrerPolicy = 'no-referrer'; img.onload = () => applyImage(wikiUrl); img.src = wikiUrl; }
        });
      }
    } else if (d.entityType === 'organization') {
      let domain;
      try { domain = ORG_DOMAINS[d.name] || (d.website ? new URL(d.website).hostname.replace('www.', '') : null); } catch {}
      if (domain) {
        const s3Url = `https://d3fo5mm9fktie3.cloudfront.net/logos/${domain}.png`;
        const fbUrl = `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;
        const img = new Image();
        img.onload = () => applyImage(s3Url);
        img.onerror = () => { const fb = new Image(); fb.onload = () => applyImage(fbUrl); fb.src = fbUrl; };
        img.src = s3Url;
      }
    }
  });

  // Simulation: beeswarm — strong pull toward target (axis position), collision for separation
  if (simulation) simulation.stop();
  simulation = d3.forceSimulation(nodes)
    .force('x', d3.forceX(d => d.targetX).strength(0.8))
    .force('y', d3.forceY(d => d.targetY).strength(yAxisDef ? 0.8 : 0.02))
    .force('collision', d3.forceCollide(d => d.radius + 2).strength(0.9))
    .alpha(0.6)
    .alphaDecay(0.04)
    .on('tick', () => { nodeGroup.attr('transform', d => `translate(${d.x},${d.y})`); });

  svg.on('click', () => document.getElementById('detail-panel').classList.remove('open'));
}

function drawAxes2D(g, xAxisDef, yAxisDef, xScale, yScale, controlsWidth, margin, plotW, plotH, width, height) {
  g.selectAll('.axis-2d').remove();
  const ax = g.append('g').attr('class', 'axis-2d');
  const xTicks = xAxisDef.ticks;

  // X axis baseline
  ax.append('line')
    .attr('x1', controlsWidth + margin.left).attr('x2', controlsWidth + margin.left + plotW)
    .attr('y1', height - margin.bottom).attr('y2', height - margin.bottom)
    .attr('stroke', 'var(--text-3,#888)').attr('stroke-width', 1);

  // X ticks, labels, gridlines
  xTicks.forEach((label, i) => {
    const x = xScale(i + 1);
    ax.append('line')
      .attr('x1', x).attr('x2', x)
      .attr('y1', height - margin.bottom).attr('y2', height - margin.bottom + 5)
      .attr('stroke', 'var(--text-3,#888)');
    ax.append('text')
      .attr('x', x).attr('y', height - margin.bottom + 17)
      .attr('text-anchor', 'middle').attr('font-size', 10)
      .attr('font-family', 'var(--mono)').attr('fill', 'var(--text-2,#aaa)')
      .text(label);
    ax.append('line')
      .attr('x1', x).attr('x2', x)
      .attr('y1', margin.top).attr('y2', height - margin.bottom)
      .attr('stroke', 'var(--text-3,#888)').attr('stroke-opacity', 0.12)
      .attr('stroke-dasharray', '3,3');
  });

  // X axis label
  ax.append('text')
    .attr('x', controlsWidth + margin.left + plotW / 2)
    .attr('y', height - margin.bottom + 40)
    .attr('text-anchor', 'middle').attr('font-size', 12).attr('font-weight', 600)
    .attr('font-family', 'var(--mono)').attr('fill', 'var(--text-1,#eee)')
    .text(xAxisDef.label);

  if (!yAxisDef) return; // 1D: no Y axis

  const yTicks = yAxisDef.ticks;

  // Y axis baseline
  ax.append('line')
    .attr('x1', controlsWidth + margin.left).attr('x2', controlsWidth + margin.left)
    .attr('y1', margin.top).attr('y2', height - margin.bottom)
    .attr('stroke', 'var(--text-3,#888)').attr('stroke-width', 1);

  // Y ticks, labels, gridlines
  yTicks.forEach((label, i) => {
    const y = yScale(i + 1);
    ax.append('line')
      .attr('x1', controlsWidth + margin.left - 5).attr('x2', controlsWidth + margin.left)
      .attr('y1', y).attr('y2', y)
      .attr('stroke', 'var(--text-3,#888)');
    ax.append('text')
      .attr('x', controlsWidth + margin.left - 9).attr('y', y + 4)
      .attr('text-anchor', 'end').attr('font-size', 10)
      .attr('font-family', 'var(--mono)').attr('fill', 'var(--text-2,#aaa)')
      .text(label);
    ax.append('line')
      .attr('x1', controlsWidth + margin.left).attr('x2', controlsWidth + margin.left + plotW)
      .attr('y1', y).attr('y2', y)
      .attr('stroke', 'var(--text-3,#888)').attr('stroke-opacity', 0.12)
      .attr('stroke-dasharray', '3,3');
  });

  // Y axis label (rotated)
  ax.append('text')
    .attr('transform', `rotate(-90)`)
    .attr('x', -(margin.top + plotH / 2))
    .attr('y', controlsWidth + margin.left - 118)
    .attr('text-anchor', 'middle').attr('font-size', 12).attr('font-weight', 600)
    .attr('font-family', 'var(--mono)').attr('fill', 'var(--text-1,#eee)')
    .text(yAxisDef.label);
}

    if (d.author) {

      const authorLinks = authorNames.map(name => {
        const person = allData.people.find(p => p.name.toLowerCase() === name.toLowerCase() ||
          name.toLowerCase().includes(p.name.toLowerCase()) || p.name.toLowerCase().includes(name.toLowerCase()));
        if (person) {

  }

  // Build linked entities from all data sources
  let affiliated = '';
  const linkedItems = [];

  // From inferredLinks (person-org name matching)
  inferredLinks.forEach(l => {
    if (l.personName === d.name) linkedItems.push({ name: l.orgName, type: 'org', rel: 'affiliated' });
    if (l.orgName === d.name) linkedItems.push({ name: l.personName, type: 'person', rel: 'affiliated' });
  });

  // From relationships table
  if (allData.relationships) {
    const entityKey = d.entityType === 'resource' ? 'resource' : d.entityType;
    allData.relationships.forEach(rel => {
      let linkedName = null, linkedType = null, relType = rel.relationship_type;
      if (rel.source_type === entityKey && rel.source_id === d.id) {
        // This entity is the source — find the target
        if (rel.target_type === 'person') {
          const p = allData.people.find(x => x.id === rel.target_id);
          if (p) { linkedName = p.name; linkedType = 'person'; }
        } else if (rel.target_type === 'organization') {
          const o = allData.organizations.find(x => x.id === rel.target_id);
          if (o) { linkedName = o.name; linkedType = 'org'; }
        } else if (rel.target_type === 'resource') {
          const r = allData.resources.find(x => x.id === rel.target_id);
          if (r) { linkedName = r.title; linkedType = 'resource'; }
        }
      } else if (rel.target_type === entityKey && rel.target_id === d.id) {
        // This entity is the target — find the source
        if (rel.source_type === 'person') {
          const p = allData.people.find(x => x.id === rel.source_id);
          if (p) { linkedName = p.name; linkedType = 'person'; }
        } else if (rel.source_type === 'organization') {
          const o = allData.organizations.find(x => x.id === rel.source_id);
          if (o) { linkedName = o.name; linkedType = 'org'; }
        } else if (rel.source_type === 'resource') {
          const r = allData.resources.find(x => x.id === rel.source_id);
          if (r) { linkedName = r.title; linkedType = 'resource'; }
        }
      }
      if (linkedName && !linkedItems.some(x => x.name === linkedName)) {
        linkedItems.push({ name: linkedName, type: linkedType, rel: relType });
      }
    });
  }

  // From person_organizations
  if (allData.person_organizations) {
    if (d.entityType === 'person') {
      allData.person_organizations.filter(po => po.person_id === d.id).forEach(po => {
        const org = allData.organizations.find(o => o.id === po.organization_id);
        if (org && !linkedItems.some(x => x.name === org.name)) {
          linkedItems.push({ name: org.name, type: 'org', rel: po.role || 'affiliated' });
        }
      });
    } else if (d.entityType === 'organization') {
      allData.person_organizations.filter(po => po.organization_id === d.id).forEach(po => {
        const person = allData.people.find(p => p.id === po.person_id);
        if (person && !linkedItems.some(x => x.name === person.name)) {
          linkedItems.push({ name: person.name, type: 'person', rel: po.role || 'affiliated' });
        }
      });
    }
  }

  if (linkedItems.length > 0) {
    // Group by type
    const byType = {};
    linkedItems.forEach(item => {
      const label = item.type === 'resource' ? 'Resources' : item.type === 'person' ? 'People' : 'Organizations';
      if (!byType[label]) byType[label] = [];
      byType[label].push(item);
    });
    let sections = '';
    for (const [label, items] of Object.entries(byType)) {
      const itemsHtml = items.map(item => {
        const relLabel = item.rel && item.rel !== 'affiliated' ? ` <span style="color:var(--text-3);font-size:10px;">(${item.rel.replace(/_/g, ' ')})</span>` : '';
        return `<div class="affiliated-item" data-name="${item.name}">${item.name}${relLabel}</div>`;
      }).join('');
      sections += `<h4 style="margin-top:0.5rem;">${label}</h4>${itemsHtml}`;
    }
    affiliated = `<div class="detail-affiliated">${sections}</div>`;
  }

  const imgUrl = getImageUrl(d);
  const imgHtml = imgUrl
    ? `<img src="${imgUrl}" alt="${d.name}" style="width:56px; height:56px; border-radius:50%; object-fit:cover; border:2px solid ${color}44; margin-bottom:0.75rem; display:block;" onerror="this.style.display='none'">`
    : '';

  content.innerHTML = `
    ${imgHtml}
    <div class="detail-name">${d.name}</div>
    <div class="detail-type">${d.entityType}</div>
    <div class="detail-category" style="background:${color}33; color:${color};">${d.category}</div>
    <div class="detail-fields">${fields}</div>
    ${affiliated}
  `;

  // Click affiliated items and author links to navigate
  content.querySelectorAll('.affiliated-item, .detail-link').forEach(el => {
    el.addEventListener('click', (e) => {
      e.preventDefault();
      const name = el.dataset.name;
      // Search in all entity types

        const entityData = { ...target, entityType: target.entityType || (target.title ? 'resource' : target.website !== undefined ? 'organization' : 'person'), name: target.name || target.title };
        showDetail(entityData, allNodes);
      }
    });
  });

  panel.classList.add('open');
}

  'labor': ['labor', 'union', 'worker', 'employment', 'sag-aftra', 'aft', 'guild', 'civil society', 'organizer'],

function expandQuery(query) {
  const lower = query.toLowerCase().trim();
  const words = lower.split(/\s+/);
  const expanded = new Set(words);

  words.forEach(word => {
    if (SEMANTIC_MAP[word]) {
      SEMANTIC_MAP[word].forEach(syn => expanded.add(syn));
    }
    // Partial key match (e.g., "regulat" matches "regulation")
    Object.keys(SEMANTIC_MAP).forEach(key => {
      if (key.startsWith(word) || word.startsWith(key)) {
        SEMANTIC_MAP[key].forEach(syn => expanded.add(syn));
      }
    });
  });

  return { original: lower, expanded: [...expanded] };
}

function scoreEntity(d, query) {
  const { original, expanded } = query;
  const fields = [
    d.name, d.category, d.title, d.primary_org, d.other_orgs,
    d.location, d.regulatory_stance, d.capability_belief,
    d.influence_type, d.notes, d.website, d.funding_model
  ].filter(Boolean).map(f => f.toLowerCase());

  const allText = fields.join(' ');

  // Exact name match: highest priority
  if (d.name && d.name.toLowerCase().includes(original)) return 100;

  // Exact match in any field
  if (allText.includes(original)) return 80;

  // Expanded/semantic matches
  let semanticScore = 0;
  expanded.forEach(term => {
    if (allText.includes(term)) semanticScore += 5;
  });

  // Word-by-word fuzzy: check if each original word partially matches
  const origWords = original.split(/\s+/);
  origWords.forEach(w => {
    fields.forEach(f => {
      if (f.includes(w)) semanticScore += 10;
    });
  });

  return semanticScore;
}

// Search UI
const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');
let searchTimeout = null;
let lastHighlighted = [];

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(doSearch, 150);
});

searchInput.addEventListener('focus', () => {
  if (searchInput.value.trim()) doSearch();
});

searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    searchInput.blur();
    clearSearch();
  }
});

document.addEventListener('click', (e) => {
  if (!e.isTrusted) return; // ignore programmatic .click() calls (e.g. view switching)
  if (!e.target.closest('.search-box')) {
    clearSearch();
    searchInput.value = '';
  }
});

function doSearch() {
  const val = searchInput.value.trim();
  if (!val) {
    clearSearch();
    return;
  }

  const query = expandQuery(val);
  const includeOrgs     = currentView !== 'people' && currentView !== 'resources';
  const includePeople   = currentView !== 'orgs'   && currentView !== 'resources';
  const includeResources = currentView !== 'orgs'  && currentView !== 'people';
  const allEntities = [
    ...(includeOrgs     ? allData.organizations.map(d => ({ ...d, entityType: 'organization' })) : []),
    ...(includePeople   ? allData.people.filter(d => d.category).map(d => ({ ...d, entityType: 'person' })) : []),
    ...(includeResources ? (allData.resources || []).map(d => ({ ...d, name: d.title, entityType: 'resource' })) : []),
  ];

  const scored = allEntities
    .map(d => ({ ...d, score: scoreEntity(d, query) }))
    .filter(d => d.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 12);

  searchResults.innerHTML = '';

  if (scored.length === 0) {
    searchResults.innerHTML = '<div class="search-match-hint">No matches</div>';
    searchResults.classList.add('visible');
    highlightNodes([]);
    return;
  }

  // Check if semantic expansion contributed
  const hasSemanticHits = scored.some(d => d.score > 0 && d.score < 80);
  const directHits = scored.filter(d => d.score >= 80).length;

  scored.forEach(d => {
    const div = document.createElement('div');
    div.className = 'search-result';
    div.innerHTML = `
      <span class="search-result-dot" style="background:${getColor(d.category)};"></span>
      <span class="search-result-name">${d.name}</span>
      <span class="search-result-meta">${d.entityType === 'resource' ? 'resource' : d.entityType === 'person' ? 'person' : 'org'}</span>
    `;
    div.addEventListener('click', () => {
      searchResults.classList.remove('visible');
      searchInput.value = d.name;
      // Switch view if needed
      if (d.entityType === 'resource' && currentView !== 'resources') {
        document.querySelector('[data-view="resources"]').click();
      } else if (d.entityType === 'organization' && (currentView === 'people' || currentView === 'resources')) {
        document.querySelector('[data-view="orgs"]').click();
      } else if (d.entityType === 'person' && (currentView === 'orgs' || currentView === 'resources')) {
        document.querySelector('[data-view="people"]').click();
      }
      // Find and click the node after a short delay for re-render
      setTimeout(() => {
        const allNodes = d3.selectAll('.node').data();
        const target = allNodes.find(n => n.name === d.name);
        if (target) {
          showDetail(target, allNodes);
          const svg = d3.select('#map-container svg');
          const mapEl = document.getElementById('map-container');
          const k = 3;
          svg.transition().duration(500).call(
            zoomBehavior.transform,
            d3.zoomIdentity.translate(
              mapEl.clientWidth / 2 - k * target.x,
              mapEl.clientHeight / 2 - k * target.y
            ).scale(k)
          );
          highlightNodes([d.name]);
        } else {
          // Entity not rendered on current view — clear dimming and show inline message
          highlightNodes([]);
          const viewLabel = currentView === '2d' ? 'this plot (missing axis data)' : 'this view';
          searchResults.innerHTML = `<div class="search-match-hint">${d.name} isn't shown on ${viewLabel}</div>`;
          searchResults.classList.add('visible');
          setTimeout(() => searchResults.classList.remove('visible'), 3500);
        }
      }, 100);
    });
    searchResults.appendChild(div);
  });

  if (hasSemanticHits && directHits < scored.length) {
    const hint = document.createElement('div');
    hint.className = 'search-match-hint';
    hint.textContent = `Showing related matches for "${val}"`;
    searchResults.appendChild(hint);
  }

  searchResults.classList.add('visible');
  highlightNodes(scored.map(d => d.name));
}

function highlightNodes(names) {
  const nameSet = new Set(names);
  // Only apply dimming if at least one named entity is actually rendered on screen.
  // Prevents every visible node getting dimmed when the match is off the current view.
  const anyVisible = names.length > 0 &&
    d3.selectAll('.node').data().some(d => nameSet.has(d.name));

  d3.selectAll('.node').each(function(d) {
    const el = d3.select(this);
    if (!anyVisible) {
      el.classed('dimmed', false).classed('highlighted', false);
    } else if (nameSet.has(d.name)) {
      el.classed('dimmed', false).classed('highlighted', true);
    } else {
      el.classed('dimmed', true).classed('highlighted', false);
    }
  });
  d3.selectAll('.cluster-bg').attr('opacity', anyVisible ? 0.02 : 0.06);
  d3.selectAll('.cluster-label-bg').attr('opacity', anyVisible ? 0.02 : 0.85);
  d3.selectAll('.cluster-label').attr('opacity', anyVisible ? 0.05 : 1);
}

function clearSearch() {
  searchResults.classList.remove('visible');
  searchResults.innerHTML = '';
  highlightNodes([]);
}

function updateCategoryResetBtn() {
  const chips = document.querySelectorAll('#category-chips .chip');
  const allActive = [...chips].every(c => c.classList.contains('active'));
  document.getElementById('category-reset').textContent = allActive ? 'deselect all' : 'select all';
}

function updateStanceResetBtn() {
  const items = document.querySelectorAll('#stance-legend-items .stance-legend-item');
  const allActive = [...items].every(item => !item.classList.contains('inactive'));
  document.getElementById('stance-reset').textContent = allActive ? 'deselect all' : 'select all';
}

// Category select/deselect all toggle
document.getElementById('category-reset').addEventListener('click', () => {
  const chips = document.querySelectorAll('#category-chips .chip');
  const allActive = [...chips].every(c => c.classList.contains('active'));
  chips.forEach(chip => {
    if (allActive) {
      chip.classList.remove('active');
      activeCategories.delete(chip.dataset.category);
    } else {
      chip.classList.add('active');
      activeCategories.add(chip.dataset.category);
    }
  });
  updateCategoryResetBtn();
  render();
});

// Stance select/deselect all toggle
document.getElementById('stance-reset').addEventListener('click', () => {
  const items = document.querySelectorAll('#stance-legend-items .stance-legend-item');
  const allActive = [...items].every(item => !item.classList.contains('inactive'));
  if (allActive) {
    activeStances.clear();
    stanceFilterActive = true;
    items.forEach(item => { item.classList.add('inactive'); item.dataset.active = 'false'; });
  } else {
    activeStances = new Set(STANCE_ORDER);
    stanceFilterActive = false;
    items.forEach(item => { item.classList.remove('inactive'); item.dataset.active = 'true'; });
  }
  updateStanceResetBtn();
  render();
});

// Theme toggle
const themeBtn = document.getElementById('theme-toggle');
const savedTheme = localStorage.getItem('map-theme');
if (savedTheme === 'dark') {
  document.documentElement.setAttribute('data-theme', 'dark');
  themeBtn.textContent = '\u2600';
}
themeBtn.addEventListener('click', () => {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  if (isDark) {
    document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('map-theme', 'light');
    themeBtn.textContent = '\u263E';
  } else {
    document.documentElement.setAttribute('data-theme', 'dark');
    localStorage.setItem('map-theme', 'dark');
    themeBtn.textContent = '\u2600';
  }
});
</script>
</body>
