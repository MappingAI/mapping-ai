<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map — Mapping AI</title>

  <style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap');
:root {
  --serif: 'EB Garamond', Georgia, serif;
  --mono: 'DM Mono', monospace;
  --accent: #2563eb;
  /* Light mode (default) */
  --bg-page: #f0eeeb;
  --bg-panel: #fff;
  --bg-panel-alpha: rgba(255,255,255,0.92);
  --text-1: #1a1a1a;
  --text-2: #555;
  --text-3: #888;
  --line: #ddd;
  --input-bg: #f0eeeb;
  --node-text: #fff;
}
[data-theme="dark"] {
  --bg-page: #1a1f2e;
  --bg-panel: #141824;
  --bg-panel-alpha: rgba(20,24,36,0.92);
  --text-1: #e0ddd8;
  --text-2: #aab0c0;
  --text-3: #6a7080;
  --line: #2a2f3e;
  --input-bg: #1a1f2e;
  --node-text: #fff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg-page); font-family: var(--serif); color: var(--text-1); overflow: hidden; height: 100vh; transition: background 0.3s, color 0.3s; }

.site-nav {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 2rem; height: 48px;
  background: var(--bg-panel); border-bottom: 1px solid var(--line);
  z-index: 100; transition: background 0.3s;
}
.nav-brand {
  font-family: var(--mono); font-size: 12px;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-1); text-decoration: none;
}
.nav-links { display: flex; gap: 2rem; }
.nav-links a {
  font-family: var(--mono); font-size: 12px;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-3); text-decoration: none;
  transition: color 0.15s; position: relative;
}
.nav-links a::after {
  content: ''; position: absolute; bottom: -3px; left: 0;
  width: 0; height: 1px; background: var(--text-1);
  transition: width 0.2s ease;
}
.nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
.nav-links a:hover, .nav-links a.active { color: var(--text-1); }

.map-container { position: fixed; top: 48px; left: 0; right: 0; bottom: 0; }

/* Controls */
.controls {
  position: fixed; top: 60px; left: 1rem;
  display: flex; flex-direction: column; gap: 0.4rem;
  z-index: 50; max-height: calc(100vh - 80px); overflow-y: auto;
}
.control-group {
  background: var(--bg-panel-alpha); border-radius: 6px;
  padding: 0.6rem 0.75rem;
  border: 1px solid var(--line);
  backdrop-filter: blur(8px);
}
.control-group h3 {
  font-family: var(--mono); font-size: 9px;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-3); margin-bottom: 0.4rem;
}
.view-toggles { display: flex; gap: 0.2rem; }
.view-btn {
  font-family: var(--mono); font-size: 9px;
  letter-spacing: 0.04em; text-transform: uppercase;
  padding: 0.3rem 0.5rem; border: 1px solid var(--line);
  background: transparent; color: var(--text-3);
  border-radius: 3px; cursor: pointer; transition: all 0.15s;
}
.view-btn:hover { border-color: var(--text-3); color: var(--text-2); }
.view-btn.active { background: var(--text-1); color: var(--bg-panel); border-color: var(--text-1); }
.filter-chips { display: flex; flex-wrap: wrap; gap: 0.2rem; max-width: 180px; }
.chip {
  font-family: var(--mono); font-size: 8px;
  letter-spacing: 0.02em;
  padding: 0.2rem 0.4rem; border-radius: 3px;
  cursor: pointer; transition: all 0.15s;
  border: 1px solid transparent;
  opacity: 0.35;
}
.chip.active { opacity: 1; border-color: rgba(255,255,255,0.15); }
.chip:hover { opacity: 0.7; }

/* Detail panel */
.detail-panel {
  position: fixed; top: 48px; right: 0; bottom: 0;
  width: 320px; background: var(--bg-panel);
  border-left: 1px solid var(--line);
  z-index: 50; transform: translateX(100%);
  transition: transform 0.25s ease, background 0.3s;
  overflow-y: auto; padding: 1.25rem;
}
.detail-panel.open { transform: translateX(0); }
.detail-close {
  position: absolute; top: 0.75rem; right: 0.75rem;
  background: none; border: none; cursor: pointer;
  font-size: 16px; color: var(--text-3); font-family: var(--mono);
}
.detail-close:hover { color: var(--text-1); }
.detail-name {
  font-family: var(--serif); font-size: 20px;
  font-weight: 500; margin-bottom: 0.2rem;
  padding-right: 2rem; color: var(--text-1);
}
.detail-type {
  font-family: var(--mono); font-size: 9px;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-3); margin-bottom: 0.75rem;
}
.detail-category {
  display: inline-block; padding: 0.15rem 0.5rem;
  border-radius: 3px; font-family: var(--mono);
  font-size: 9px; letter-spacing: 0.04em;
  margin-bottom: 0.75rem;
}
.detail-fields { display: flex; flex-direction: column; gap: 0.6rem; }
.detail-field label {
  font-family: var(--mono); font-size: 8px;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-3); display: block; margin-bottom: 0.1rem;
}
.detail-field span {
  font-family: var(--serif); font-size: 14px;
  color: var(--text-2); line-height: 1.5;
}
.detail-field a { color: var(--accent); }
.detail-affiliated {
  margin-top: 0.75rem; padding-top: 0.75rem;
  border-top: 1px solid var(--line);
}
.detail-affiliated h4 {
  font-family: var(--mono); font-size: 9px;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-3); margin-bottom: 0.4rem;
}
.affiliated-item {
  font-family: var(--mono); font-size: 11px;
  color: var(--accent); cursor: pointer; padding: 0.15rem 0;
}
.affiliated-item:hover { opacity: 0.7; }

/* Zoom controls */
.zoom-controls {
  position: fixed; bottom: 1.5rem; right: 1.5rem;
  display: flex; flex-direction: column; gap: 0.2rem; z-index: 50;
}
.zoom-btn {
  width: 32px; height: 32px;
  background: var(--bg-panel-alpha); border: 1px solid var(--line);
  border-radius: 4px; cursor: pointer;
  font-family: var(--mono); font-size: 14px; color: var(--text-3);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; backdrop-filter: blur(8px);
}
.zoom-btn:hover { border-color: var(--text-3); color: var(--text-1); }

.entity-count {
  position: fixed; bottom: 1.5rem; left: 1rem;
  font-family: var(--mono); font-size: 10px; color: var(--text-3);
  letter-spacing: 0.04em;
  background: var(--bg-panel-alpha); padding: 0.3rem 0.6rem;
  border-radius: 3px; border: 1px solid var(--line);
  z-index: 50; backdrop-filter: blur(8px);
}

/* Tooltip */
.tooltip {
  position: fixed; pointer-events: none; z-index: 200;
  background: var(--bg-panel-alpha); border: 1px solid var(--line);
  border-radius: 4px; padding: 0.4rem 0.6rem;
  backdrop-filter: blur(8px);
  max-width: 220px;
  opacity: 0; transition: opacity 0.15s;
}
.tooltip.visible { opacity: 1; }
.tooltip-name {
  font-family: var(--mono); font-size: 10px;
  color: var(--text-1); letter-spacing: 0.02em;
}
.tooltip-sub {
  font-family: var(--mono); font-size: 8px;
  color: var(--text-3); margin-top: 0.1rem;
}

/* Search */
.search-box {
  position: relative;
}
.search-input {
  width: 100%; padding: 0.35rem 0.5rem 0.35rem 1.6rem;
  font-family: var(--mono); font-size: 10px;
  background: var(--input-bg); color: var(--text-1);
  border: 1px solid var(--line); border-radius: 4px;
  outline: none; letter-spacing: 0.02em;
}
.search-input::placeholder { color: var(--text-3); }
.search-input:focus { border-color: var(--text-3); }
.search-icon {
  position: absolute; left: 0.5rem; top: 50%;
  transform: translateY(-50%);
  font-size: 10px; color: var(--text-3); pointer-events: none;
}
.search-results {
  display: none; position: absolute; top: 100%; left: 0; right: 0;
  background: var(--bg-panel); border: 1px solid var(--line);
  border-top: none; border-radius: 0 0 4px 4px;
  max-height: 240px; overflow-y: auto; z-index: 60;
}
.search-results.visible { display: block; }
.search-result {
  padding: 0.35rem 0.5rem; cursor: pointer;
  display: flex; align-items: center; gap: 0.4rem;
  transition: background 0.1s;
}
.search-result:hover { background: var(--input-bg); }
.search-result-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.search-result-name {
  font-family: var(--mono); font-size: 10px; color: var(--text-1);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.search-result-meta {
  font-family: var(--mono); font-size: 8px; color: var(--text-3);
  margin-left: auto; flex-shrink: 0;
}
.search-match-hint {
  font-family: var(--mono); font-size: 8px; color: var(--text-3);
  padding: 0.25rem 0.5rem; border-top: 1px solid var(--line);
}
.stance-legend-items { display: flex; flex-direction: column; gap: 0.15rem; }
.stance-legend-item {
  display: flex; align-items: center; gap: 0.35rem;
  font-family: var(--mono); font-size: 8px; color: var(--text-2);
  cursor: pointer; padding: 0.1rem 0; transition: opacity 0.15s;
}
.stance-legend-item.inactive { opacity: 0.3; }
.stance-legend-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.node.dimmed circle { opacity: 0.12 !important; }
.node.dimmed text { opacity: 0.12 !important; }
.node.highlighted circle { opacity: 1 !important; }
.node.highlighted .node-ring { stroke-width: 3 !important; stroke: #fff !important; }

/* D3 */
.cluster-label {
  font-family: var(--mono); text-transform: uppercase;
  letter-spacing: 0.08em; pointer-events: none;
}
.node { cursor: pointer; }

.nav-hamburger {
  display: none; flex-direction: column; justify-content: center;
  gap: 5px; background: none; border: none; cursor: pointer; padding: 4px;
}
.nav-hamburger span { display: block; width: 20px; height: 1.5px; background: var(--text-1); }
/* Theme toggle */
.theme-toggle {
  background: none; border: 1px solid var(--line);
  border-radius: 4px; cursor: pointer; padding: 0.2rem 0.4rem;
  font-size: 14px; line-height: 1; transition: border-color 0.15s;
}
.theme-toggle:hover { border-color: var(--text-3); }
@media (max-width: 600px) {
  .site-nav { padding: 0 1rem; }
  .nav-hamburger { display: flex; }
  .nav-links {
    display: none; position: absolute; top: 48px; left: 0; right: 0;
    background: var(--bg-panel); border-bottom: 1px solid var(--line);
    flex-direction: column; padding: 1rem 1.5rem; gap: 1rem;
  }
  .nav-links.open { display: flex; }
  .detail-panel { width: 100%; }
}
</style>
</head>

</div>

// Track which images loaded successfully
const imageCache = {};

function getOrgLogoUrl(name) {
  const domain = ORG_DOMAINS[name];
  if (!domain) return null;
  return `https://logo.clearbit.com/${domain}`;
}

function getPersonImageUrl(name) {
  return PEOPLE_IMAGES[name] || null;
}

function getImageUrl(d) {
  if (d.entityType === 'organization') return getOrgLogoUrl(d.name);
  return getPersonImageUrl(d.name);
}

// Known org affiliations parsed from titles
const ORG_KEYWORDS = {

  'Fairly Trained': ['Fairly Trained'],
  "Data Workers' Inquiry": ["Data Workers"],
  'NIST AI Safety Institute (CAISI)': ['NIST', 'CAISI'],
  'White House OSTP': ['OSTP', 'White House'],
};

function inferOrgLinks(people, orgs) {
  const links = [];
  const orgNames = orgs.map(o => o.name);

  people.forEach(person => {
    const text = `${person.title || ''} ${person.primary_org || ''} ${person.other_orgs || ''}`;
    if (!text.trim()) return;

    // Check keyword matches
    for (const [orgName, keywords] of Object.entries(ORG_KEYWORDS)) {
      if (!orgNames.includes(orgName)) continue;
      for (const kw of keywords) {
        if (text.includes(kw)) {
          links.push({ personName: person.name, orgName });
          break;
        }
      }
    }

    // Direct org name matches
    orgNames.forEach(orgName => {
      if (orgName.length > 3 && text.includes(orgName)) {
        if (!links.find(l => l.personName === person.name && l.orgName === orgName)) {
          links.push({ personName: person.name, orgName });
        }
      }
    });
  });

  return links;
}

let currentView = 'orgs';
let activeCategories = new Set();
let allData = { people: [], organizations: [] };
let inferredLinks = [];
let simulation = null;
let currentZoom = d3.zoomIdentity;
let zoomBehavior = null;

const STANCE_COLORS = {
  'Accelerate':    '#ef4444',
  'Light-touch':   '#f97316',
  'Targeted':      '#eab308',
  'Moderate':      '#22c55e',
  'Restrictive':   '#3b82f6',
  'Precautionary': '#8b5cf6',
  'Nationalize':   '#ec4899',
};
const STANCE_ORDER = ['Accelerate','Light-touch','Targeted','Moderate','Restrictive','Precautionary','Nationalize'];
let activeStances = new Set(STANCE_ORDER);
let stanceFilterActive = false; // true when user has toggled any stance off

fetch('map-data.json')
  .then(r => r.json())
  .then(data => {
    allData = data;
    inferredLinks = inferOrgLinks(data.people, data.organizations);
    buildFilters();
    buildStanceLegend();
    render();
  });

function buildFilters() {
  const orgCats = [...new Set(allData.organizations.map(d => d.category).filter(Boolean))];
  const peopleCats = [...new Set(allData.people.map(d => d.category).filter(Boolean))];
  const allCats = [...new Set([...orgCats, ...peopleCats])].sort();

  const container = document.getElementById('category-chips');
  allCats.forEach(cat => {
    const chip = document.createElement('span');
    chip.className = 'chip active';
    chip.textContent = cat;
    chip.style.background = getColor(cat) + '33';
    chip.style.color = getColor(cat);
    chip.dataset.category = cat;
    activeCategories.add(cat);
    chip.addEventListener('click', () => {
      if (activeCategories.has(cat)) {
        activeCategories.delete(cat);
        chip.classList.remove('active');
      } else {
        activeCategories.add(cat);
        chip.classList.add('active');
      }
      render();
    });
    container.appendChild(chip);
  });
}

function buildStanceLegend() {
  const container = document.getElementById('stance-legend-items');
  STANCE_ORDER.forEach(stance => {
    const item = document.createElement('div');
    item.className = 'stance-legend-item';
    item.innerHTML = `<span class="stance-legend-dot" style="background:${STANCE_COLORS[stance]};"></span>${stance}`;
    item.addEventListener('click', () => {
      if (activeStances.has(stance)) {
        activeStances.delete(stance);
        item.classList.add('inactive');
      } else {
        activeStances.add(stance);
        item.classList.remove('inactive');
      }
      stanceFilterActive = activeStances.size < STANCE_ORDER.length;
      render();
    });
    container.appendChild(item);
  });
  // "No stance" toggle
  const noStance = document.createElement('div');
  noStance.className = 'stance-legend-item';
  noStance.innerHTML = `<span class="stance-legend-dot" style="background:var(--text-3); opacity:0.4;"></span><em>Unknown</em>`;
  noStance.dataset.active = 'true';
  noStance.addEventListener('click', () => {
    const active = noStance.dataset.active === 'true';
    noStance.dataset.active = active ? 'false' : 'true';
    noStance.classList.toggle('inactive');
    stanceFilterActive = true;
    render();
  });
  container.appendChild(noStance);
}

document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    render();
  });
});

function passesStanceFilter(d) {
  if (!stanceFilterActive) return true;
  const unknownActive = document.querySelector('#stance-legend-items .stance-legend-item:last-child')?.dataset.active !== 'false';
  if (d.regulatory_stance && STANCE_COLORS[d.regulatory_stance]) {
    return activeStances.has(d.regulatory_stance);
  }
  return unknownActive;
}

function getVisibleNodes() {
  let nodes = [];
  if (currentView === 'orgs' || currentView === 'all') {
    allData.organizations.forEach(d => {
      if (!d.category || !activeCategories.has(d.category)) return;
      if (!passesStanceFilter(d)) return;
      nodes.push({ ...d, entityType: 'organization', radius: currentView === 'all' ? 14 : 18 });
    });
  }
  if (currentView === 'people' || currentView === 'all') {
    allData.people.forEach(d => {
      const cat = d.category || 'Unknown';
      if (d.category && !activeCategories.has(d.category)) return;
      if (!d.category) return;
      if (!passesStanceFilter(d)) return;
      nodes.push({ ...d, category: cat, entityType: 'person', radius: currentView === 'all' ? 7 : 12 });
    });
  }
  return nodes;
}

function render() {
  const container = document.getElementById('map-container');
  const width = container.clientWidth;
  const height = container.clientHeight;

  d3.select('#map-container').selectAll('*').remove();

  const svg = d3.select('#map-container')
    .append('svg')
    .attr('width', width)
    .attr('height', height);

  const g = svg.append('g');

  // Restore zoom state
  zoomBehavior = d3.zoom()
    .scaleExtent([0.2, 8])
    .on('zoom', (event) => {
      currentZoom = event.transform;
      g.attr('transform', event.transform);
    });
  svg.call(zoomBehavior);
  svg.call(zoomBehavior.transform, currentZoom);

  document.getElementById('zoom-in').onclick = () => svg.transition().duration(300).call(zoomBehavior.scaleBy, 1.5);
  document.getElementById('zoom-out').onclick = () => svg.transition().duration(300).call(zoomBehavior.scaleBy, 0.67);
  document.getElementById('zoom-reset').onclick = () => {
    currentZoom = d3.zoomIdentity;
    svg.transition().duration(500).call(zoomBehavior.transform, d3.zoomIdentity);
  };

  const nodes = getVisibleNodes();
  document.getElementById('entity-count').textContent = `${nodes.length} entities`;
  if (nodes.length === 0) return;

  const categories = [...new Set(nodes.map(d => d.category))].sort();
  const clusterCenters = {};
  const centerX = width / 2;
  const centerY = height / 2;
  const orbitRadius = Math.min(width, height) * 0.3;

  categories.forEach((cat, i) => {
    const angle = (i / categories.length) * 2 * Math.PI - Math.PI / 2;
    clusterCenters[cat] = {
      x: centerX + orbitRadius * Math.cos(angle),
      y: centerY + orbitRadius * Math.sin(angle)
    };
  });

  nodes.forEach(d => {
    const center = clusterCenters[d.category] || { x: centerX, y: centerY };
    d.x = center.x + (Math.random() - 0.5) * 60;
    d.y = center.y + (Math.random() - 0.5) * 60;
  });

  // Cluster background circles (behind everything)
  const bgLayer = g.append('g').attr('class', 'bg-layer');
  bgLayer.selectAll('.cluster-bg')
    .data(categories)
    .join('circle')
    .attr('class', 'cluster-bg')
    .attr('cx', d => clusterCenters[d].x)
    .attr('cy', d => clusterCenters[d].y)
    .attr('r', d => {
      const count = nodes.filter(n => n.category === d).length;
      return Math.max(50, Math.sqrt(count) * 28);
    })
    .attr('fill', d => getColor(d))
    .attr('opacity', 0.06)
    .attr('stroke', d => getColor(d))
    .attr('stroke-width', 0.5)
    .attr('stroke-opacity', 0.15);

  // Connection lines (in all view)
  let linkElements = null;
  if (currentView === 'all') {
    const nodeByName = {};
    nodes.forEach(d => { nodeByName[d.name] = d; });

    const visibleLinks = inferredLinks
      .filter(l => nodeByName[l.personName] && nodeByName[l.orgName])
      .map(l => ({ source: nodeByName[l.personName], target: nodeByName[l.orgName] }));

    linkElements = g.selectAll('.connection-line')
      .data(visibleLinks)
      .join('line')
      .attr('class', 'connection-line')
      .attr('stroke', 'var(--text-3)')
      .attr('stroke-width', 0.5)
      .attr('stroke-opacity', 0.25);
  }

  // Simulation
  if (simulation) simulation.stop();
  simulation = d3.forceSimulation(nodes)
    .force('charge', d3.forceManyBody().strength(d => d.entityType === 'organization' ? -5 : -2))
    .force('collision', d3.forceCollide().radius(d => d.radius + 2).strength(0.9))
    .force('cluster', forceCluster(clusterCenters, 0.12))
    .force('center', d3.forceCenter(centerX, centerY).strength(0.01))
    .alpha(0.7)
    .alphaDecay(0.025)
    .on('tick', ticked);

  // Node groups
  const nodeGroup = g.selectAll('.node')
    .data(nodes)
    .join('g')
    .attr('class', 'node')
    .on('click', (event, d) => { event.stopPropagation(); showDetail(d, nodes); })
    .on('mouseenter', function(event, d) {
      d3.select(this).select('.node-bg').attr('opacity', 1);
      d3.select(this).select('.node-ring').attr('stroke-width', 3);
      showTooltip(event, d);
    })
    .on('mousemove', (event) => moveTooltip(event))
    .on('mouseleave', function(event, d) {
      d3.select(this).select('.node-bg').attr('opacity', d.entityType === 'organization' ? 0.9 : 0.7);
      d3.select(this).select('.node-ring').attr('stroke-width', 2);
      hideTooltip();
    })
    .call(d3.drag()
      .on('start', (event, d) => { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
      .on('end', (event, d) => { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));

  // Define clip paths and image patterns in defs
  const defs = svg.append('defs');

  nodes.forEach((d, i) => {
    const imgUrl = getImageUrl(d);
    const r = d.radius;
    const id = `clip-${i}`;
    const patId = `img-${i}`;

    // Clip path (circle)
    defs.append('clipPath')
      .attr('id', id)
      .append('circle')
      .attr('r', r);

    // Image pattern
    if (imgUrl) {
      d._patternId = patId;
      d._clipId = id;
      d._imgUrl = imgUrl;
      d._imgIndex = i;

      const pat = defs.append('pattern')
        .attr('id', patId)
        .attr('width', 1).attr('height', 1)
        .attr('patternContentUnits', 'objectBoundingBox');

      // White background circle for logos
      pat.append('rect')
        .attr('width', 1).attr('height', 1)
        .attr('fill', d.entityType === 'organization' ? '#fff' : getColor(d.category));

      pat.append('image')
        .attr('href', imgUrl)
        .attr('width', 1).attr('height', 1)
        .attr('preserveAspectRatio', 'xMidYMid slice');
    }
  });

  // Background circle (always present, visible as fallback or ring)
  nodeGroup.append('circle')
    .attr('class', 'node-bg')
    .attr('r', d => d.radius)
    .attr('fill', d => getColor(d.category))
    .attr('stroke', d => d.entityType === 'organization'
      ? d3.color(getColor(d.category)).brighter(0.8) : 'none')
    .attr('stroke-width', d => d.entityType === 'organization' ? 1.5 : 0)
    .attr('opacity', d => d.entityType === 'organization' ? 0.9 : 0.7);

  // Image circle (on top, clipped)
  nodeGroup.filter(d => d._imgUrl)
    .append('circle')
    .attr('class', 'node-image')
    .attr('r', d => d.radius - (d.entityType === 'organization' ? 2 : 1))
    .attr('fill', d => `url(#${d._patternId})`)
    .attr('clip-path', d => `url(#${d._clipId})`)
    .attr('opacity', 1)
    .on('error', function(event, d) {
      // On image load failure, hide this circle
      d3.select(this).attr('opacity', 0);
    });

  // Border ring for image nodes
  nodeGroup.filter(d => d._imgUrl)
    .append('circle')
    .attr('class', 'node-ring')
    .attr('r', d => d.radius)
    .attr('fill', 'none')
    .attr('stroke', d => getColor(d.category))
    .attr('stroke-width', 2)
    .attr('opacity', 0.8);

  // Initials (only for nodes without images, or small nodes)
  nodeGroup.filter(d => !d._imgUrl && d.radius >= 10)
    .append('text')
    .attr('text-anchor', 'middle')
    .attr('dy', '0.35em')
    .attr('font-family', 'var(--mono)')
    .attr('font-size', d => d.radius >= 16 ? '7px' : '5px')
    .attr('fill', '#fff')
    .attr('opacity', 0.9)
    .attr('pointer-events', 'none')
    .text(d => {
      const parts = (d.name || '').split(/[\s]+/);
      if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
      return (d.name || '').slice(0, 2).toUpperCase();
    });

  // Stance indicator (small colored pip at bottom-right of node)
  nodeGroup.filter(d => d.regulatory_stance && STANCE_COLORS[d.regulatory_stance])
    .append('circle')
    .attr('class', 'stance-pip')
    .attr('cx', d => d.radius * 0.65)
    .attr('cy', d => d.radius * 0.65)
    .attr('r', d => Math.max(3, d.radius * 0.22))
    .attr('fill', d => STANCE_COLORS[d.regulatory_stance])
    .attr('stroke', 'var(--bg-page)')
    .attr('stroke-width', 1.5)
    .attr('pointer-events', 'none');

  // Cluster labels (overlay layer, rendered AFTER nodes so they're on top)
  const labelLayer = g.append('g').attr('class', 'label-layer');
  labelLayer.selectAll('.cluster-label-bg')
    .data(categories)
    .join('rect')
    .attr('class', 'cluster-label-bg')
    .attr('x', d => clusterCenters[d].x - (d.length * 3.2 + 8))
    .attr('y', d => {
      const count = nodes.filter(n => n.category === d).length;
      return clusterCenters[d].y - Math.max(50, Math.sqrt(count) * 28) - 18;
    })
    .attr('width', d => d.length * 6.4 + 16)
    .attr('height', 16)
    .attr('rx', 3)
    .attr('fill', 'var(--bg-page)')
    .attr('opacity', 0.85)
    .attr('pointer-events', 'none');

  labelLayer.selectAll('.cluster-label')
    .data(categories)
    .join('text')
    .attr('class', 'cluster-label')
    .attr('x', d => clusterCenters[d].x)
    .attr('y', d => {
      const count = nodes.filter(n => n.category === d).length;
      return clusterCenters[d].y - Math.max(50, Math.sqrt(count) * 28) - 7;
    })
    .attr('text-anchor', 'middle')
    .attr('font-size', '9px')
    .attr('font-weight', '500')
    .attr('fill', d => getColor(d))
    .attr('opacity', 1)
    .attr('pointer-events', 'none')
    .text(d => d);

  function ticked() {
    nodeGroup.attr('transform', d => `translate(${d.x},${d.y})`);
    if (linkElements) {
      linkElements
        .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    }
  }

  // Click background to close panel
  svg.on('click', () => document.getElementById('detail-panel').classList.remove('open'));
}

function forceCluster(centers, strength) {
  let nodes;
  function force(alpha) {
    nodes.forEach(d => {
      const c = centers[d.category];
      if (!c) return;
      d.vx += (c.x - d.x) * alpha * strength;
      d.vy += (c.y - d.y) * alpha * strength;
    });
  }
  force.initialize = (_) => { nodes = _; };
  return force;
}

// Tooltip
const tooltip = document.getElementById('tooltip');
function showTooltip(event, d) {
  document.getElementById('tooltip-name').textContent = d.name;
  const sub = d.entityType === 'person' ? (d.title || d.category) : d.category;
  const stance = d.regulatory_stance ? ` · ${d.regulatory_stance}` : '';
  document.getElementById('tooltip-sub').textContent = sub + stance;
  tooltip.classList.add('visible');
  moveTooltip(event);
}
function moveTooltip(event) {
  const x = event.clientX + 12;
  const y = event.clientY - 8;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}
function hideTooltip() { tooltip.classList.remove('visible'); }

// Detail panel
function showDetail(d, allNodes) {
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');
  const color = getColor(d.category);

  let fields = '';
  const addField = (label, value) => {
    if (value) fields += `<div class="detail-field"><label>${label}</label><span>${value}</span></div>`;
  };

  if (d.entityType === 'person') {
    addField('Title', d.title);
    addField('Primary Organization', d.primary_org);
    addField('Other Organizations', d.other_orgs);
    addField('Location', d.location);
    addField('Regulatory Stance', d.regulatory_stance);
    addField('Capability Belief', d.capability_belief);
    addField('Influence Type', d.influence_type);
    addField('Twitter/X', d.twitter ? `@${d.twitter.replace('@', '')}` : null);
    addField('Notes', d.notes);
  } else {
    addField('Website', d.website ? `<a href="${d.website}" target="_blank">${d.website}</a>` : null);
    addField('Location', d.location);
    addField('Funding Model', d.funding_model);
    addField('Regulatory Stance', d.regulatory_stance);
    addField('Capability Belief', d.capability_belief);
    addField('Influence Type', d.influence_type);
    addField('Twitter/X', d.twitter ? `@${d.twitter.replace('@', '')}` : null);
    addField('Notes', d.notes);
  }

  if (!fields) {
    fields = '<div class="detail-field"><span style="color:var(--text-3); font-style:italic;">No additional details yet. <a href="/contribute.html" style="color:var(--accent);">Contribute info</a></span></div>';
  }

  // Affiliated people/orgs
  let affiliated = '';
  const links = inferredLinks.filter(l =>
    l.personName === d.name || l.orgName === d.name
  );
  if (links.length > 0) {
    const items = links.map(l => {
      const linkedName = l.personName === d.name ? l.orgName : l.personName;
      return `<div class="affiliated-item" data-name="${linkedName}">${linkedName}</div>`;
    }).join('');
    affiliated = `<div class="detail-affiliated"><h4>Affiliated</h4>${items}</div>`;
  }

  const imgUrl = getImageUrl(d);
  const imgHtml = imgUrl
    ? `<img src="${imgUrl}" alt="${d.name}" style="width:56px; height:56px; border-radius:50%; object-fit:cover; border:2px solid ${color}44; margin-bottom:0.75rem; display:block;" onerror="this.style.display='none'">`
    : '';

  content.innerHTML = `
    ${imgHtml}
    <div class="detail-name">${d.name}</div>
    <div class="detail-type">${d.entityType}</div>
    <div class="detail-category" style="background:${color}33; color:${color};">${d.category}</div>
    <div class="detail-fields">${fields}</div>
    ${affiliated}
  `;

  // Click affiliated items to navigate
  content.querySelectorAll('.affiliated-item').forEach(el => {
    el.addEventListener('click', () => {
      const name = el.dataset.name;
      const target = allNodes.find(n => n.name === name);
      if (target) showDetail(target, allNodes);
    });
  });

  panel.classList.add('open');
}

  // Capabilities
  'agi': ['agi', 'artificial general intelligence', 'superintelligence', 'asi', 'capability', 'frontier'],
  'capabilities': ['capabilities', 'capability', 'frontier', 'agi', 'scaling', 'benchmark', 'performance'],

  // Power dynamics
  'power': ['power', 'influence', 'concentration', 'monopoly', 'dominance', 'authority', 'control'],
  'influence': ['influence', 'power', 'lobbying', 'advocacy', 'agenda', 'decision-maker'],
};

function expandQuery(query) {
  const lower = query.toLowerCase().trim();
  const words = lower.split(/\s+/);
  const expanded = new Set(words);

  words.forEach(word => {
    if (SEMANTIC_MAP[word]) {
      SEMANTIC_MAP[word].forEach(syn => expanded.add(syn));
    }
    // Partial key match (e.g., "regulat" matches "regulation")
    Object.keys(SEMANTIC_MAP).forEach(key => {
      if (key.startsWith(word) || word.startsWith(key)) {
        SEMANTIC_MAP[key].forEach(syn => expanded.add(syn));
      }
    });
  });

  return { original: lower, expanded: [...expanded] };
}

function scoreEntity(d, query) {
  const { original, expanded } = query;
  const fields = [
    d.name, d.category, d.title, d.primary_org, d.other_orgs,
    d.location, d.regulatory_stance, d.capability_belief,
    d.influence_type, d.notes, d.website, d.funding_model
  ].filter(Boolean).map(f => f.toLowerCase());

  const allText = fields.join(' ');

  // Exact name match: highest priority
  if (d.name && d.name.toLowerCase().includes(original)) return 100;

  // Exact match in any field
  if (allText.includes(original)) return 80;

  // Expanded/semantic matches
  let semanticScore = 0;
  expanded.forEach(term => {
    if (allText.includes(term)) semanticScore += 5;
  });

  // Word-by-word fuzzy: check if each original word partially matches
  const origWords = original.split(/\s+/);
  origWords.forEach(w => {
    fields.forEach(f => {
      if (f.includes(w)) semanticScore += 10;
    });
  });

  return semanticScore;
}

// Search UI
const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');
let searchTimeout = null;
let lastHighlighted = [];

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(doSearch, 150);
});

searchInput.addEventListener('focus', () => {
  if (searchInput.value.trim()) doSearch();
});

searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    searchInput.blur();
    clearSearch();
  }
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-box')) {
    searchResults.classList.remove('visible');
  }
});

function doSearch() {
  const val = searchInput.value.trim();
  if (!val) {
    clearSearch();
    return;
  }

  const query = expandQuery(val);
  const allEntities = [
    ...allData.organizations.map(d => ({ ...d, entityType: 'organization' })),
    ...allData.people.filter(d => d.category).map(d => ({ ...d, entityType: 'person' }))
  ];

  const scored = allEntities
    .map(d => ({ ...d, score: scoreEntity(d, query) }))
    .filter(d => d.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 12);

  searchResults.innerHTML = '';

  if (scored.length === 0) {
    searchResults.innerHTML = '<div class="search-match-hint">No matches</div>';
    searchResults.classList.add('visible');
    highlightNodes([]);
    return;
  }

  // Check if semantic expansion contributed
  const hasSemanticHits = scored.some(d => d.score > 0 && d.score < 80);
  const directHits = scored.filter(d => d.score >= 80).length;

  scored.forEach(d => {
    const div = document.createElement('div');
    div.className = 'search-result';
    div.innerHTML = `
      <span class="search-result-dot" style="background:${getColor(d.category)};"></span>
      <span class="search-result-name">${d.name}</span>
      <span class="search-result-meta">${d.entityType === 'person' ? 'person' : 'org'}</span>
    `;
    div.addEventListener('click', () => {
      searchResults.classList.remove('visible');
      // Switch view if needed
      if (d.entityType === 'organization' && currentView === 'people') {
        document.querySelector('[data-view="orgs"]').click();
      } else if (d.entityType === 'person' && currentView === 'orgs') {
        document.querySelector('[data-view="people"]').click();
      }
      // Find and click the node after a short delay for re-render
      setTimeout(() => {
        const allNodes = d3.selectAll('.node').data();
        const target = allNodes.find(n => n.name === d.name);
        if (target) {
          showDetail(target, allNodes);
          // Zoom to node
          const svg = d3.select('#map-container svg');
          const mapEl = document.getElementById('map-container');
          svg.transition().duration(500).call(
            zoomBehavior.transform,
            d3.zoomIdentity.translate(
              mapEl.clientWidth / 2 - target.x,
              mapEl.clientHeight / 2 - target.y
            ).scale(1.5)
          );
          highlightNodes([d.name]);
        }
      }, 100);
    });
    searchResults.appendChild(div);
  });

  if (hasSemanticHits && directHits < scored.length) {
    const hint = document.createElement('div');
    hint.className = 'search-match-hint';
    hint.textContent = `Showing related matches for "${val}"`;
    searchResults.appendChild(hint);
  }

  searchResults.classList.add('visible');
  highlightNodes(scored.map(d => d.name));
}

function highlightNodes(names) {
  const nameSet = new Set(names);
  d3.selectAll('.node').each(function(d) {
    const el = d3.select(this);
    if (names.length === 0) {
      el.classed('dimmed', false).classed('highlighted', false);
    } else if (nameSet.has(d.name)) {
      el.classed('dimmed', false).classed('highlighted', true);
    } else {
      el.classed('dimmed', true).classed('highlighted', false);
    }
  });
  // Also dim cluster labels and backgrounds
  d3.selectAll('.cluster-bg, .cluster-label').attr('opacity', names.length > 0 ? 0.03 : null);
}

function clearSearch() {
  searchResults.classList.remove('visible');
  searchResults.innerHTML = '';
  highlightNodes([]);
}

// Theme toggle
const themeBtn = document.getElementById('theme-toggle');
const savedTheme = localStorage.getItem('map-theme');
if (savedTheme === 'dark') {
  document.documentElement.setAttribute('data-theme', 'dark');
  themeBtn.textContent = '\u2600';
}
themeBtn.addEventListener('click', () => {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  if (isDark) {
    document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('map-theme', 'light');
    themeBtn.textContent = '\u263E';
  } else {
    document.documentElement.setAttribute('data-theme', 'dark');
    localStorage.setItem('map-theme', 'dark');
    themeBtn.textContent = '\u2600';
  }
});
</script>
